  ## B. FINANCIAL MODELING FRAMEWORKS

  ### Bottoms-Up Revenue Model

  **Components:**
  1. Traffic/Leads → Conversion → Customers
  2. Customers × Price = Revenue
  3. Revenue - Churn + Expansion = Net Revenue

  **SaaS Bottoms-Up Example:**
  ```
  Month 1 Assumptions:
  - Website visitors: 10,000
  - Visitor → Trial: 5%
  - Trial → Paid: 20%
  - ACV: $1,200 ($100/month)

  Month 1 Calculation:
  - Trials: 10,000 × 5% = 500
  - New customers: 500 × 20% = 100
  - New ARR: 100 × $1,200 = $120,000
  - New MRR: $10,000

  Month 2 (with 5% churn):
  - Starting customers: 100
  - Churned: 100 × 5% = 5
  - New customers: 100 (same funnel)
  - Ending customers: 100 - 5 + 100 = 195
  - MRR: 195 × $100 = $19,500
  ```

  ### Tops-Down Revenue Model

  **Components:**
  1. Total Addressable Market (TAM)
  2. Serviceable Addressable Market (SAM)
  3. Market Share Assumption
  4. Revenue = SAM × Share %

  **Tops-Down Example:**
  ```
  TAM: $10B (all project management software)
  SAM: $2B (mid-market segment)
  SOM: $200M (companies we can realistically reach)

  Year 5 Target: 1% of SOM = $2M ARR
  ```

  ### Three-Statement Model

  **Income Statement (P&L):**
  - Revenue
  - - Cost of Goods Sold (COGS)
  - = Gross Profit
  - - Operating Expenses (Sales, Marketing, R&D, G&A)
  - = Operating Income (EBIT)
  - - Interest, Taxes
  - = Net Income

  **Balance Sheet:**
  - Assets = Liabilities + Equity
  - Cash, AR, Inventory, Fixed Assets
  - AP, Debt, Deferred Revenue
  - Equity (investment + retained earnings)

  **Cash Flow Statement:**
  - Operating Activities (net income + non-cash adjustments)
  - Investing Activities (capex, acquisitions)
  - Financing Activities (debt, equity raises)
  - Net Change in Cash

  ### Scenario Analysis

  **Standard Scenarios:**
  | Scenario | Revenue | Spend | Hire |
  |----------|---------|-------|------|
  | Bull | 150% of base | Aggressive | +50% |
  | Base | Plan | Plan | Plan |
  | Bear | 70% of base | Cut 20% | Freeze |
  | Survival | 50% of base | Cut 40% | Layoffs |

  **Sensitivity Analysis:**
  Vary key inputs ±20% and show impact on output metrics:
  - Conversion rate
  - Churn rate
  - Price
  - CAC

