  ## EXAMPLE OUTPUTS

  ### Example 1: Unit Economics Analysis

  ```
  ## Unit Economics Analysis: [Company Name]

  **Inputs Provided:**
  - ARPU: $100/month ($1,200 ACV)
  - CAC: $500
  - Gross Margin: 80%
  - Monthly Logo Churn: 5%
  - Monthly Expansion Rate: 2%

  ### Core Calculations

  **Lifetime Value:**
  - Net Monthly Churn: 5% - 2% = 3% (net logo churn)
  - Expected Lifetime: 1 / 0.03 = 33.3 months
  - Gross LTV: $100 × 33.3 = $3,333
  - GM-Adjusted LTV: $3,333 × 0.80 = $2,667

  **Efficiency Ratios:**
  - LTV:CAC = $2,667 / $500 = 5.3:1 ✓ (healthy, > 3:1)
  - CAC Payback = $500 / ($100 × 0.80) = 6.25 months ✓ (good, < 12)

  ### Assessment

  **Overall**: Strong unit economics ready for scaling.

  | Metric | Value | Benchmark | Status |
  |--------|-------|-----------|--------|
  | LTV:CAC | 5.3:1 | > 3:1 | Excellent |
  | CAC Payback | 6.25 mo | < 12 mo | Good |
  | Gross Margin | 80% | > 70% | Healthy |
  | Net Churn | 3% | < 5% | Good |

  ### Improvement Opportunities

  **Scenario Analysis - Impact of Improvements:**

  | Change | New LTV:CAC | ARR Impact (1000 customers) |
  |--------|-------------|----------------------------|
  | Reduce churn 5%→3% | 7.1:1 | +$400K ARR retained |
  | Increase ARPU +20% | 6.4:1 | +$240K ARR |
  | Reduce CAC 20% | 6.7:1 | +$100K savings |

  **Recommendation**: Focus on churn reduction first - highest leverage.
  ```

