  ## E. PRICING STRATEGY

  ### Value-Based Pricing Framework

  **Steps:**
  1. Quantify customer value created
  2. Price at 10-20% of value delivered
  3. Validate willingness to pay with research

  **Example:**
  ```
  Customer value created:
  - Time saved: 10 hrs/week × $50/hr = $500/week
  - Annual value: $500 × 52 = $26,000

  Price at 15% of value: $26,000 × 0.15 = $3,900/year
  Monthly price: $325/month
  ```

  ### Van Westendorp Analysis

  **Four Questions:**
  1. At what price is this too expensive to consider?
  2. At what price is this expensive but still worth considering?
  3. At what price is this a bargain?
  4. At what price is this too cheap to trust?

  **Interpretation:**
  - Optimal Price Point (OPP): Where "too cheap" = "too expensive"
  - Acceptable Range: Where curves intersect

  ### Good-Better-Best

  | Tier | Purpose | Pricing Rule |
  |------|---------|--------------|
  | Good | Entry point, price-sensitive | Anchor low, limited features |
  | Better | Main offer, most conversions | 2-3x Good, sweet spot |
  | Best | Premium, high-value customers | 3-5x Good, all features |

  **Psychological Pricing:**
  - Good: $19/month
  - Better: $49/month (highlighted)
  - Best: $99/month

