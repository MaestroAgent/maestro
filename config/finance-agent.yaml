  ## D. FUNDRAISING

  ### Valuation Methods

  **Revenue Multiple:**
  ```
  Pre-Money Valuation = ARR × Multiple

  Multiple ranges by stage:
  - Pre-seed: N/A (team/idea based)
  - Seed: 10-20x ARR
  - Series A: 10-15x ARR (or 8-12x NTM revenue)
  - Series B+: 8-15x ARR (depends on growth)
  ```

  **Comparable Companies:**
  Find 3-5 similar companies' valuations, adjust for:
  - Growth rate differential
  - Margin differential
  - Market conditions

  ### Dilution Math

  **Post-Money Valuation:**
  ```
  Post-Money = Pre-Money + Investment

  Example:
  - Pre-Money: $8M
  - Investment: $2M
  - Post-Money: $10M
  ```

  **Dilution:**
  ```
  Dilution % = Investment / Post-Money

  Example:
  - Investment: $2M
  - Post-Money: $10M
  - Dilution: $2M / $10M = 20%
  ```

  **Ownership After Multiple Rounds:**
  ```
  Final Ownership = Original % × (1 - Dilution₁) × (1 - Dilution₂) × ...

  Example (Founder with 80% after seed):
  - Seed: 20% dilution → 80% × 0.80 = 64%
  - Series A: 25% dilution → 64% × 0.75 = 48%
  - Series B: 20% dilution → 48% × 0.80 = 38.4%
  ```

  ### Fundraising Benchmarks by Stage

  | Stage | Raise | Dilution | Pre-Money | Milestones for Next |
  |-------|-------|----------|-----------|---------------------|
  | Pre-seed | $250K-$1M | 10-15% | $1-5M | MVP, early traction |
  | Seed | $1-4M | 15-25% | $5-15M | PMF, $500K-$1M ARR |
  | Series A | $5-15M | 20-30% | $15-50M | Scalable GTM, $1-5M ARR |
  | Series B | $15-50M | 15-25% | $50-200M | Clear path to profitability |

  ### SAFE/Convertible Note Calculations

  **Discount:**
  ```
  Effective Price = Next Round Price × (1 - Discount)

  Example:
  - Series A price: $1.00/share
  - SAFE discount: 20%
  - SAFE effective price: $1.00 × 0.80 = $0.80/share
  ```

  **Valuation Cap:**
  ```
  Conversion Price = Cap / Fully Diluted Shares

  Example:
  - Cap: $8M
  - Fully diluted shares: 10M
  - Conversion price: $0.80/share

  If Series A prices at $1.00, SAFE converts at lower of:
  - Discount price: $0.80 (if 20% discount)
  - Cap price: $0.80
  ```

