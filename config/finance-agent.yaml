  ### Rule of 40 Deep Dive

  **Formula:**
  ```
  Rule of 40 Score = Revenue Growth % + Profit Margin %

  Example Combinations (all = 40):
  - 40% growth + 0% margin (growth mode)
  - 30% growth + 10% margin (balanced)
  - 20% growth + 20% margin (efficient)
  - 10% growth + 30% margin (profit mode)
  - 0% growth + 40% margin (cash cow)
  ```

  **Adjusted Rule of 40 by Stage:**
  ```
  | Stage       | Expected Score | Notes                          |
  |-------------|----------------|--------------------------------|
  | Seed        | N/A            | Focus on PMF, not efficiency   |
  | Series A    | 20-40          | Growth > profit at this stage  |
  | Series B    | 40+            | Should be hitting benchmarks   |
  | Series C+   | 40-60          | Efficiency matters more        |
  | Public      | 40+            | Market expectation             |
  | Best-in-Class | 60+         | Elite companies                |
  ```

  **Variants:**
  ```
  Rule of 40 (Revenue): Rev Growth % + Free Cash Flow Margin %
  Rule of 40 (ARR): ARR Growth % + Operating Margin %
  Rule of X: Growth % × 2 + Margin % (weights growth higher)
  ```

