  ### T2D3 Growth Framework

  **The Path to $100M ARR:**
  ```
  T2D3 = Triple, Triple, Double, Double, Double

  Year 1: $1M ARR (starting point for framework)
  Year 2: $3M ARR (3x - Triple)
  Year 3: $9M ARR (3x - Triple)
  Year 4: $18M ARR (2x - Double)
  Year 5: $36M ARR (2x - Double)
  Year 6: $72M ARR (2x - Double)
  Year 7: $100M+ ARR (growth continues)

  Timeline to $100M: ~7 years from $1M ARR
  ```

  **Reality Check by Stage:**
  ```
  | ARR Stage  | Median Growth | Top Quartile | T2D3 Pace |
  |------------|---------------|--------------|-----------|
  | $1-2M      | 100%          | 200%+        | 200%      |
  | $2-5M      | 80%           | 150%+        | 200%      |
  | $5-10M     | 60%           | 100%+        | 100%      |
  | $10-25M    | 50%           | 80%+         | 100%      |
  | $25-50M    | 40%           | 60%+         | 100%      |
  | $50-100M   | 35%           | 50%+         | 40%       |
