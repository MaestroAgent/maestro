  ## A. SAAS METRICS (WITH FORMULAS)

  ### Core Metrics

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | MRR | Sum of monthly recurring revenue | Growth > 10% MoM early stage |
  | ARR | MRR × 12 | Annualized view |
  | ACV | ARR / # Customers | Varies by segment |
  | ARPU | Total Revenue / # Customers | Track trend over time |

  ### Customer Acquisition

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | CAC | Total Sales & Marketing / New Customers | Lower is better |
  | Blended CAC | Total S&M / All New Customers | Includes organic |
  | Paid CAC | Paid S&M / Paid-Acquired Customers | Excludes organic |
  | CAC Payback | CAC / (ARPU × Gross Margin) | < 12 months ideal |

  **CAC Calculation Example:**
  ```
  Sales & Marketing Spend: $100,000/month
  - Sales team salaries: $60,000
  - Paid advertising: $25,000
  - Marketing tools: $10,000
  - Events/content: $5,000

  New Customers Acquired: 20

  CAC = $100,000 / 20 = $5,000 per customer
  ```

  ### Customer Lifetime Value

  **Simple LTV:**
  ```
  LTV = ARPU / Monthly Churn Rate

  Example:
  - ARPU: $100/month
  - Monthly Churn: 5%
  - LTV = $100 / 0.05 = $2,000
  ```

  **Gross Margin-Adjusted LTV:**
  ```
  LTV = (ARPU × Gross Margin) / Monthly Churn Rate

  Example:
  - ARPU: $100/month
  - Gross Margin: 80%
  - Monthly Churn: 5%
  - LTV = ($100 × 0.80) / 0.05 = $1,600
  ```

  **DCF-Based LTV (more accurate):**
  ```
  LTV = ARPU × Gross Margin × (1 / (Churn Rate + Discount Rate))

  Example (10% annual discount rate = 0.83% monthly):
  - ARPU: $100/month
  - Gross Margin: 80%
  - Monthly Churn: 5%
  - Monthly Discount: 0.83%
  - LTV = $100 × 0.80 × (1 / (0.05 + 0.0083)) = $1,373
  ```

  ### LTV:CAC Ratio

  | Ratio | Assessment |
  |-------|------------|
  | < 1:1 | Losing money on every customer |
  | 1-2:1 | Barely breaking even |
  | 2-3:1 | Acceptable, room to scale |
  | 3-4:1 | Healthy, good efficiency |
  | > 5:1 | Underinvesting in growth |

  ### Churn Metrics

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | Logo Churn | Churned Customers / Starting Customers | < 5% monthly SMB, < 1% Enterprise |
  | Revenue Churn | Churned MRR / Starting MRR | < 2% monthly |
  | Net Revenue Retention | (Starting MRR + Expansion - Churn) / Starting MRR | > 100% is excellent |
  | Gross Revenue Retention | (Starting MRR - Churn) / Starting MRR | > 90% healthy |

  **NRR Calculation Example:**
  ```
  Starting MRR: $100,000
  Expansion (upsells): $8,000
  Contraction (downgrades): $2,000
  Churn: $4,000

  NRR = ($100,000 + $8,000 - $2,000 - $4,000) / $100,000
  NRR = $102,000 / $100,000 = 102%
  ```

  ### Efficiency Metrics

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | Rule of 40 | Revenue Growth % + Profit Margin % | > 40% |
  | Burn Multiple | Net Burn / Net New ARR | < 1x excellent, 1-2x good |
  | Magic Number | Net New ARR / S&M Spend (prev quarter) | > 0.75 efficient |
  | SaaS Quick Ratio | (New MRR + Expansion) / (Churn + Contraction) | > 4 healthy |

  **Burn Multiple Example:**
  ```
  Quarterly Net Burn: $1,500,000
  Quarterly Net New ARR: $1,000,000

  Burn Multiple = $1,500,000 / $1,000,000 = 1.5x
  Interpretation: Spending $1.50 to generate $1 of new ARR
  ```

