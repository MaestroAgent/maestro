  ## G. FINANCE TACTICS REPOSITORY (50+ Tactics)

  ### Cash Management Tactics (10)

  1. **Implement 13-week rolling cash flow forecast**
     - Update weekly with actual vs projected
     - Flag variances >10% for immediate review
     - Use as early warning system for cash crunches

  2. **Negotiate extended payment terms with vendors (Net 45-60)**
     - Start negotiations 60 days before contract renewal
     - Leverage payment history and relationship
     - Offer volume commitments in exchange

  3. **Offer annual billing discounts (20-30% off monthly)**
     - 20% discount = customer pays 9.6 months for 12
     - Improves cash flow and reduces churn
     - Calculate break-even vs monthly churn rate

  4. **Accelerate AR collection with early payment incentives (2% 10 Net 30)**
     - 2% discount for payment within 10 days
     - Equivalent to 36% annualized return for customer
     - Reduces DSO and improves cash predictability

  5. **Implement ACH/auto-billing to smooth collections**
     - Reduces failed payments by 15-25%
     - Eliminates invoice-to-cash delay
     - Lower transaction fees than credit cards

  6. **Maintain 3-6 months cash reserve beyond runway**
     - Separate from operating runway calculation
     - Provides cushion for unexpected events
     - Reduces stress during fundraising

  7. **Structure milestone-based vendor payments**
     - 30% upfront, 40% midpoint, 30% completion
     - Aligns cash outflow with value received
     - Provides leverage if deliverables slip

  8. **Use credit lines strategically (draw before you need)**
     - Easier to qualify when you don't need it
     - Draw 30-60 days before anticipated need
     - Interest cost often < equity dilution cost

  9. **Time large expenses around revenue collection**
     - Schedule large payments after major invoices collect
     - Build 5-day buffer minimum
     - Coordinate payroll timing with largest customer payments

  10. **Negotiate deferred payment for large purchases**
      - 90-day deferred payment terms for major software
      - Equipment financing vs cash purchase
      - Vendor financing often cheaper than equity

  ### Fundraising Tactics (12)

  1. **Build investor update cadence 6+ months before raise**
     - Monthly updates to warm prospects
     - Include wins, key metrics, asks
     - Build relationship before asking for money

  2. **Create "fundraising mode" metrics dashboard**
     - Highlight strongest metrics prominently
     - Show momentum and trajectory
     - Benchmark against stage-appropriate comparables

  3. **Target 50-100+ investor conversations for seed/A**
     - Expect 90%+ rejection rate
     - Pipeline: 100 conversations → 10 deep dives → 3-5 term sheets
     - Track funnel rigorously

  4. **Run parallel processes to create competition (3-5 term sheets)**
     - Never negotiate with only one option
     - Use competing interest to improve terms
     - Set clear decision timeline

  5. **Negotiate pro-rata rights carefully (cap % ownership)**
     - Pro-rata can lock up future rounds
     - Cap at 50% of round participation
     - Consider "super pro-rata" implications

  6. **Structure milestones to hit 2-4 weeks before fundraise**
     - Time product launches, customer wins
     - Create natural momentum narrative
     - "We just crossed $1M ARR" beats "We're at $950K"

  7. **Time raise for 18+ months runway remaining**
     - Desperate founders get worse terms
     - Negotiating leverage drops below 12 months
     - Start process at 12-15 months runway

  8. **Build relationships with target investors 6-12 months pre-raise**
     - Cold outreach: <5% success rate
     - Warm intro: ~30% meeting rate
     - Existing relationship: ~50% meeting rate

  9. **Create data room 60 days before launch**
     - Financial model (3-5 year)
     - Cap table with scenario modeling
     - Key contracts, customer list, metrics dashboard

  10. **Benchmark terms against current market (Carta data)**
      - Valuation multiples by stage/sector
      - Typical governance terms
      - Liquidation preferences and participation

  11. **Get warm intros (10x more effective than cold)**
      - Map your network to target investors
      - Ask portfolio founders for introductions
      - Use LinkedIn/Crunchbase to find connections

  12. **Practice pitch 20+ times before live meetings**
      - Record and review yourself
      - Get feedback from friendly investors
      - Anticipate and prepare for hard questions

  ### Board & Investor Relations Tactics (8)

  1. **Send monthly investor update (wins, asks, key metrics)**
     - Keep investors engaged between meetings
     - Format: 5-min read max, consistent structure
     - Include specific asks for help

  2. **Standardized quarterly board deck format**
     - Same structure every quarter for easy comparison
     - Financials, metrics, product, team, risks
     - Send 48+ hours before meeting

  3. **Annual operating plan with quarterly reforecasts**
     - Board-approved annual plan
     - Quarterly reforecast with variance explanation
     - Rolling 12-month outlook

  4. **Cap table management and scenario modeling**
     - Model next 2-3 rounds of financing
     - Understand dilution at different valuations
     - Plan option pool refreshes

  5. **Stock option pool planning (target 10-15% pre-Series A)**
     - Refresh pool before each round (cheaper)
     - Model grants for planned hires
     - Track burn rate vs remaining pool

  6. **409A valuation timing (before option grants, after milestones)**
     - Required for tax-compliant options
     - Lower valuation = more valuable options
     - Update after material events (raises, revenue milestones)

  7. **Maintain board relationships between meetings**
     - Quick texts/calls for advice
     - Share wins and challenges in real-time
     - No surprises in board meetings

  8. **Prepare board meeting pre-reads 48+ hours ahead**
     - Allows board to come prepared
     - More strategic discussion, less status update
     - Include discussion questions/decisions needed

  ### Cost Optimization Tactics (10)

  1. **Audit all subscriptions quarterly (SaaS sprawl)**
     - Use tool like Spendflo or manual spreadsheet
     - Identify unused licenses and duplicate tools
     - Typical savings: 15-25% of SaaS spend

  2. **Renegotiate contracts at renewal (aim for 10-20% reduction)**
     - Research competitor pricing before negotiation
     - Offer multi-year commitment for discount
     - Ask for price lock guarantees

  3. **Implement spend approval workflows by amount**
     - <$1K: Manager approval
     - $1K-$10K: Director approval
     - >$10K: Finance/CEO approval

  4. **Consolidate vendors where possible**
     - Volume discounts from fewer vendors
     - Reduced procurement overhead
     - Stronger negotiating position

  5. **Review contractor vs FTE economics**
     - FTE: $100K salary ≈ $130-150K total cost
     - Contractor: Higher hourly, no benefits/equity
     - Break-even typically 6-9 months

  6. **Optimize cloud spend (reserved instances, rightsizing)**
     - Reserved instances: 30-60% savings
     - Rightsize underutilized instances
     - Use spot instances for non-critical workloads

  7. **Implement corporate card controls**
     - Per-transaction and monthly limits
     - Category restrictions
     - Real-time spend visibility

  8. **Review office/real estate needs quarterly**
     - Hybrid = reduced space needs
     - Sublease excess space
     - Consider coworking for <20 employees

  9. **Audit benefits costs annually**
     - Shop brokers for health insurance
     - Review 401K fees
     - Consider benefits administration platforms

  10. **Consider outsourcing non-core functions**
      - Accounting/bookkeeping
      - HR administration
      - IT support
      - Payroll processing

  ### Financial Planning Tactics (10)

  1. **Build 3-year model with monthly detail year 1**
     - Monthly: Year 1
     - Quarterly: Year 2
     - Annual: Year 3+

  2. **Create Bull/Base/Bear/Survival scenarios**
     - Bull: Everything works, 150% of base
     - Base: Realistic expectations
     - Bear: Significant headwinds, 70% of base
     - Survival: What it takes to reach profitability now

  3. **Identify top 5 model sensitivities**
     - Which inputs most affect outcomes?
     - Focus forecasting effort on high-sensitivity items
     - Build monitoring for these variables

  4. **Tie hiring plan to revenue milestones**
     - "When we hit $X ARR, we hire Y"
     - Avoids getting ahead of revenue
     - Creates clear trigger points

  5. **Build department-level budgets with owners**
     - Each department head owns their budget
     - Monthly review of actual vs plan
     - Accountability for variances

  6. **Implement monthly budget vs actual reviews**
     - Review within 10 days of month close
     - Explain variances >10%
     - Reforecast if trends are changing

  7. **Create KPI dashboards for each department**
     - 3-5 key metrics per department
     - Updated weekly or daily
     - Visible to leadership team

  8. **Model unit economics by customer segment**
     - SMB vs Mid-Market vs Enterprise
     - By acquisition channel
     - By product/plan tier

  9. **Forecast cash monthly, reforecast weekly when tight**
     - Monthly rolling 12-month forecast
     - Weekly 13-week when runway <9 months
     - Daily when runway <3 months

  10. **Build reforecast triggers (if X happens, do Y)**
      - Define scenarios that require action
      - Pre-decide responses to major events
      - Reduces reaction time in crisis

