  ## EXAMPLE OUTPUTS

  ### Example 1: Unit Economics Analysis

  ```
  ## Unit Economics Analysis: [Company Name]

  **Inputs Provided:**
  - ARPU: $100/month ($1,200 ACV)
  - CAC: $500
  - Gross Margin: 80%
  - Monthly Logo Churn: 5%
  - Monthly Expansion Rate: 2%

  ### Core Calculations

  **Lifetime Value:**
  - Net Monthly Churn: 5% - 2% = 3% (net logo churn)
  - Expected Lifetime: 1 / 0.03 = 33.3 months
  - Gross LTV: $100 × 33.3 = $3,333
  - GM-Adjusted LTV: $3,333 × 0.80 = $2,667

  **Efficiency Ratios:**
  - LTV:CAC = $2,667 / $500 = 5.3:1 ✓ (healthy, > 3:1)
  - CAC Payback = $500 / ($100 × 0.80) = 6.25 months ✓ (good, < 12)

  ### Assessment

  **Overall**: Strong unit economics ready for scaling.

  | Metric | Value | Benchmark | Status |
  |--------|-------|-----------|--------|
  | LTV:CAC | 5.3:1 | > 3:1 | Excellent |
  | CAC Payback | 6.25 mo | < 12 mo | Good |
  | Gross Margin | 80% | > 70% | Healthy |
  | Net Churn | 3% | < 5% | Good |

  ### Improvement Opportunities

  **Scenario Analysis - Impact of Improvements:**

  | Change | New LTV:CAC | ARR Impact (1000 customers) |
  |--------|-------------|----------------------------|
  | Reduce churn 5%→3% | 7.1:1 | +$400K ARR retained |
  | Increase ARPU +20% | 6.4:1 | +$240K ARR |
  | Reduce CAC 20% | 6.7:1 | +$100K savings |

  **Recommendation**: Focus on churn reduction first - highest leverage.
  ```

  ### Example 2: Fundraising Model

  ```
  ## Fundraising Analysis: Series A Readiness

  **Current State:**
  - ARR: $1.2M
  - MoM Growth: 12%
  - Gross Margin: 75%
  - Runway: 8 months
  - Net Burn: $150K/month

  ### Target Raise Calculation

  **18-Month Runway Target:**
  - Current burn: $150K/month
  - Projected burn with growth: $200K/month average
  - Cash needed: $200K × 18 = $3.6M
  - Buffer (20%): $720K
  - **Target raise: $4-5M**

  ### Valuation Estimation

  **Revenue Multiple Method:**
  - Current ARR: $1.2M
  - NTM ARR (at 12% MoM): $1.2M × (1.12)^12 = $4.7M
  - Series A multiple range: 8-12x NTM
  - Valuation range: $38M - $56M

  **Comparable Adjustment:**
  - Market is down 30% from peak
  - Adjusted range: $25M - $40M pre-money

  **Recommendation:**
  - Target: $4.5M at $30M pre-money (13% dilution)
  - Walk-away: Below $20M pre-money

  ### Milestone Plan (Use of Funds)

  | Category | Amount | % | Purpose |
  |----------|--------|---|---------|
  | Engineering | $2.0M | 44% | 5 hires, product velocity |
  | Sales | $1.5M | 33% | 3 AEs, hit $5M ARR |
  | Marketing | $0.5M | 11% | Demand gen |
  | G&A/Buffer | $0.5M | 11% | Ops + cushion |

  ### Metrics Needed for Series A

  | Metric | Current | Target | Gap |
  |--------|---------|--------|-----|
  | ARR | $1.2M | $2-3M | $0.8-1.8M |
  | Growth | 12% MoM | 10-15% MoM | ✓ |
  | NRR | 95% | >100% | +5%+ |
  | Runway | 8 mo | 6+ mo at raise | Urgent |
  ```

