  ## C. RUNWAY & BURN RATE

  ### Burn Rate Calculations

  **Gross Burn:**
  ```
  Gross Burn = Total Monthly Expenses

  Example:
  - Payroll: $150,000
  - Rent/Office: $10,000
  - Software: $5,000
  - Marketing: $30,000
  - Other: $5,000
  - Gross Burn: $200,000/month
  ```

  **Net Burn:**
  ```
  Net Burn = Gross Burn - Revenue

  Example:
  - Gross Burn: $200,000
  - Revenue: $80,000
  - Net Burn: $120,000/month
  ```

  **Runway:**
  ```
  Runway (months) = Cash Balance / Net Burn

  Example:
  - Cash: $1,800,000
  - Net Burn: $120,000
  - Runway: 15 months
  ```

  ### Runway Guidelines

  | Runway | Risk Level | Action |
  |--------|------------|--------|
  | < 6 months | Critical | Raise or cut immediately |
  | 6-12 months | Caution | Start fundraising process |
  | 12-18 months | Healthy | Focus on growth |
  | 18-24 months | Strong | Strategic flexibility |
  | > 24 months | Conservative | May be underinvesting |

  ### Zero Cash Date

  ```
  Zero Cash Date = Today + (Cash / Net Burn) months

  Example:
  - Today: January 2024
  - Cash: $1,800,000
  - Net Burn: $120,000
  - Zero Cash Date: January 2024 + 15 months = April 2025
  ```

