  ## F. MENTAL MODELS FOR FINANCE (25+ Models)

  ### Core Financial Mental Models

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Compound Growth | Small improvements accumulate exponentially | 10% monthly = 3.1x annual |
  | Opportunity Cost | Every dollar has alternative uses | Hiring vs marketing vs product |
  | Margin of Safety | Build buffer for uncertainty | 18-month runway, not 12 |
  | Unit Economics | Profitability at customer level | Must work before scaling |
  | Cash vs Accrual | Cash is reality, accrual is accounting | Manage cash, not P&L |
  | Fixed vs Variable | Understand cost structure | Operating leverage |
  | Pareto (80/20) | Most revenue from few customers | Focus on high-value segments |
  | Time Value of Money | $1 today > $1 tomorrow | Discount future cash flows |
  | Sunk Cost Fallacy | Past spend shouldn't drive future decisions | Kill unprofitable projects |
  | Survivorship Bias | We only see successful outcomes | Understand full distribution |

  ### Startup-Specific Financial Models

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Convexity | Asymmetric upside vs downside | Startup investment thesis - small loss, huge potential gain |
  | Optionality | Value of keeping future choices open | Raise more than you need, maintain runway flexibility |
  | Mean Reversion | Extremes return to average over time | Growth rates normalize - don't extrapolate forever |
  | Base Rates | Start with historical averages | Most startups fail - plan accordingly, be realistic |
  | Kelly Criterion | Optimal bet sizing based on probability | How much runway to risk on big bets |
  | Barbell Strategy | Combine conservative + aggressive | Core burn for survival + growth experiments |
  | Zero-Based Budgeting | Justify every dollar from zero | Challenge inherited cost structure each period |
  | Path Dependence | Early choices constrain later options | Cap table decisions compound, hard to undo |
  | Reflexivity | Predictions affect outcomes | Fundraising success begets more success |
  | Power Laws | Few winners capture most value | Go big or go home mentality in VC |
  | Working Capital Cycle | Cash tied up in operations | Manage AR/AP/Inventory timing carefully |
  | Operating Leverage | Fixed costs amplify profits/losses | High fixed cost = risky but scalable |
  | Financial Leverage | Debt amplifies returns and risk | Use carefully, understand covenants |
  | Burn Multiple | Efficiency of growth spending | <1x excellent, 1-2x good, >2x concerning |
  | The J-Curve | Losses before gains in investments | Plan for worse-before-better trajectories |

  ### Mental Model Deep Dives

  **Convexity in Practice:**
  ```
  VC Investment Logic:
  - Invest $1M in startup
  - 70% chance: lose $1M (capped downside)
  - 25% chance: return $1-5M (modest return)
  - 5% chance: return $50-100M (massive upside)

  Expected value: 0.7(-$1M) + 0.25($3M) + 0.05($75M) = $3.8M

  As a founder, structure decisions with convex payoffs:
  - Cap your downside (don't bet the company)
  - Preserve upside (don't sell too early)
  ```

  **Kelly Criterion for Runway Allocation:**
  ```
  Kelly % = (Expected Return × Probability of Win) - (1 - Probability) / Expected Return

  Example: New market expansion
  - 40% chance of 5x return on investment
  - 60% chance of losing the investment

  Kelly % = (5 × 0.40 - 0.60) / 5 = 0.28 = 28%

  Don't bet more than 28% of remaining runway on this initiative
  (In practice, use half-Kelly = 14% for safety)
  ```

  **Path Dependence - Cap Table Example:**
  ```
  Scenario A: Take $1M at $4M pre-money (20% dilution)
  → Founder owns 80% post-seed
  → After Series A (25%), owns 60%
  → After Series B (20%), owns 48%

  Scenario B: Take $500K at $4M pre-money (11% dilution)
  → Founder owns 89% post-seed
  → After Series A (25%), owns 67%
  → After Series B (20%), owns 53%

  That early 9% difference compounds to 5% more ownership at exit
  On $100M exit = $5M difference to founder
  ```

  **Operating Leverage Illustration:**
  ```
  High Operating Leverage Company (SaaS):
  - Revenue: $1M → $2M (100% growth)
  - Fixed Costs: $800K → $800K (no change)
  - Variable Costs: $100K → $200K
  - Profit: $100K → $1M (900% growth!)

  Low Operating Leverage Company (Services):
  - Revenue: $1M → $2M (100% growth)
  - Fixed Costs: $200K → $200K
  - Variable Costs: $700K → $1.4M
  - Profit: $100K → $400K (300% growth)

  High operating leverage = bigger risk, bigger reward
  ```

