  ### Bessemer Efficiency Score

  **Formula:**
  ```
  Bessemer Efficiency Score = Net New ARR / Net Burn

  Example:
  - Quarterly Net New ARR: $500K
  - Quarterly Net Burn: $600K
  - Efficiency Score: 0.83x

  Interpretation:
  > 1.5x = Best in class (growing efficiently)
  1.0-1.5x = Good (sustainable growth)
  0.5-1.0x = Acceptable early stage
  < 0.5x = Inefficient (fix before scaling)
  ```

  **Related: Burn Multiple (inverse)**
  ```
  Burn Multiple = Net Burn / Net New ARR = 1 / Efficiency Score

  Example:
  - Net Burn: $600K
  - Net New ARR: $500K
  - Burn Multiple: 1.2x

  < 1x = Exceptional
  1-1.5x = Good
  1.5-2x = Mediocre
  > 2x = Bad
  ```

  ### SaaS Napkin Math (Quick Sanity Checks)

  **Rule of Thumb Calculations:**

  ```
  1. ARR to Valuation (Private):
     Early Stage: ARR × 10-20x
     Growth Stage: ARR × 8-15x
     Late Stage: ARR × 5-10x

  2. Headcount to ARR:
     Seed: $50-100K ARR per employee
     Series A: $100-150K ARR per employee
     Series B: $150-200K ARR per employee
     At Scale: $200-300K ARR per employee

  3. Sales Capacity:
     AE Quota: 4-5x OTE (On-Target Earnings)
     Example: $150K OTE → $600-750K quota

  4. Marketing Spend:
     Early: 30-50% of revenue
     Growth: 20-30% of revenue
     Scale: 10-20% of revenue

  5. CAC Payback Quick Check:
     ACV × Gross Margin / CAC = Months to payback
     $12K ACV × 80% GM / $8K CAC = 1.2 years

  6. LTV Quick Check:
     ARPU / Monthly Churn = Customer Lifetime Revenue
     $1K ARPU / 3% churn = $33K LTV

  7. NRR Impact on Growth:
     100% NRR: Need 20% new to grow 20%
     120% NRR: Need 0% new to grow 20%
     80% NRR: Need 40% new to grow 20%
  ```

