  ## I. ADDITIONAL FINANCIAL FORMULAS WITH WORKED EXAMPLES

  ### Cohort-Based LTV (More Accurate than Simple Formula)

  **Why Cohort LTV Matters:**
  Simple LTV assumes constant churn, but reality is different. Customers who survive early months churn less later.

  **Cohort LTV Calculation:**
  ```
  Month 0: 100 customers acquired, $100 ARPU
  Month 1: 85 customers (15% month-1 churn), $100 ARPU = $8,500
  Month 3: 75 customers (12% cumulative additional), $105 ARPU = $7,875
  Month 6: 68 customers (9% additional), $110 ARPU = $7,480
  Month 12: 60 customers (12% additional), $120 ARPU = $7,200
  Month 24: 52 customers (13% additional), $130 ARPU = $6,760
  Month 36: 46 customers (12% additional), $135 ARPU = $6,210

  Cumulative Revenue per Original Customer:
  Sum of (Customers × ARPU) / Original Customers
  = ($8,500 + $7,875 + ... ) / 100 over all months

  Simplified 36-month example:
  Year 1 revenue per orig customer: ~$90
  Year 2 revenue per orig customer: ~$75
  Year 3 revenue per orig customer: ~$60
  Total 3-year LTV: $225

  With 80% gross margin: LTV = $180

  Compare to Simple Formula: $100 / 0.05 × 0.80 = $1,600
  Simple LTV overstates by 9x!
  ```

  ### Cash Conversion Score (CCS)

  **Formula:**
  ```
  CCS = Free Cash Flow / EBITDA

  Measures: How much accounting profit becomes actual cash

  Example:
  - EBITDA: $500K
  - CapEx: $50K
  - Working Capital Change: +$100K (cash used)
  - Free Cash Flow: $500K - $50K - $100K = $350K
  - CCS: $350K / $500K = 70%

  Benchmarks:
  > 100%: Excellent (negative working capital, like Amazon)
  80-100%: Good
  60-80%: Acceptable
  < 60%: Investigate (AR growing? Inventory issues?)
  ```

  ### Sales Efficiency Metrics

  **Magic Number (Standard):**
  ```
  Magic Number = Net New ARR / Prior Quarter S&M Spend

  Example:
  - Q2 Net New ARR: $400K
  - Q1 S&M Spend: $500K
  - Magic Number: 0.8

  Interpretation:
  > 1.0 = Efficient - invest more in S&M
  0.75-1.0 = Good - maintain spend
  0.5-0.75 = Acceptable - optimize
  < 0.5 = Inefficient - fix before scaling
  ```

  **Magic Number Variants:**

  ```
  1. Gross Magic Number (includes churn):
     = Gross New ARR / Prior Quarter S&M
     Useful when expansion revenue is significant

  2. Net Magic Number (excludes churn):
     = Net New ARR / Prior Quarter S&M
     Shows true customer acquisition efficiency

  3. Blended Magic Number:
     = Net New ARR / Prior Quarter Total OpEx
     Measures overall company efficiency

  4. CAC Ratio (annual view):
     = (New Customer ARR × Gross Margin) / CAC
     > 1x in Year 1 = unit economics work
  ```

  ### Burn Multiple

  **Formula and Benchmarks:**
  ```
  Burn Multiple = Net Burn / Net New ARR

  Example:
  - Quarterly Net Burn: $1.2M
  - Quarterly Net New ARR: $800K
  - Burn Multiple: 1.5x

  Interpretation by Stage:

  | Stage     | Excellent | Good    | Okay    | Concerning |
  |-----------|-----------|---------|---------|------------|
  | Seed      | < 2x      | 2-3x    | 3-5x    | > 5x       |
  | Series A  | < 1.5x    | 1.5-2x  | 2-3x    | > 3x       |
  | Series B  | < 1x      | 1-1.5x  | 1.5-2x  | > 2x       |
  | Series C+ | < 0.5x    | 0.5-1x  | 1-1.5x  | > 1.5x     |
  ```

  ### ARR per FTE

  **Formula and Benchmarks:**
  ```
  ARR per Employee = Total ARR / Total Employees

  Example:
  - Total ARR: $5M
  - Total Employees: 40
  - ARR per FTE: $125K

  Stage Benchmarks:
  | Stage       | ARR/FTE   | Notes                          |
  |-------------|-----------|--------------------------------|
  | Seed        | $50-100K  | Still building team            |
  | Series A    | $100-150K | Finding efficiency             |
  | Series B    | $150-200K | Scaling operations             |
  | Series C    | $200-250K | Operational excellence         |
  | At Scale    | $250K+    | Public company benchmark       |
  | Best-in-Class | $400K+  | Highly efficient (Zoom, Atlassian) |

  Segment Variation:
  - SMB-focused: Lower ARR/FTE (more customers, more support)
  - Enterprise: Higher ARR/FTE (fewer customers, higher ACV)
  ```

  ### Days Sales Outstanding (DSO)

  **Formula:**
  ```
  DSO = (Accounts Receivable / Revenue) × Days in Period

  Example:
  - Accounts Receivable: $250K
  - Monthly Revenue: $200K
  - DSO = ($250K / $200K) × 30 = 37.5 days

  Benchmarks by Model:
  | Model      | Target DSO | Notes                      |
  |------------|------------|----------------------------|
  | SaaS (credit card) | < 5 days | Auto-billing best |
  | SaaS (invoice) | < 45 days | Net 30 terms          |
  | Enterprise | 45-60 days | Longer procurement cycles |
  | Services   | < 30 days  | Bill on completion        |

  DSO Trend Matters:
  - Rising DSO: Customers paying slower, cash risk
  - Falling DSO: Improving collections, more cash
  ```

  ### SaaS Quick Ratio

  **Formula:**
  ```
  SaaS Quick Ratio = (New MRR + Expansion MRR) / (Churned MRR + Contraction MRR)

  Example:
  - New MRR: $50K
  - Expansion MRR: $20K
  - Churned MRR: $15K
  - Contraction MRR: $5K
  - Quick Ratio: ($50K + $20K) / ($15K + $5K) = 3.5

  Interpretation:
  > 4.0: Excellent - healthy growth, low churn
  2.0-4.0: Good - sustainable growth
  1.0-2.0: Concerning - growth masking churn problem
  < 1.0: Critical - shrinking despite new business
  ```

  ### Hype Ratio (ARR per $ Raised)

  **Formula:**
  ```
  Hype Ratio = Total Funding / ARR

  Example:
  - Total Raised: $25M
  - Current ARR: $5M
  - Hype Ratio: 5x

  Interpretation:
  < 1x: Capital efficient, potentially underfunded
  1-2x: Efficient, good capital deployment
  2-5x: Typical for growth-stage
  5-10x: Capital intensive, needs to deliver
  > 10x: Overfunded relative to progress
  ```

