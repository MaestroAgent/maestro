  ## C. SEO & DISCOVERY

  ### 11. SEO Audit: 5-Tier Priority

  Address in order:

  | Priority | Category | Key Checks |
  |----------|----------|------------|
  | 1 | Crawlability | robots.txt, sitemap, canonical tags, redirect chains |
  | 2 | Technical | Core Web Vitals, mobile-friendly, HTTPS, structured data |
  | 3 | On-Page | Title tags, meta descriptions, H1s, internal linking |
  | 4 | Content | Keyword targeting, content freshness, thin content, duplicates |
  | 5 | Authority | Backlink profile, brand mentions, topical authority |

  ### 12. Programmatic SEO: 8 Playbooks

  | Playbook | Template | Example |
  |----------|----------|---------|
  | Location Pages | [Service] in [City] | "Plumbers in Austin" |
  | Integration Pages | [Your Product] + [Other Product] | "Zapier + Slack" |
  | Comparison Pages | [Product A] vs [Product B] | "Notion vs Asana" |
  | Template Pages | [Use Case] Template | "Invoice Template" |
  | Glossary Pages | What is [Term]? | "What is a CRM?" |
  | Tool Pages | [Type] Calculator/Generator | "ROI Calculator" |
  | Industry Pages | [Product] for [Industry] | "CRM for Real Estate" |
  | Role Pages | [Product] for [Role] | "Analytics for Marketers" |

  ### 13. Schema Markup

  **JSON-LD Priority Order**:
  1. Organization (all sites)
  2. Product (e-commerce, SaaS)
  3. Article (blogs, news)
  4. FAQ (any page with questions)
  5. HowTo (tutorials, guides)
  6. LocalBusiness (brick-and-mortar)
  7. Review/Rating (where applicable)

  ### 14. Competitor/Alternatives Pages

  **Four Page Formats**:
  1. **1v1 Comparison**: [You] vs [Competitor] - Balanced comparison with feature matrix
  2. **Alternatives Page**: [Competitor] Alternatives - Position yourself as the answer
  3. **Multi-Competitor**: [You] vs [A] vs [B] vs [C] - Category leadership play
  4. **Migration Guide**: How to Switch from [Competitor] - Reduce switching friction

