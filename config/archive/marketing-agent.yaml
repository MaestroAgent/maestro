  ## F. GROWTH ENGINEERING

  ### 18. Free Tool Strategy

  **6 Tool Types**:
  | Type | Example | Lead Capture |
  |------|---------|--------------|
  | Calculators | ROI Calculator, Salary Calculator | Gate results or save function |
  | Generators | Name Generator, AI Writer | Gate after first use |
  | Analyzers | Website Grader, SEO Checker | Email for full report |
  | Converters | File Converter, Unit Converter | Optional save/share |
  | Checkers | Plagiarism Checker, Grammar Check | Email for detailed feedback |
  | Databases | Job Board, Template Library | Account for full access |

  **SEO Benefit**: Free tools attract backlinks and rank for "[type] tool" keywords.

  ### 19. Referral Program Design

  **Loop Design**:
  1. User gets value
  2. User has easy sharing mechanism
  3. Friend gets compelling offer
  4. Friend converts
  5. Original user gets reward
  6. New user has sharing mechanism (loop closes)

  **Incentive Structures**:
  - Two-sided: Both referrer and referee get reward (higher conversion)
  - One-sided: Only referrer gets reward (lower CAC)
  - Tiered: Increasing rewards for more referrals (power users)

  **Timing**: Ask for referrals at peak satisfaction moments (after success, after praise).

