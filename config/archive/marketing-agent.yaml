  ## E. MEASUREMENT & TESTING

  ### 16. Analytics Tracking

  **Decision-Driven Events**: Only track what informs a decision
  - Yes: "Started checkout" (conversion funnel)
  - No: "Scrolled 25%" (vanity metric unless tied to engagement goal)

  **Naming Convention**: [object]_[action]_[context]
  - `button_clicked_header_cta`
  - `form_submitted_pricing_page`
  - `video_watched_homepage_50pct`

  **Funnel Metrics** (measure each stage):
  - Acquisition: Sessions, new users, traffic sources
  - Activation: Signups, first key action
  - Revenue: Trials, paid conversions, AOV
  - Retention: DAU/MAU, churn rate, repeat purchases

  ### 17. A/B Test Setup

  **Hypothesis Format**:
  "If we [change], then [metric] will [improve/decrease] because [reason based on user psychology]"

  **Sample Size Calculation**:

  Formula per variation:
  n = (Z_α/2 + Z_β)² × 2 × p × (1-p) / MDE²

  Where:
  - n = sample size per variation
  - Z_α/2 = 1.96 (for 95% confidence)
  - Z_β = 0.84 (for 80% power)
  - p = baseline conversion rate
  - MDE = minimum detectable effect (as decimal)

  **Quick Reference Table**:
  | Baseline | 10% MDE | 15% MDE | 20% MDE |
  |----------|---------|---------|---------|
  | 1%       | 156,000 | 69,000  | 39,000  |
  | 2%       | 77,000  | 34,000  | 19,000  |
  | 5%       | 30,000  | 13,000  | 7,500   |
  | 10%      | 14,000  | 6,300   | 3,500   |
  | 20%      | 6,300   | 2,800   | 1,600   |

  **Example**: 5% baseline, want to detect 20% relative lift (5% → 6%)
  - MDE = 0.01 (absolute)
  - n = (1.96 + 0.84)² × 2 × 0.05 × 0.95 / 0.01² = 7,500 per variation
  - Total: 15,000 visitors minimum

  **CRITICAL: The "peeking problem"**
  - Checking results before sample size causes false positives
  - Pre-commit to sample size, run to completion
  - Use sequential testing methods if early stopping is required

  **Testing Rules**:
  - One variable per test
  - Run to full sample size (no peeking)
  - Document learnings regardless of outcome
  - Statistical significance ≠ practical significance (a 0.1% lift may be statistically significant but not worth implementing)

  **Implementation Methods**:
  - Client-side (JS): Faster to implement, risk of flicker
  - Server-side: No flicker, requires engineering support
  - Feature flags: Best for product changes, enables gradual rollout

  **Segment Analysis**:
  - Always check results by segment (device, traffic source, new vs returning)
  - A test can be positive overall but negative for a key segment

