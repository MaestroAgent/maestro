  ## A. CONVERSION RATE OPTIMIZATION (CRO)

  ### 1. Page-CRO: 7-Dimension Analysis

  **Diagnostic Questions (ask first)**:
  - What's the current conversion rate and goal?
  - What's the traffic source?
  - Any heatmaps, session recordings, or user research available?
  - What changes have already been tried?

  Evaluate any page against these dimensions:

  | Dimension | Key Questions |
  |-----------|---------------|
  | Value Proposition | Is it clear within 5 seconds? Does it address a specific pain? |
  | Headlines | Does it pass the "So what?" test? Is it benefit-focused? |
  | CTAs | Is there one primary action? Is the button text action-oriented? |
  | Visual Hierarchy | Does the eye flow naturally? Is the CTA above the fold? |
  | Trust Signals | Are there testimonials, logos, security badges? |
  | Objection Handling | Are common concerns addressed (price, time, complexity)? |
  | Friction Points | Are there unnecessary fields, steps, or distractions? |

  **Scoring**: Rate each 1-5, prioritize improvements on lowest-scoring dimensions.

  ### 2. Form-CRO

  - **Field Justification**: Every field must earn its place. Ask "Would we pay $5 for this data point?"
  - **Progressive Commitment**: Start with low-friction fields (email) before high-friction (phone, budget)
  - **Smart Defaults**: Pre-fill when possible, use dropdowns over free text
  - **Error Handling**: Inline validation, clear error messages, preserve entered data
  - **Mobile-First**: Touch-friendly targets (44px min), appropriate keyboard types

  ### 3. Signup-Flow-CRO

  - **Multi-Step Optimization**: Break long forms into digestible steps (3-5 fields per step)
  - **Progress Indicators**: Show step count and current position
  - **Value Reinforcement**: Remind users what they're getting at each step
  - **Save & Continue**: Allow users to pause and resume
  - **Exit Intent**: Offer simplified path for abandoning users

  ### 4. Onboarding-CRO

  - **Aha Moment Mapping**: Identify the action that correlates with retention
  - **Activation Milestones**: Define 3-5 key actions new users must complete
  - **Progressive Disclosure**: Don't overwhelm - reveal features as needed
  - **Empty States**: Turn empty dashboards into guided first actions
  - **Celebration Moments**: Acknowledge progress to build momentum

  ### 5. Paywall-Upgrade-CRO

  - **Tier Differentiation**: Make the value difference between tiers crystal clear
  - **Upgrade Triggers**: Identify usage patterns that signal readiness to upgrade
  - **Limit Communication**: Show users how close they are to limits
  - **Feature Teasing**: Let free users see (but not use) premium features
  - **Downgrade Friction**: Make it easy to upgrade, slightly harder to downgrade

  ### 6. Popup-CRO

  - **Timing Strategies**:
    - Scroll-depth (50%+ engagement)
    - Time-on-page (30+ seconds of reading)
    - Exit intent (cursor moving to close)
    - Page count (2+ pages viewed)
  - **Targeting**: New vs returning, traffic source, page type
  - **Offer Clarity**: One clear offer, one clear action
  - **Easy Dismiss**: Don't trap users - clear close button

