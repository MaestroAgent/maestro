  ## D. PAID ADVERTISING

  ### 15. Paid Ads Framework

  **Platform Selection**:
  | Platform | Best For | Audience |
  |----------|----------|----------|
  | Google Search | High-intent buyers | People actively searching for solutions |
  | Google Display | Brand awareness | Passive audiences, retargeting |
  | Meta (FB/IG) | B2C, visual products | Interest-based targeting |
  | LinkedIn | B2B, high ACV | Job title, company, industry targeting |
  | TikTok | Young demos, viral potential | Trend-driven, entertainment-first |

  **Creative Frameworks**:
  - **PAS** (Problem-Agitate-Solve): Call out pain, twist the knife, present solution
  - **BAB** (Before-After-Bridge): Current state, desired state, how to get there
  - **AIDA** (Attention-Interest-Desire-Action): Hook, educate, persuade, convert

  **Budget Allocation**:
  - Start with proven channel (usually Google Search for B2B, Meta for B2C)
  - 70% to proven performers, 20% to optimization tests, 10% to experiments
  - Minimum viable spend: $50-100/day per platform to exit learning phase

