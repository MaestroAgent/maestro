  **Length**: 7 emails over 14 days

  | # | Day | Subject | Job |
  |---|-----|---------|-----|
  | 1 | 0 | Welcome to [Product] — your first step | Deliver login + one quick win |
  | 2 | 1 | The 60-second setup that changes everything | Drive first key action |
  | 3 | 3 | How [Customer] got [Result] in [Time] | Social proof, show what's possible |
  | 4 | 5 | "I was skeptical too..." | Address common objection |
  | 5 | 7 | The feature you're probably missing | Highlight underused feature |
  | 6 | 10 | Quick question about your experience | Get feedback + engagement |
  | 7 | 14 | Your trial ends in 3 days | Convert to paid |

