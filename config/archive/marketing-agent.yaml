  ## G. MARKETING PSYCHOLOGY (40+ Mental Models)

  ### Foundational Thinking

  | Model | Definition | Application |
  |-------|------------|-------------|
  | First Principles | Break down to fundamentals, rebuild from truth | Question every assumption in your marketing |
  | Jobs to Be Done | People hire products to do a job | Focus on the outcome, not features |
  | Inversion | Think about what to avoid, not just what to do | List what would make customers NOT buy |
  | Pareto Principle | 80% of results from 20% of efforts | Find and double down on top performers |
  | Second-Order Effects | Consider consequences of consequences | A discount drives sales but may cheapen brand |
  | Opportunity Cost | Every choice has a hidden cost | Time spent on X = time not spent on Y |
  | Local vs Global Optima | Don't over-optimize one metric | High conversion rate means nothing if traffic is low |
  | Theory of Constraints | Find and fix the bottleneck | The weakest funnel stage limits everything |
  | Map ≠ Territory | Models are approximations, not reality | Personas are useful but customers are individuals |
  | Compounding | Small improvements accumulate exponentially | 1% weekly improvement = 68% annual gain |

  ### Buyer Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Anchoring | First number sets expectations | Show high price first, then your price |
  | Loss Aversion | Losses hurt 2x more than gains feel good | "Don't miss out" > "Get access" |
  | Social Proof | People follow others' behavior | Testimonials, user counts, logos |
  | Scarcity | Limited availability increases desire | "Only 3 left" or time-limited offers |
  | Urgency | Time pressure drives action | Countdown timers, deadline reminders |
  | Reciprocity | Giving creates obligation to return | Free value first, then ask |
  | Authority | Experts are trusted more | Certifications, credentials, endorsements |
  | Commitment/Consistency | Small yeses lead to big yeses | Start with micro-conversions |
  | Endowment Effect | People overvalue what they own | Free trials create ownership feeling |
  | IKEA Effect | People value what they helped create | Let users customize, configure |
  | Sunk Cost Fallacy | Past investment affects future decisions | "You've already invested X hours..." |
  | Status Quo Bias | Default options win | Pre-select the option you want chosen |

  ### Persuasion & Influence

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Storytelling | Narrative is more memorable than facts | Customer success stories > feature lists |
  | Contrast Effect | Comparisons shape perception | Show competitor limitations first |
  | Decoy Effect | Third option makes one look better | Add a higher-priced tier to make middle attractive |
  | Mere Exposure | Familiarity breeds liking | Retargeting, multi-touch campaigns |
  | Liking | People buy from those they like | Humanize your brand, show personality |
  | Unity | Shared identity creates trust | "For marketers, by marketers" |
  | Peak-End Rule | Experiences judged by peak and end | Nail the checkout and confirmation |
  | Cognitive Fluency | Easy to process = more trustworthy | Simple language, clean design |

  ### Pricing Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Charm Pricing | $99 vs $100 (left-digit effect) | Use .99 for value positioning |
  | Round Pricing | $100 feels premium vs $99.73 | Use round numbers for premium products |
  | Rule of 100 | Below $100, use percentage; above, use dollar | "20% off" vs "Save $50" |
  | Price-Quality Heuristic | Higher price = higher quality assumption | Don't price too low or it signals low quality |
  | Payment Decoupling | Separate payment from consumption | Annual billing feels less painful than monthly |

  ### Behavioral Design

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Hick's Law | More choices = slower decisions | Limit options, use progressive disclosure |
  | BJ Fogg Model | Behavior = Motivation × Ability × Trigger | Make desired action easy at high-motivation moment |
  | EAST Framework | Make it Easy, Attractive, Social, Timely | Design check for any conversion point |
  | Nudge Theory | Small changes in environment change behavior | Default settings, choice architecture |
  | Variable Rewards | Unpredictable rewards are more engaging | Gamification, surprise bonuses |

