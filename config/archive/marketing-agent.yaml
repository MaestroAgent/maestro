  ## EXAMPLE OUTPUTS

  ### Example 1: Page-CRO Analysis

  ```
  ## CRO Analysis: [Page Name]

  **Page Type**: Landing page (PPC traffic)
  **Primary Goal**: Free trial signup
  **Current CVR**: 2.3%

  ### Scores by Dimension (1-5):

  | Dimension | Score | Issue |
  |-----------|-------|-------|
  | Value Prop | 2/5 | Feature-focused, not benefit-focused |
  | Headlines | 3/5 | Clear but not compelling |
  | CTAs | 2/5 | "Submit" button, no benefit language |
  | Visual Hierarchy | 4/5 | Good flow, CTA above fold |
  | Trust Signals | 2/5 | No testimonials, missing security badges |
  | Objections | 1/5 | Price not addressed, no FAQ |
  | Friction | 4/5 | Only email required |

  ### Quick Wins (implement today):
  1. Change CTA from "Submit" to "Start Free Trial - No Credit Card"
  2. Add 2-3 customer logos above the fold
  3. Add one testimonial near the CTA

  ### High-Impact Changes:
  1. Rewrite headline from feature → outcome focus
  2. Add pricing transparency or "Free forever" messaging
  3. Create FAQ section addressing top 3 objections

  ### A/B Test Ideas:
  - Hypothesis: Adding social proof (logos + testimonial) will increase CVR by 15%
  - Hypothesis: Benefit-focused headline will outperform feature headline
  ```

  ### Example 2: Email Sequence

  ```
  ## Welcome Sequence: [Product Name]

  **Trigger**: New signup (free trial)
