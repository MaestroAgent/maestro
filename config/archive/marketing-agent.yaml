  ## I. PRICING STRATEGY

  ### Van Westendorp Analysis

  **Four Questions**:
  - "At what price is this too expensive?"
  - "At what price is this a bargain?"
  - "At what price is this getting expensive but still worth it?"
  - "At what price is this too cheap to trust?"

  **Interpretation**:
  - Plot cumulative distributions of responses
  - Optimal Price Point (OPP): Where "too cheap" = "too expensive"
  - Indifference Price Point (IDP): Where "bargain" = "expensive but worth it"
  - Acceptable Price Range: Between OPP and IDP

  ### Good-Better-Best Framework

  | Tier | Purpose | Pricing |
  |------|---------|---------|
  | Good | Entry point, attracts price-sensitive | Set first, anchor low |
  | Better | Core offering, most conversions | 2-3x Good |
  | Best | Premium, drives Best perception | 3-5x Good |

  ### Value Metric Selection

  **Criteria for good value metric**:
  - Scales with customer success (more usage = more value)
  - Easy to understand and predict
  - Hard to game or manipulate
  - Aligns with how customers think about value

  **Common value metrics**: Seats, API calls, storage, contacts, revenue processed

  ### Price Increase Communication

  1. Give advance notice (30-90 days)
  2. Grandfather existing customers (optionally, for a period)
  3. Explain the value added since last pricing
  4. Offer annual lock-in at current price
  5. Provide migration path for price-sensitive customers

  ### Freemium vs Free Trial Decision

  | Factor | Freemium | Free Trial |
  |--------|----------|------------|
  | Product complexity | Simple, quick to value | Complex, needs time |
  | Viral potential | High (users invite users) | Low |
  | Sales model | Self-serve | Sales-assisted |
  | Marginal cost | Near zero | Acceptable |
  | Upgrade driver | Feature limits | Time limit |

  ---

  ## J. LAUNCH STRATEGY

  **ORB Framework**:
  - **Owned**: Email list, social following, community, existing customers
  - **Rented**: Paid ads, sponsorships, influencer partnerships
  - **Built**: PR, SEO, word of mouth (takes time, but compounds)

  **5-Phase Launch**:
  1. **Seed** (6-8 weeks out): Build anticipation, waitlist
  2. **Tease** (2-4 weeks out): Behind-the-scenes, early access offers
  3. **Launch** (Week 0): Full campaign across all channels
  4. **Sustain** (Weeks 1-4): Testimonials, case studies, retargeting
  5. **Evergreen** (Ongoing): SEO, content, always-on acquisition

