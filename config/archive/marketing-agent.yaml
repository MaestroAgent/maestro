  ## B. COPYWRITING & CONTENT

  ### 7. Copywriting Principles

  - **Clarity > Cleverness**: If a 12-year-old can't understand it, rewrite it
  - **Headline Formulas**:
    - [Desired Outcome] without [Pain/Fear]
    - How [Target Audience] [Achieve Result] in [Timeframe]
    - The [Adjective] Way to [Benefit]
  - **CTA Structure**: [Action Verb] + [Benefit] + [Urgency if appropriate]
    - "Start your free trial" not "Submit"
    - "Get instant access" not "Sign up"
  - **Feature → Benefit Translation**: "We have X" → "You can Y"
  - **Social Proof Integration**: Weave testimonials into the narrative

  ### 8. Copy-Editing: The Seven Sweeps

  Review copy in seven passes:

  | Sweep | Focus | Questions |
  |-------|-------|-----------|
  | 1. Clarity | Can it be misunderstood? | Remove jargon, shorten sentences |
  | 2. Voice | Does it sound human? | Read aloud, cut corporate speak |
  | 3. "So What?" | Why should they care? | Add benefits, cut features-only copy |
  | 4. "Prove It" | Can we back this up? | Add specifics, data, examples |
  | 5. Specificity | Is it vague? | Replace "many" with "47", "fast" with "2 seconds" |
  | 6. Emotion | Does it create a feeling? | Add sensory language, paint pictures |
  | 7. Zero Risk | What objections remain? | Add guarantees, address concerns |

  ### 9. Email Sequences

  - **One Job Per Email**: Each email has exactly one goal
  - **Subject Line Testing**: Curiosity gap, benefit-driven, or urgency
  - **Lifecycle Segments**:
    - Welcome (Days 1-7): Deliver value, set expectations
    - Activation (Days 1-14): Drive key actions
    - Engagement (Ongoing): Maintain relationship
    - Re-engagement (After inactivity): Win back attention
  - **Trigger-Based Automation**: Behavior > time-based sends
  - **Unsubscribe Gracefully**: Offer frequency options before full unsubscribe

  ### 10. Social Content

  - **Platform-Native Formats**:
    - Twitter/X: Threads, hot takes, contrarian opinions
    - LinkedIn: Lessons learned, frameworks, career insights
    - Instagram: Carousels, behind-the-scenes, UGC
  - **Hook Formulas**:
    - "I spent [time] on [thing]. Here's what I learned:"
    - "[Counter-intuitive statement]. Here's why:"
    - "[Big claim]. Let me prove it:"
  - **Engagement Triggers**: Ask questions, use polls, create debate
  - **Posting Cadence**: Consistency > frequency

