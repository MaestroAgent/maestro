  ## H. CUSTOMER SUCCESS PSYCHOLOGY (25+ Mental Models)

  ### Value & Outcome Psychology
  | Model | Definition | Application |
  |-------|------------|-------------|
  | Desired Outcome | Customer's ultimate goal, not feature usage | Focus on business outcomes, not product metrics |
  | Success Gap | Distance between current and desired state | Quantify and close this gap systematically |
  | Value Perception | Value is subjective, not objective | Regularly reinforce and quantify value delivered |
  | Switching Costs | Effort required to change solutions | Build healthy switching costs (data, workflows, training) |
  | Endowment Effect | People overvalue what they own | Emphasize what they'd lose by churning |
  | Peak-End Rule | Experiences judged by peaks and endings | Nail onboarding and renewal moments |
  | Jobs to Be Done | Customers hire products for specific jobs | Understand the job, not just the feature |

  ### Behavioral Psychology
  | Model | Definition | Application |
  |-------|------------|-------------|
  | Adoption Curve | Innovators → Early Adopters → Majority → Laggards | Tailor approach to adopter type |
  | Habit Formation | Cue → Routine → Reward | Design product habits, not just usage |
  | Change Management | People resist change by default | Manage the human side of implementation |
  | Effort vs Reward | Value must exceed effort to adopt | Reduce friction, increase perceived value |
  | Status Quo Bias | Inertia favors current behavior | Make desired behavior the default |
  | Loss Aversion | Losses hurt 2x more than gains | Frame churn as loss, not non-renewal |
  | Sunk Cost Awareness | Past investment shouldn't drive future decisions | But customers feel it - acknowledge their investment |
  | Variable Reward | Unpredictable rewards drive engagement | Build in discovery moments and delightful surprises |

  ### Relationship Psychology
  | Model | Definition | Application |
  |-------|------------|-------------|
  | Trust Equation | Trust = (Credibility + Reliability + Intimacy) / Self-Orientation | Build trust systematically |
  | Champion Psychology | Champions need wins to advocate | Give them visible victories they can share |
  | Multi-Threading | Single-threaded relationships are risky | Always have 3+ contacts minimum |
  | Executive Alignment | Exec sponsors provide air cover | Cultivate exec relationships proactively |
  | Social Proof | People follow others' behavior | Share relevant customer success stories |
  | Reciprocity Principle | People feel obligated to return favors | Give value first, ask second |
  | Commitment Consistency | People honor commitments | Get small yeses that lead to big yeses |

  ### Business Psychology
  | Model | Definition | Application |
  |-------|------------|-------------|
  | Net Revenue Retention Mindset | Existing customers are most efficient growth | Protect and grow the base first |
  | Cost to Serve | Not all customers are equally profitable | Segment and tier appropriately |
  | Customer Maturity Model | Customers evolve in sophistication | Meet them where they are, grow them forward |
  | Expansion Readiness | Signals indicate when to upsell | Watch for natural expansion triggers |
  | Land and Expand | Start small, grow account over time | Plant seeds for expansion early |
  | 80/20 Revenue | Top 20% of customers drive 80% of revenue | Protect top accounts ferociously |
  | Negative Churn | Expansion exceeds contraction + churn | The holy grail of CS - aim for NRR > 110% |

  ### Risk Psychology
  | Model | Definition | Application |
  |-------|------------|-------------|
  | Leading vs Lagging Indicators | Leading indicators predict; lagging confirm | Monitor leading indicators religiously |
  | Silent Churn | Customers who leave without warning | Watch for engagement decline patterns |
  | Champion Departure Risk | Champion leaving = account risk | Multi-thread before it happens |
  | Competitive Displacement | Competitors actively target your customers | Stay aware of competitive activity |
  | The Red Account Spiral | Problems compound if unaddressed | Intervene early and aggressively |
  | Survivorship Bias | Learning only from successes is misleading | Study churned customers as deeply as renewals |
  | Risk Concentration | Too much ARR in too few accounts | Diversify customer base for stability |

