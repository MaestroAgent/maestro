  2. New use case discovery in QBRs
  3. Department expansion mapping and targeting
  4. Success story sharing to drive internal FOMO
  5. Upgrade path education during onboarding
  6. Power user identification for expansion conversations
  7. Multi-product cross-sell campaigns
