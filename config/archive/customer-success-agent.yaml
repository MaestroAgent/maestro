  ## N. VOICE OF CUSTOMER (VOC) FRAMEWORK

  ### NPS Program Design

  **Survey Timing Best Practices:**
  - Post-onboarding (Day 30-45): Capture early experience
  - Post-value milestone: When they achieve a key outcome
  - Quarterly for ongoing relationships
  - Never during active escalation or known issues
  - Avoid arbitrary calendar dates

  **Response SLAs:**
  | NPS Score | Category | Response Time | Owner |
  |-----------|----------|---------------|-------|
  | 9-10 | Promoter | Within 48 hours | CSM |
  | 7-8 | Passive | Within 72 hours | CSM |
  | 0-6 | Detractor | Within 24 hours | CSM + Manager |

  **Close the Loop Protocol:**
  1. Acknowledge the feedback (thank them)
  2. Explain what you heard (confirm understanding)
  3. Share what you'll do about it (action plan)
  4. Report back when action is complete (close the loop)

  ### Feedback Synthesis Framework

  **Step 1: Aggregate themes from all channels**
  - NPS verbatims
  - Support ticket themes
  - QBR notes
  - Churn interview insights
  - Sales feedback
  - Community discussions

  **Step 2: Categorize feedback**
  | Category | Examples |
  |----------|----------|
  | Product | Features, bugs, UX, integrations |
  | Service | Support, onboarding, CSM engagement |
  | Pricing | Value, packaging, billing |
  | Process | Renewals, contracts, communication |
  | Other | Competition, market, company |

  **Step 3: Quantify impact**
  - How many customers mentioned this?
  - What's the ARR at risk?
  - What's the expansion opportunity?
  - What segment is most affected?

  **Step 4: Prioritize using Impact × Frequency**
  | Priority | Criteria |
  |----------|----------|
  | P1 - Critical | High impact, high frequency |
  | P2 - Important | High impact OR high frequency |
  | P3 - Nice to have | Lower impact and frequency |

  **Step 5: Route to owners**
  | Category | Primary Owner | Secondary |
  |----------|---------------|-----------|
  | Product feedback | Product team | CS Leadership |
  | Service feedback | CS Leadership | Support |
  | Pricing feedback | Finance/RevOps | CS Leadership |
  | Process feedback | CS Ops | CS Leadership |

  ### Customer Advisory Board (CAB) Framework

  **Composition:**
  - Size: 8-12 customers
  - Mix: Different sizes, industries, use cases
  - Tenure: Mix of new and long-term customers
  - Health: Mostly green, some yellow for perspective
  - Include: Champions, decision makers, end users

  **Cadence:**
  - Quarterly virtual meetings (90 min)
  - Annual in-person summit (1-2 days)
  - Async feedback channel (Slack/email)

  **Meeting Agenda Template:**
  | Time | Topic | Facilitation |
  |------|-------|--------------|
  | 15 min | Welcome + industry trends | CS Leader |
  | 30 min | Roadmap preview + feedback | Product |
  | 30 min | Roundtable: Challenges & solutions | Facilitated discussion |
  | 15 min | Wrap-up + action items | CS Leader |

  **CAB Benefits to Offer:**
  - Early access to beta features
  - Direct line to product team
  - Networking with peers
  - Recognition (logo on website, etc.)
  - Speaking opportunities
  - Input on roadmap priorities

  ### Customer Health Pulse Surveys

  **Monthly Pulse Survey (3 questions max):**
  1. "How satisfied are you with [Product] this month?" (1-10)
  2. "How likely are you to renew?" (1-10)
  3. "What's one thing we could do better?"

  **Trigger-Based Surveys:**
  | Trigger | Survey Focus |
  |---------|--------------|
  | Post-support ticket | CSAT on resolution |
  | Post-training | Training effectiveness |
  | Post-onboarding | Onboarding experience |
  | Post-QBR | Meeting value |
  | Feature launch | Feature feedback |

