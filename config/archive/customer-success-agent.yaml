  ### Onboarding Kickoff Call Script

  **Opening (5 min):**
  "Thanks for joining. My goal today is to make sure you're set up for
  success. We'll cover your goals, walk through setup, and map out the
  next 30 days."

  **Discovery (10 min):**
  - "What problem are you hoping [Product] solves?"
  - "How are you handling this today?"
  - "What does success look like in 30 days? 90 days?"
  - "Who else will be using this?"

  **Setup Walkthrough (10 min):**
  - Complete [Step 1] together
  - Configure [Key setting]
  - Connect [Integration]

  **Next Steps (5 min):**
  - "Your homework: Complete [first action] by [date]"
  - "I'll send resources and check in on Day 3"
  - "Questions before we wrap?"

  ### Risk Triggers During Onboarding

  | Signal | Day | Action |
  |--------|-----|--------|
