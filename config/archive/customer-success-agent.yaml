  ## L. CUSTOMER SUCCESS FORMULAS

  ### Core Metrics Formulas

  **Customer Lifetime Value (CLV)**
  ```
  CLV = (ARPA × Gross Margin) / Monthly Churn Rate

  Example:
  - ARPA (Avg Revenue Per Account): $10,000/year = $833/month
  - Gross Margin: 80%
  - Monthly Churn Rate: 2%
  - CLV = ($833 × 0.80) / 0.02 = $33,320
  ```

  **Logo Churn Rate (Monthly)**
  ```
  Logo Churn = Churned Customers / Starting Customers

  Example:
  - Starting Customers: 500
  - Churned This Month: 8
  - Logo Churn = 8 / 500 = 1.6%
  ```

  **Dollar/Revenue Churn Rate (Monthly)**
  ```
  Dollar Churn = Churned MRR / Starting MRR

  Example:
  - Starting MRR: $500,000
  - Churned MRR: $12,000
  - Dollar Churn = $12,000 / $500,000 = 2.4%
  ```

  **Net Revenue Retention (NRR)**
  ```
  NRR = (Starting MRR + Expansion - Contraction - Churn) / Starting MRR

  Example:
  - Starting MRR: $100,000
  - Expansion: +$8,000
  - Contraction: -$2,000
  - Churn: -$4,000
  - NRR = ($100,000 + $8,000 - $2,000 - $4,000) / $100,000 = 102%
  ```

  **Gross Revenue Retention (GRR)**
  ```
  GRR = (Starting MRR - Contraction - Churn) / Starting MRR

  Note: GRR can never exceed 100% (no expansion included)

  Example:
  - Starting MRR: $100,000
  - Contraction: -$2,000
  - Churn: -$4,000
  - GRR = ($100,000 - $2,000 - $4,000) / $100,000 = 94%
  ```

  **Expansion Rate**
  ```
  Expansion Rate = Expansion Revenue / Starting Revenue

  Example:
  - Starting MRR: $100,000
  - Expansion MRR: $8,000
  - Expansion Rate = $8,000 / $100,000 = 8%
  ```

  **Time to Value (TTV)**
  ```
  TTV = Date of First Value Event - Contract Start Date

  Example:
  - Contract Start: January 1
  - First Value Event: January 8
  - TTV = 7 days
  ```

  **CSM Efficiency / ARR per CSM**
  ```
  ARR per CSM = Total Managed ARR / CSM FTE Count

  Example:
  - Total Managed ARR: $5,000,000
  - CSM FTEs: 3
  - ARR per CSM = $5,000,000 / 3 = $1,666,667
  ```

  **Cost to Serve (CTS)**
  ```
  CTS = Total CS Department Cost / Number of Customers

  Example:
  - Total CS Cost: $500,000/year
  - Customers: 200
  - CTS = $500,000 / 200 = $2,500/customer/year
  ```

  **Health Score Formula**
  ```
  Health = (Usage × 0.35) + (Engagement × 0.25) + (Relationship × 0.20) + (Outcomes × 0.20)

  Example:
  - Usage Score: 70/100
  - Engagement Score: 80/100
  - Relationship Score: 60/100
  - Outcomes Score: 85/100
  - Health = (70 × 0.35) + (80 × 0.25) + (60 × 0.20) + (85 × 0.20)
  - Health = 24.5 + 20 + 12 + 17 = 73.5/100 (Yellow - Monitor)
  ```

  **Renewal Rate**
  ```
  Renewal Rate = Renewed ARR / Renewable ARR

  Example:
  - Renewable ARR this quarter: $500,000
  - Renewed ARR: $465,000
  - Renewal Rate = $465,000 / $500,000 = 93%
  ```

  **Customer Acquisition Cost Payback**
  ```
  CAC Payback = CAC / (ARPA × Gross Margin)

  Example:
  - CAC: $15,000
  - ARPA: $12,000/year = $1,000/month
  - Gross Margin: 80%
  - CAC Payback = $15,000 / ($1,000 × 0.80) = 18.75 months
  ```

