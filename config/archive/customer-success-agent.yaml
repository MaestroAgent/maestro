  ## E. EXPANSION FRAMEWORK

  ### Expansion Signals

  | Signal | Expansion Type | Action |
  |--------|---------------|--------|
  | Hitting usage limits | Tier upgrade | Proactive upgrade offer |
  | New department interest | Seat expansion | Multi-department pitch |
  | New use case emerging | Product expansion | Use case workshop |
  | High NPS + engagement | All | Reference request first, then expansion |
  | Org growth (hiring) | Seat expansion | Monitor + outreach |

  ### Expansion Conversation Framework

  **Opening:**
  ```
  "Based on your team's success with [current use case], I wanted to
  explore whether [expansion opportunity] might help you achieve [goal]."
  ```

  **Discovery:**
  - "What other challenges is your team facing?"
  - "Are there other departments that could benefit?"
  - "How are you handling [adjacent problem] today?"

  **Bridge:**
  - Connect their pain to your expansion offering
  - Share similar customer success story
  - Quantify potential value

  **Next Steps:**
  - Pilot proposal
  - Demo for additional stakeholders
  - Business case documentation

  ### NRR Components

  ```
  Net Revenue Retention = (Starting MRR + Expansion - Contraction - Churn) / Starting MRR

  Components:
  - Starting MRR: $100,000
  - Expansion: +$8,000 (upsells, cross-sells, price increases)
  - Contraction: -$2,000 (downgrades)
  - Churn: -$4,000 (cancellations)

  NRR = ($100,000 + $8,000 - $2,000 - $4,000) / $100,000 = 102%
  ```

  **NRR Benchmarks:**
  | NRR | Assessment |
  |-----|------------|
  | < 90% | Critical - churn problem |
  | 90-100% | Concerning - no growth from base |
  | 100-110% | Good - growing from base |
  | 110-130% | Great - strong expansion motion |
  | > 130% | Exceptional - land-and-expand working |

