  ## L. EXPERIMENTATION & A/B TESTING

  ### Experiment Design

  **Hypothesis Format:**
  ```
  If we [change],
  then [metric] will [improve/decrease] by [amount]
  because [reason].
  ```

  **Example:**
  ```
  If we add a progress bar to onboarding,
  then onboarding completion will increase by 15%
  because users will have clearer expectations of effort required.
  ```

  ### Sample Size Calculation

  **Formula:**
  ```
  n = (Z_α/2 + Z_β)² × 2 × p × (1-p) / MDE²

  Where:
  - n = sample size per variation
  - Z_α/2 = 1.96 (95% confidence)
  - Z_β = 0.84 (80% power)
  - p = baseline conversion rate
  - MDE = minimum detectable effect
  ```

  **Quick Reference Table:**

  | Baseline | 5% MDE | 10% MDE | 20% MDE |
  |----------|--------|---------|---------|
  | 2% | 310,000 | 77,000 | 19,000 |
  | 5% | 121,000 | 30,000 | 7,500 |
  | 10% | 56,000 | 14,000 | 3,500 |
  | 20% | 25,000 | 6,400 | 1,600 |

  ### Feature Rollout Strategy

  | Phase | Audience | % | Purpose |
  |-------|----------|---|---------|
  | 1 | Internal/Employees | 1% | Catch major bugs |
  | 2 | Beta users | 5% | Early feedback |
  | 3 | Segment of users | 25% | Statistical power |
  | 4 | Half of users | 50% | Confirm at scale |
  | 5 | Everyone | 100% | Full launch |

  **Rollback Criteria:**
  - Error rate increases >0.5%
  - Guardrail metric drops >2%
  - Critical bug discovered
  - Load issues

  ### Guardrail Metrics

  Metrics that should NOT move negatively during experiment:

  | Guardrail | Threshold | Alert |
  |-----------|-----------|-------|
  | Revenue | -0% | Immediate stop |
  | Retention | -2% | Review required |
  | Core engagement | -5% | Review required |
  | Load time | +500ms | Review required |
  | Error rate | +0.5% | Immediate stop |

  ### Experiment Documentation Template

  | Field | Content |
  |-------|---------|
  | Hypothesis | [What we believe and why] |
  | Primary metric | [Single metric to judge success] |
  | Secondary metrics | [Supporting metrics] |
  | Guardrails | [Metrics that can't regress] |
  | Sample size needed | [Calculated requirement] |
  | Duration | [Expected timeline] |
  | Results | [Outcome data] |
  | Decision | [Ship/Kill/Iterate] |
  | Learnings | [What we learned for future] |

  ### Statistical Significance

  **Interpreting Results:**

  | p-value | Confidence | Recommendation |
  |---------|------------|----------------|
  | p < 0.01 | 99% | Strong evidence, ship |
  | p < 0.05 | 95% | Good evidence, ship with monitoring |
  | p < 0.10 | 90% | Weak evidence, consider extending |
  | p > 0.10 | <90% | Not significant, don't ship |

  **Common Pitfalls:**
  - Peeking: Looking at results before sample size reached
  - Multiple comparisons: Testing many metrics inflates false positives
  - Novelty effects: New UI gets temporary engagement boost
  - Day-of-week effects: Include full weeks in test duration

