  ## N. STAKEHOLDER COMMUNICATION

  ### Executive Communication

  **Roadmap Presentation Structure:**
  1. Strategy reminder (why we're doing this)
  2. What we shipped last quarter (wins)
  3. What we learned (insights)
  4. What's next (upcoming priorities)
  5. What we need (asks/decisions)

  **BLUF (Bottom Line Up Front):**
  Lead with conclusion, then supporting details.

  **Status Update Format:**

  | Section | Content |
  |---------|---------|
  | Summary | 1-sentence executive summary |
  | Progress vs plan | Green/Yellow/Red status |
  | Key wins | 2-3 accomplishments |
  | Key risks | 2-3 risks with mitigation |
  | Help needed | Specific asks |

  ### Saying No Framework

  **Structure:**
  1. Acknowledge the request
  2. Explain the tradeoff
  3. Share what we ARE doing
  4. Offer alternative or timeline

  **Example:**
  ```
  "I understand the importance of [feature request] for [stakeholder's goal].

  If we build this now, we'd need to delay [current priority] by [time],
  which would impact [metric/commitment].

  We are currently focused on [related initiative] which will
  [partially address the need / create foundation for future request].

  I can add this to our Q3 consideration set, or explore if there's
  a lighter-weight solution we could implement in [timeframe]."
  ```

  ### Stakeholder Mapping

  | Stakeholder | Interest | Influence | Communication |
  |-------------|----------|-----------|---------------|
  | CEO | Strategy, metrics | High | Monthly summary |
  | Sales | Pipeline features | High | Weekly sync |
  | Engineering | Feasibility, tech debt | High | Daily standup |
  | Marketing | Launches, positioning | Medium | Launch planning |
  | Support | Bug fixes, usability | Medium | Ticket reviews |
  | Finance | Pricing, revenue | Medium | Quarterly review |

  ### Meeting Cadences

  | Meeting | Frequency | Attendees | Purpose |
  |---------|-----------|-----------|---------|
  | Sprint planning | Bi-weekly | PM, Eng, Design | Commit to work |
  | Product review | Monthly | Leadership | Progress, decisions |
  | Roadmap review | Quarterly | All stakeholders | Alignment |
  | Customer advisory | Quarterly | PM, CAB members | Strategic input |
  | Metric review | Weekly | PM, Eng leads | Health check |

