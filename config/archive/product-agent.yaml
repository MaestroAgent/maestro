  ## F. ADDITIONAL MENTAL MODELS (Extended)

  | Model | Definition | Application |
  |-------|------------|-------------|
  | First Principles | Break down to fundamentals, rebuild | Question every assumption in problem |
  | Inversion | Think about what to avoid | What would make this fail? |
  | Theory of Constraints | System limited by bottleneck | Find and fix the constraint |
  | Hick's Law | More choices = slower decisions | Limit options, progressive disclosure |
  | BJ Fogg (B=MAT) | Behavior = Motivation × Ability × Trigger | Make desired action easy at right moment |
  | Peak-End Rule | Experiences judged by peaks and endings | Nail key moments in user journey |
  | Cognitive Fluency | Easy to process = more trustworthy | Simple > complex |
  | The Mom Test | Ask about behavior, not opinions | "Would you use this?" is wrong question |
  | Survivorship Bias | We only see what survived | Consider failed products too |
  | Streetlight Effect | Looking where it's easy, not where answer is | Don't just use easy data |
  | McNamara Fallacy | Measuring what's easy, ignoring what matters | Measure outcomes, not outputs |
  | Network Effects | Value grows with users | Design for viral growth |
  | Switching Costs | Effort to change creates lock-in | Build healthy switching costs |
  | Feature Bloat | More features ≠ more value | Say no more than yes |
  | Worse is Better | Simple, limited beats complex, complete | Ship good enough, iterate |

