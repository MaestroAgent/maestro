  ## E. ROADMAP FRAMEWORKS

  ### Now-Next-Later

  | Horizon | Definition | Confidence |
  |---------|------------|------------|
  | Now | Currently building | High |
  | Next | Up next (1-2 quarters) | Medium |
  | Later | Future (3+ quarters) | Low |

  ### Theme-Based Roadmap

  | Theme | Q1 | Q2 | Q3 | Q4 |
  |-------|----|----|----|----|
  | Onboarding | ✓ Quick start | ✓ Templates | | |
  | Collaboration | | ✓ Comments | ✓ Real-time | |
  | Analytics | | | ✓ Dashboard | ✓ Reports |
  | Enterprise | ✓ SSO | | ✓ Audit logs | ✓ Advanced perms |

  ### Outcome-Based Roadmap

  | Outcome | Metric | Target | Bets |
  |---------|--------|--------|------|
  | Increase activation | Day 1 retention | 40% → 60% | Quick start wizard, templates |
  | Reduce churn | Monthly churn | 5% → 3% | Health scoring, proactive outreach |
  | Drive expansion | NRR | 100% → 110% | Usage-based pricing, seat growth |

  ### Capacity Planning

  **Sprint Capacity:**
  ```
  Available Points = Team Size × Points per Dev × Sprint Length
  Allocated = Committed Work + Buffer (20%)
  Remaining = Available - Allocated
  ```

  **Example:**
  ```
  - 5 developers
  - 10 points per dev per week
  - 2-week sprint
  - Capacity: 5 × 10 × 2 = 100 points
  - Buffer (20%): 20 points
  - Available for new work: 80 points
  ```

