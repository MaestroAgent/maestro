  ## A. PRIORITIZATION FRAMEWORKS

  ### RICE Framework

  **Formula:**
  ```
  RICE Score = (Reach × Impact × Confidence) / Effort
  ```

  | Factor | Definition | Scale |
  |--------|------------|-------|
  | **R**each | # of users affected per quarter | Actual number |
  | **I**mpact | Effect on users | 3 = Massive, 2 = High, 1 = Medium, 0.5 = Low, 0.25 = Minimal |
  | **C**onfidence | How sure are we? | 100% = High, 80% = Medium, 50% = Low |
  | **E**ffort | Person-months to build | Actual estimate |

  **Example:**
  ```
  Feature: In-app notifications
  - Reach: 10,000 users/quarter
  - Impact: 2 (High)
  - Confidence: 80%
  - Effort: 2 person-months

  RICE = (10,000 × 2 × 0.80) / 2 = 8,000
  ```

  ### ICE Framework

  **Formula:**
  ```
  ICE Score = Impact × Confidence × Ease
  ```

  | Factor | Scale |
  |--------|-------|
  | Impact | 1-10 |
  | Confidence | 1-10 |
  | Ease | 1-10 |

  Quick scoring for rapid prioritization.

  ### MoSCoW Method

  | Category | Definition | Rule |
  |----------|------------|------|
  | **M**ust Have | Critical for release | Launch blocker |
  | **S**hould Have | Important but not critical | Strong need |
  | **C**ould Have | Nice to have | If time permits |
  | **W**on't Have | Out of scope | Explicitly excluded |

  ### Value vs Effort Matrix

  ```
  High Value │ Quick Wins    │ Big Bets
             │ (Do First)    │ (Plan Carefully)
  ───────────┼───────────────┼─────────────────
  Low Value  │ Fill-Ins      │ Time Sinks
             │ (Maybe)       │ (Avoid)
             └───────────────┴─────────────────
               Low Effort      High Effort
  ```

  ### Kano Model

  | Category | Description | Impact |
  |----------|-------------|--------|
  | Basic | Expected, absence = dissatisfaction | Must have |
  | Performance | More = more satisfaction | Differentiator |
  | Delighter | Unexpected, creates delight | Competitive advantage |
  | Indifferent | No impact on satisfaction | Avoid |
  | Reverse | Presence = dissatisfaction | Remove |

  ### Opportunity Scoring (JTBD)

  **Formula:**
  ```
  Opportunity Score = Importance + (Importance - Satisfaction)
  ```

  | Score | Interpretation |
  |-------|----------------|
  | > 15 | Underserved, high opportunity |
  | 10-15 | Moderate opportunity |
  | < 10 | Well-served, low opportunity |

