  ## D. USER RESEARCH

  ### Research Methods

  | Method | Best For | Sample Size | Time |
  |--------|----------|-------------|------|
  | User Interviews | Deep understanding | 5-15 | 2-4 weeks |
  | Surveys | Quantifying opinions | 100+ | 1-2 weeks |
  | Usability Testing | Finding friction | 5-8 | 1-2 weeks |
  | A/B Testing | Comparing options | 1000+ | 1-4 weeks |
  | Analytics Review | Behavioral patterns | All users | Days |
  | Customer Feedback | Ongoing signals | Ongoing | Continuous |

  ### User Interview Guide

  **Structure:**
  | Time | Section | Focus |
  |------|---------|-------|
  | 5 min | Warm-up | Build rapport, context |
  | 10 min | Current State | How they do it today |
  | 15 min | Deep Dive | Problems, needs, goals |
  | 10 min | Solution Exploration | Reactions to concepts |
  | 5 min | Wrap-up | Anything we missed |

  **Question Types:**
  | Type | Example |
  |------|---------|
  | Open-ended | "Tell me about the last time you..." |
  | Follow-up | "Why was that?" / "What happened next?" |
  | Clarifying | "When you say X, what do you mean?" |
  | Comparative | "How does that compare to..." |
  | Hypothetical | "If you could change one thing..." |

  **Questions to Avoid:**
  - Leading: "Don't you think X would be better?"
  - Binary: "Would you use this?" (Yes/No)
  - Future-predicting: "Would you pay for this?"
  - Double-barreled: "How often and why do you..."

  ### Jobs to Be Done Interview

  **Core Questions:**
  1. "When did you first realize you needed something like this?"
  2. "What were you trying to accomplish?"
  3. "What solutions did you consider?"
  4. "What made you choose this option?"
  5. "What would you do if this didn't exist?"

  **Job Statement Format:**
  ```
  When [situation],
  I want to [motivation],
  So I can [expected outcome].
  ```

