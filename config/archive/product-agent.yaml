  ## J. PRODUCT STRATEGY

  ### Vision → Strategy → Roadmap Cascade

  ```
  Vision      → What world are we creating?        → 3-5 year horizon
  Strategy    → How will we win?                   → 1-2 year horizon
  Roadmap     → What are we building?              → Quarterly
  Now         → What are we doing this sprint?     → Weekly
  ```

  ### Product Vision Template

  ```
  For [target customer]
  Who [statement of need]
  [Product name] is a [category]
  That [key benefit]
  Unlike [competitor]
  Our product [differentiation]
  ```

  **Example:**
  ```
  For small business owners
  Who struggle to manage their finances
  Clarity is a financial management platform
  That automatically categorizes expenses and predicts cash flow
  Unlike QuickBooks or spreadsheets
  Our product requires no accounting knowledge and learns your business
  ```

  ### Product-Market Fit Measurement

  **Sean Ellis Test (Primary):**

  Survey users: "How would you feel if you could no longer use [product]?"

  | Response | Interpretation |
  |----------|----------------|
  | Very disappointed | Target 40%+ for PMF |
  | Somewhat disappointed | Interested but replaceable |
  | Not disappointed | Not core users |
  | N/A - No longer use | Churned |

  **Retention Curve Analysis:**
  - Flattening above 0% = PMF signal
  - Continuous decline = No PMF

  **Other PMF Signals:**
  - Organic growth / word of mouth
  - Low churn in early cohorts
  - Pull for new features vs push
  - Customers describing the product accurately
  - Willingness to pay without heavy discounting

  ### Strategic Frameworks

  **Ansoff Matrix (Growth Directions):**

  |  | Existing Products | New Products |
  |---|---|---|
  | **Existing Markets** | Market Penetration | Product Development |
  | **New Markets** | Market Development | Diversification |

  **Porter's Generic Strategies:**

  | Strategy | Approach | Risk |
  |----------|----------|------|
  | Cost Leadership | Lowest cost producer | Race to bottom |
  | Differentiation | Unique value proposition | Premium erosion |
  | Focus (Niche) | Serve specific segment exceptionally | Market too small |

  **Moats/Defensibility Types:**

  | Moat Type | Definition | Example |
  |-----------|------------|---------|
  | Network Effects | Value grows with users | Social networks, marketplaces |
  | Switching Costs | Effort to change products | Data lock-in, integrations |
  | Scale Economies | Unit cost decreases with scale | Cloud infrastructure |
  | Brand | Trusted reputation | Enterprise SaaS |
  | Regulatory/IP | Legal protection | Patents, compliance |
  | Data/Learning | Proprietary insights | ML models, benchmarks |

  ---

  ## K. PRODUCT-LED GROWTH (PLG)

  ### PLG Fundamentals

  **Definition:** Product is the primary driver of acquisition, activation, retention, and expansion.

  **PLG vs Sales-Led:**

  | Aspect | PLG | Sales-Led |
  |--------|-----|-----------|
  | First touch | Self-serve signup | Sales outreach |
  | Time to value | Minutes to hours | Days to weeks |
  | Conversion driver | Product experience | Sales relationship |
  | Expansion | Self-serve + usage | Account management |
  | CAC | Lower | Higher |
  | Scalability | High | Limited by headcount |

  ### Free vs Trial Decision Matrix

  | Factor | Freemium | Free Trial |
  |--------|----------|------------|
  | Time to value | Quick (<5 min) | Takes time |
  | Marginal cost | Near zero | Acceptable |
  | Viral potential | High | Lower |
  | Sales motion | Self-serve | Sales-assisted |
  | Land and expand | Yes | Less common |
  | Best for | B2C, SMB, prosumer | Mid-market, enterprise |

  ### Product-Qualified Lead (PQL) Scoring

  **Definition:** Users who have experienced value and show buying signals.

  **Signal Categories:**

  | Signal Type | Examples | Weight |
  |-------------|----------|--------|
  | Usage | Key feature used 5+ times | High |
  | Engagement | Active 5+ days | Medium |
  | Expansion | Invited 3+ users | High |
  | Limits | Hit usage ceiling | Very High |
  | Firmographics | Target company size | Medium |

  **Example PQL Scoring Model:**

  | Signal | Points |
  |--------|--------|
  | Invited 3+ users | +20 |
  | Used [key feature] 5+ times | +15 |
  | Hit usage limit | +25 |
  | Target company size match | +10 |
  | Active 5+ days | +15 |
  | Viewed pricing page | +10 |
  | **PQL Threshold** | **50+** |

  ### Growth Loops

  **Acquisition Loop:**
  ```
  User → Action → New User → Action → New User...

  Example: User invites team → Team joins → Team invites more
  ```

  **Engagement Loop:**
  ```
  User → Action → Value → Return → Action → Value...

  Example: User creates content → Gets views → Motivated to create more
  ```

  **Monetization Loop:**
  ```
  Free → Value → Paid → More Value → Expand

  Example: Free trial → Success → Upgrade → More features → Add seats
  ```

  ### Viral Coefficient

  **Formula:**
  ```
  K = Invites per user × Conversion rate

  K > 1  = Viral growth (exponential)
  K = 0.5 = 50% organic growth contribution
  K < 0.3 = Need paid acquisition
  ```

  **Example:**
  ```
  - Average user invites 5 people
  - 20% of invites convert
  - K = 5 × 0.20 = 1.0 (break-even viral)
  ```

  ### Freemium Optimization

  **Feature Gating Principles:**

  | Gate Type | Purpose | Example |
  |-----------|---------|---------|
  | Usage limits | Natural upgrade trigger | 10 projects free |
  | Feature limits | Premium differentiation | No advanced analytics |
  | Collaboration limits | Encourage team adoption | 3 users max |
  | Support limits | Cost management | Community only |

