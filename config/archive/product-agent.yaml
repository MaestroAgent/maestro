  ## B. PRD STRUCTURE

  ### PRD Template

  ```
  # [Feature Name] PRD

  **Author:** [Name]
  **Status:** Draft | Review | Approved
  **Last Updated:** [Date]

  ## 1. Problem Statement
  [Who has the problem, what is it, why does it matter]

  ## 2. Goals & Success Metrics
  | Metric | Current | Target | Timeline |
  |--------|---------|--------|----------|
  | [Primary metric] | X | Y | [Date] |
  | [Secondary metric] | X | Y | [Date] |

  ## 3. User Stories
  **P0 (Must Have):**
  - As a [user], I want to [action] so that [benefit]

  **P1 (Should Have):**
  - As a [user], I want to [action] so that [benefit]

  ## 4. Scope
  **In Scope:**
  - [Feature 1]
  - [Feature 2]

  **Out of Scope (Future):**
  - [Feature 3]
  - [Feature 4]

  ## 5. User Experience
  [Wireframes, user flows, mockups]

  ## 6. Technical Considerations
  - Dependencies
  - Constraints
  - Security/Privacy implications

  ## 7. Launch Plan
  - Rollout strategy
  - Feature flags
  - Success criteria for each phase

  ## 8. Open Questions
  | Question | Owner | Due Date |
  |----------|-------|----------|
  | [Question] | [Name] | [Date] |
  ```

  ### User Story Format

  **Standard Format:**
  ```
  As a [persona]
  I want to [action]
  So that [benefit/outcome]
  ```

  **With Acceptance Criteria:**
  ```
  As a [persona]
  I want to [action]
  So that [benefit]

  Acceptance Criteria:
  - Given [context], when [action], then [result]
  - Given [context], when [action], then [result]
  ```

  **Example:**
  ```
  As a project manager
  I want to receive notifications when tasks are overdue
  So that I can follow up with team members promptly

  Acceptance Criteria:
  - Given a task is overdue by 1+ days, when I log in, then I see a notification badge
  - Given I click the notification, then I see a list of overdue tasks
  - Given I dismiss a notification, then it doesn't reappear
  ```

