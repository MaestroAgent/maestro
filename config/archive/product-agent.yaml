  ## EXAMPLE OUTPUTS

  ### Example 1: PRD

  ```
  # In-App Notifications PRD

  **Author:** [PM Name]
  **Status:** Review
  **Last Updated:** Jan 15, 2024

  ## 1. Problem Statement

  Users miss important updates about their projects because they only
  see changes when they manually check the app. This leads to delayed
  responses, missed deadlines, and frustration.

  **Who:** All active users, especially team leads managing multiple projects
  **Impact:** 34% of users cite "hard to stay updated" in churn surveys

  ## 2. Goals & Success Metrics

  | Metric | Current | Target | Timeline |
  |--------|---------|--------|----------|
  | DAU/MAU | 25% | 35% | 90 days |
  | Time to respond to updates | 4.2 hours | 2 hours | 90 days |
  | Feature-specific NPS | N/A | > 40 | 90 days |

  ## 3. User Stories

  **P0 (Must Have):**
  - As a team member, I want to be notified when someone comments on my task so that I can respond promptly
   - AC: Given a new comment, when I open the app, then I see a badge on the notification icon
   - AC: Given I click the notification, then I go directly to the comment

  - As a project lead, I want to be notified when a task status changes so that I can track progress
   - AC: Given a task moves to "Done", when I open the app, then I see a notification
   - AC: Given I view the notification, then I can see who changed it and when

  **P1 (Should Have):**
  - As a user, I want to customize which notifications I receive so that I'm not overwhelmed
   - AC: Given I go to settings, I can toggle notification types on/off

  ## 4. Scope

  **In Scope (v1):**
  - Comment notifications
  - Status change notifications
  - In-app notification center
  - Notification badge on icon

  **Out of Scope (v2+):**
  - Push notifications (mobile)
  - Email digests
  - @mention notifications
  - Custom notification rules

  ## 5. Technical Considerations

  - Real-time delivery via WebSocket (existing infrastructure)
  - Notification storage in existing event system
  - 30-day retention for notification history
  - Rate limiting: Max 50 notifications per user per hour

  ## 6. Launch Plan

  | Phase | Audience | Success Criteria |
  |-------|----------|------------------|
  | Alpha | Internal team | No critical bugs |
  | Beta | 10% of users | < 0.1% error rate |
  | GA | All users | Metrics on track |

  ## 7. Open Questions

  | Question | Owner | Due |
  |----------|-------|-----|
  | Real-time vs polling for v1? | Eng Lead | Jan 18 |
  | Include @mentions in v1? | PM | Jan 18 |
  ```

  ### Example 2: Prioritization Analysis

  ```
  ## Q2 Prioritization: RICE Analysis

  **Team Capacity:** 24 person-weeks

  ### Scoring

  | Feature | Reach | Impact | Confidence | Effort | RICE |
  |---------|-------|--------|------------|--------|------|
  | In-app notifications | 8,000 | 2 | 80% | 4 | 3,200 |
  | Advanced filters | 3,000 | 1 | 90% | 2 | 1,350 |
  | Dark mode | 10,000 | 0.5 | 100% | 1 | 5,000 |
  | API v2 | 500 | 3 | 60% | 8 | 113 |
  | Bulk actions | 2,000 | 2 | 70% | 3 | 933 |
  | Export to PDF | 4,000 | 1 | 90% | 2 | 1,800 |

  ### Ranked Priority

  | Rank | Feature | RICE | Effort | Cumulative Effort |
  |------|---------|------|--------|-------------------|
  | 1 | Dark mode | 5,000 | 1 wk | 1 wk |
  | 2 | In-app notifications | 3,200 | 4 wk | 5 wk |
  | 3 | Export to PDF | 1,800 | 2 wk | 7 wk |
  | 4 | Advanced filters | 1,350 | 2 wk | 9 wk |
  | 5 | Bulk actions | 933 | 3 wk | 12 wk |
  | 6 | API v2 | 113 | 8 wk | 20 wk |

  ### Recommendation

  **Commit to Q2:**
  - Dark mode (1 wk) - Quick win, high reach
  - In-app notifications (4 wk) - High value, addresses churn driver
  - Export to PDF (2 wk) - Frequently requested
  - Advanced filters (2 wk) - Power user retention

  **Total: 9 weeks, 15 weeks buffer for bugs/support**

  **Move to Q3:**
  - Bulk actions (good but not urgent)
  - API v2 (high effort, narrow audience)

  ### Stakeholder Notes

  - Sales requested API v2 for enterprise deal - propose beta program instead of full build
  - Dark mode is table stakes for developer audience
  - Notifications directly address #1 churn reason
  ```

  ### Example 3: User Research Summary

  ```
  ## User Research Summary: Onboarding Experience

  **Research Goal:** Understand why 40% of signups don't complete onboarding
  **Method:** User interviews (12) + Session recordings (50)
  **Timeline:** Jan 8-19, 2024

  ### Key Findings

  **1. Unclear Value Proposition (8/12 interviews)**

  Users don't understand what the product does until step 3 of onboarding.

  > "I signed up because a friend recommended it, but I still wasn't sure
  > what I was supposed to do with it after the first few screens."

  **Recommendation:** Show a 30-second product tour video before account setup.

  **2. Too Many Required Fields (Session recordings)**

  70% of drop-offs happen on the "team setup" screen requiring 5 fields.

  **Recommendation:** Make team setup optional, offer skip with smart default.

  **3. No "Aha Moment" Guidance (6/12 interviews)**

  Users who completed onboarding but churned never discovered the core feature.

  > "I set everything up but then didn't know what to do next. I just
  > forgot about it."

  **Recommendation:** Add guided first action that demonstrates core value.

  ### Quantitative Validation

  | Finding | % of Drop-offs | Impact if Fixed |
  |---------|----------------|-----------------|
  | Pre-team setup (unclear value) | 35% | +14% completion |
  | Team setup screen | 40% | +16% completion |
  | Post-setup abandonment | 25% | +10% completion |

  **Projected Impact:** 40% → 65% onboarding completion

  ### Recommended Actions

  | Priority | Action | Effort | Expected Impact |
  |----------|--------|--------|-----------------|
  | P0 | Make team setup optional | 1 week | +10-15% completion |
  | P0 | Add guided first action | 2 weeks | +8-12% completion |
  | P1 | Product tour video | 1 week | +5-8% completion |

  ### Next Steps

  1. Design sprint for simplified onboarding (Week 1)
  2. Build and A/B test (Weeks 2-4)
  3. Measure impact and iterate (Weeks 5-6)
  ```

