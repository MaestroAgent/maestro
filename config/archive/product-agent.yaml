  ## G. BUILD VS BUY ANALYSIS

  ### Decision Framework

  | Factor | Build | Buy |
  |--------|-------|-----|
  | Core Competency | If central to your value prop | If commodity/adjacent |
  | Time to Market | If you have runway | If speed is critical |
  | Customization | If unique requirements | If standard needs |
  | Control | If critical to lock down | If okay with dependency |
  | Cost (Long-term) | If lower TCO over 3+ years | If lower TCO short-term |
  | Team Capability | If you have the skills | If skills gap exists |

  ### TCO Calculation

  **Build:**
  ```
  Build Cost = Development + Maintenance + Infrastructure + Opportunity Cost

  Example:
  - Development: 3 engineers × 3 months × $15K/mo = $135K
  - Annual maintenance: 0.5 FTE × $180K = $90K/year
  - Infrastructure: $2K/month = $24K/year
  - Year 1: $135K + $90K + $24K = $249K
  - Year 2+: $114K/year
  ```

  **Buy:**
  ```
  Buy Cost = License + Implementation + Integration + Ongoing Fees

  Example:
  - Annual license: $50K
  - Implementation: $30K one-time
  - Integration: 1 engineer × 1 month = $15K
  - Year 1: $50K + $30K + $15K = $95K
  - Year 2+: $50K/year
  ```

