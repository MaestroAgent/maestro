  ## F. MENTAL MODELS FOR PRODUCT

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Jobs to Be Done | People hire products for outcomes | Focus on the job, not the feature |
  | Pareto (80/20) | 20% of features drive 80% of value | Ruthless prioritization |
  | Minimum Viable Product | Smallest thing to learn | Ship to learn, not to impress |
  | Opportunity Cost | Building X means not building Y | Every feature has a cost |
  | Sunk Cost Fallacy | Past investment shouldn't dictate future | Kill features that don't work |
  | Second-Order Effects | Features have unintended consequences | Consider system-wide impact |
  | Lindy Effect | What's survived will survive | Boring tech choices often win |
  | Curse of Knowledge | Experts forget what it's like not to know | Fresh eyes find usability issues |
  | Goodhart's Law | When a measure becomes a target, it ceases to be a good measure | Don't over-optimize one metric |
  | Conway's Law | Systems mirror org structure | Org design affects product design |
  | Kano Model | Not all features are equal | Basic vs Performance vs Delight |
  | Innovator's Dilemma | Incumbents struggle with disruption | New markets require new approaches |

