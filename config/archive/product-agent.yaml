  ## C. PRODUCT METRICS FRAMEWORK

  ### Pirate Metrics (AARRR)

  | Stage | Metric | Example |
  |-------|--------|---------|
  | **A**cquisition | How do users find us? | Signups, visits, downloads |
  | **A**ctivation | Do they have a good first experience? | Completed onboarding, first action |
  | **R**etention | Do they come back? | DAU/MAU, cohort retention |
  | **R**evenue | Do they pay? | Conversion rate, ARPU |
  | **R**eferral | Do they tell others? | Referral rate, NPS |

  ### North Star Metric

  **Criteria for a good North Star:**
  - Measures customer value delivered
  - Leading indicator of revenue
  - Actionable by the team
  - Easy to understand

  **Examples by business type:**
  | Business | North Star |
  |----------|------------|
  | SaaS | Weekly Active Users × Key Actions |
  | Marketplace | Gross Merchandise Value |
  | Content | Minutes Watched |
  | E-commerce | Purchases per Active User |
  | Social | Daily Active Users × Posts |

  ### Feature Success Metrics

  | Metric Type | What It Measures | Example |
  |-------------|------------------|---------|
  | Adoption | Are users using it? | % of users who tried feature |
  | Engagement | How much do they use it? | Actions per user per week |
  | Retention | Do they keep using it? | Week-over-week retention |
  | Satisfaction | Do they like it? | Feature-specific CSAT/NPS |
  | Business Impact | Does it move the needle? | Impact on North Star |

