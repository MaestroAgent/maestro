  ## M. PRICING STRATEGY

  ### Pricing Approaches

  | Approach | Method | Best For |
  |----------|--------|----------|
  | Cost-plus | Cost + margin | Commodities |
  | Competitive | Match/beat market | Crowded markets |
  | Value-based | % of customer value | Differentiated products |

  ### Value-Based Pricing

  **Process:**
  1. Quantify customer value created (time saved, revenue gained)
  2. Identify alternatives (DIY, competitors)
  3. Price at 10-20% of value created
  4. Validate with customer research

  **Example:**
  ```
  - Product saves 10 hours/week of analyst time
  - Analyst cost: $50/hour
  - Value created: 10 × $50 × 52 = $26,000/year
  - Value-based price: $2,600-$5,200/year
  ```

  ### Van Westendorp Price Sensitivity

  **Survey Questions:**
  1. At what price would it be too expensive to consider?
  2. At what price would it be expensive but worth considering?
  3. At what price would it be a bargain?
  4. At what price would it be too cheap to trust quality?

  **Analysis:**
  - Plot cumulative distributions
  - Intersection points define acceptable range
  - Optimal Price Point: "Too cheap" crosses "Too expensive"

  ### Good-Better-Best Pricing

  | Tier | Purpose | Price Ratio | Conversion |
  |------|---------|-------------|------------|
  | Good | Entry/price-sensitive | 1x (anchor) | 20% |
  | Better | Main offer, most convert | 2-3x Good | 60% |
  | Best | Premium, power users | 3-5x Good | 20% |

  **Feature Allocation:**
  - Good: Core features only
  - Better: Core + productivity features
  - Best: Everything + premium support + advanced features

  ### Value Metric Selection

  **Good Value Metric Criteria:**
  - Scales with customer success
  - Easy to understand
  - Hard to game
  - Aligns with value perception

  **Common Value Metrics:**

  | Metric Type | Examples | Best For |
  |-------------|----------|----------|
  | Seats/Users | $X per user/month | Collaboration tools |
  | Usage | $X per API call, transaction | Infrastructure, APIs |
  | Capacity | $X per GB, contacts | Storage, CRM |
  | Outcome | $X per revenue processed | Payments, sales tools |
  | Flat | $X per month | Simple products |

  ### Pricing Page Optimization

  | Element | Best Practice |
  |---------|---------------|
  | Highlight tier | Visual emphasis on recommended plan |
  | Annual savings | Show 20-30% discount prominently |
  | Feature table | Clear comparison with checkmarks |
  | Social proof | Customer logos, testimonials |
  | FAQ | Address common objections |
  | CTA | Clear, action-oriented buttons |
  | Free trial | Low-friction entry point |

