  ## I. RECRUITING PSYCHOLOGY (Mental Models)

  ### Candidate Decision Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Loss Aversion | Fear of missing out > desire for gain | "This role won't be open long" |
  | Social Proof | Others' choices influence decisions | "3 of your former colleagues joined us" |
  | Anchoring | First number sets expectations | Lead with strong offer, not lowball |
  | Reciprocity | Favors create obligation | Give value (intros, advice) before asking |
  | Commitment | Small yeses lead to big yeses | Get incremental commitment at each stage |
  | Scarcity | Limited availability increases desire | "We're only hiring one person for this" |
  | Authority | Experts are trusted | Highlight credentials, company prestige |
  | FOMO | Fear of missing opportunity | Create urgency around timeline |
  | Endowment Effect | We overvalue what we already have | Help them mentally "own" the role |
  | Peak-End Rule | People remember peaks and endings | Make final interview memorable |
  | Autonomy Bias | People want control over decisions | Give them options, not ultimatums |
  | Status Quo Bias | Change feels risky, staying feels safe | Reduce friction, de-risk the move |

  ### Interview Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Halo Effect | One positive trait colors all judgment | Use structured scoring to prevent |
  | Confirmation Bias | We seek evidence for existing beliefs | Force "disconfirming evidence" search |
  | Similarity Bias | We prefer people like ourselves | Diverse panels, structured criteria |
  | First Impression Bias | Early moments disproportionately influence | Delay judgment, complete scorecards |
  | Contrast Effect | Previous candidate affects current rating | Calibrate against scorecard, not other candidates |
  | Attribution Error | We over-attribute to personality vs situation | Focus on specific behaviors, not impressions |
  | Recency Bias | Recent information weighs more heavily | Take notes throughout, not just at end |
  | Horn Effect | One negative trait colors all judgment | Use structured rubrics, multiple data points |
  | Pattern Matching | We see patterns even when none exist | Require specific behavioral evidence |
  | Anchoring in Scoring | First rating affects subsequent ratings | Score independently before discussion |

  ### Sourcing Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Passive vs Active | Best candidates often aren't looking | Invest in passive sourcing |
  | Network Effects | Great people know great people | Referral programs, alumni networks |
  | Employer Brand | Reputation precedes you | Invest in Glassdoor, content, culture |
  | Talent Density | A-players attract A-players | Maintain high bar to attract high bar |
  | Mere Exposure Effect | Familiarity breeds liking | Multiple touchpoints over time |
  | Availability Heuristic | What's top of mind seems more common | Stay visible to target candidates |
  | Bandwagon Effect | Momentum creates more momentum | Publicize hiring wins and growth |

  ### Closing Psychology

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Decision Fatigue | Too many options paralyze | Simplify offer, reduce complexity |
  | Counter-Offer Risk | Current employer will fight back | Pre-handle before offer stage |
  | Family Influence | Spouses/partners affect decisions | Include them in process |
  | Risk Aversion | Candidates fear making wrong choice | Reduce perceived risk (trial periods, etc.) |
  | Sunk Cost | Time invested increases commitment | Longer processes create commitment |
  | Present Bias | Near-term rewards weighted heavily | Emphasize immediate benefits |
  | Ambiguity Aversion | Unknown risks feel worse than known | Be transparent about challenges |
  | Temporal Discounting | Future rewards worth less than present | Make equity feel tangible |

