  ## M. CANDIDATE EXPERIENCE

  ### Communication Cadence

  | Touchpoint | Timing | Channel |
  |------------|--------|---------|
  | Application Received | <24 hours | Email (automated OK) |
  | Rejection (Resume) | Within 5 business days | Email |
  | Interview Scheduling | 48+ hours notice | Email + calendar |
  | Interview Confirmation | 24 hours before | Email reminder |
  | Post-Interview Update | Within 3 business days | Email or call |
  | Rejection (After Interview) | Within 1 week | Phone for late-stage, email for early |
  | Offer | Within 2 days of decision | Phone first, then written |
  | Post-Offer Follow-Up | Every 2-3 days until decision | Call or text |

  ### Rejection Best Practices

  **Always:**
  - Close the loop (never ghost)
  - Be timely (within 1 week)
  - Thank them for their time
  - Leave door open for future roles
  - Offer to stay connected

  **For Phone Rejections (anyone who interviewed):**
  - Schedule call, don't surprise them
  - Be direct but kind
  - Provide specific feedback when possible (legal review first)
  - Offer to answer questions
  - End on positive note

  **For Email Rejections:**
  - Personalize beyond template
  - Be clear it's a no
  - Provide constructive framing
  - Include next steps if any

  ### Interview Prep Support

  | Stage | Materials to Provide |
  |-------|----------------------|
  | Initial Screen | Role overview, company background, interviewer bio |
  | Technical | Format expectations, tools/environment, time limits |
  | Onsite/Panel | Schedule, interviewer bios, competencies assessed |
  | Executive | Company strategy context, exec background |

  ### Candidate NPS Benchmarks

  | Score | Rating | Action |
  |-------|--------|--------|
  | 9-10 | Promoter | Ask for referrals, testimonials |
  | 7-8 | Passive | Understand what could be better |
  | 0-6 | Detractor | Immediate follow-up, process review |

  Target: >60 NPS for candidates (hired and not hired)

  ---

  ## N. RECRUITING METRICS & PRODUCTIVITY

  ### Recruiter Productivity Benchmarks

  | Metric | Junior Recruiter | Senior Recruiter | Lead/Manager |
  |--------|------------------|------------------|--------------|
  | Reqs Carried | 15-20 | 20-30 | 8-12 (complex) |
  | Hires/Month | 2-3 | 4-6 | 2-3 (exec) |
  | Pipeline/Req | 50-100 | 30-50 | 20-30 |
  | Time to Fill | 45-60 days | 30-45 days | 60-90 days |
  | Screens/Day | 6-8 | 8-10 | 4-6 |
  | Outreach/Day | 50-75 | 30-50 | 15-25 |

  ### Quality of Hire Calculation

  Quality of Hire = (Performance + Retention + HM Satisfaction + Ramp Speed) / 4

  | Component | How to Measure | Weight |
  |-----------|----------------|--------|
  | Performance | Performance rating at 6/12 months | 30% |
  | Retention | Still employed at 12 months | 25% |
  | Hiring Manager Satisfaction | Survey score | 25% |
  | Ramp Speed | Time to full productivity | 20% |

  **Targets:**
  - New Hire Retention: >85% at 12 months
  - Hiring Manager Satisfaction: >4.0/5.0
  - Time to Productivity: <90 days
  - Performance Rating: >3.5/5.0

  ### Pipeline Health Metrics

  | Metric | Formula | Healthy Range |
  |--------|---------|---------------|
  | Pipeline Coverage | Candidates in Pipeline / Open Reqs | 3:1 to 5:1 |
  | Qualified Pipeline | Candidates Past Screen / Open Reqs | 2:1 to 3:1 |
  | Interview Velocity | Interviews Conducted / Week | Varies by req volume |
  | Stage Aging | Days in Each Stage | <7 days per stage |
  | Ghost Rate | Candidates Dropped / Total Pipeline | <15% |

  ### Cost Metrics

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | Cost per Hire | Total Recruiting Cost / Hires | $3,000-$5,000 (tech), $15,000+ (exec) |
  | Cost per Qualified Candidate | Sourcing Cost / Qualified Candidates | $100-$300 |
  | Agency Fee % | Agency Fees / Total Comp | 15-25% of first year comp |
  | Recruiter Efficiency | Hires / Recruiters | 30-50 hires/year/recruiter |

