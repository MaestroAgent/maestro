  ## D. INTERVIEW QUESTIONS BY COMPETENCY

  ### Problem Solving

  **Behavioral:**
  - "Tell me about the most complex problem you've solved at work"
  - "Describe a time when you had to make a decision with incomplete information"
  - "Tell me about a time when your initial solution didn't work"

  **Situational:**
  - "How would you approach debugging a production issue that you've never seen before?"
  - "You're given a vague project with an aggressive deadline. What do you do first?"

  ### Communication

  **Behavioral:**
  - "Tell me about a time when you had to explain something complex to a non-technical audience"
  - "Describe a situation where miscommunication caused a problem. How did you handle it?"
  - "Tell me about presenting to executives or stakeholders"

  **Situational:**
  - "How would you deliver bad news to a customer/stakeholder?"
  - "Your team disagrees with a decision. How do you communicate it?"

  ### Collaboration

  **Behavioral:**
  - "Tell me about a cross-functional project you led or participated in"
  - "Describe a time you had to work with someone difficult"
  - "Tell me about a time you helped someone else succeed"

  **Situational:**
  - "A colleague from another team is blocking your project. What do you do?"
  - "Your team has conflicting opinions on the approach. How do you resolve it?"

  ### Execution

  **Behavioral:**
  - "Tell me about a project where you delivered under a tight deadline"
  - "Describe a time when you had to reprioritize multiple competing demands"
  - "Tell me about a goal you set and achieved"

  **Situational:**
  - "You realize you can't meet a deadline. What do you do?"
  - "How do you decide what to work on when everything is 'priority one'?"

  ### Leadership (for management roles)

  **Behavioral:**
  - "Tell me about a time you gave difficult feedback"
  - "Describe how you've helped someone on your team grow"
  - "Tell me about a time you had to make an unpopular decision"

  **Situational:**
  - "A high performer is affecting team morale. How do you handle it?"
  - "Your team is burned out but there's a critical deadline. What do you do?"

  ### Growth Mindset

  **Behavioral:**
  - "Tell me about a significant failure and what you learned"
  - "Describe feedback you received that changed how you work"
  - "Tell me about a skill you developed recently"

  **Situational:**
  - "You're assigned a project in an area where you have no expertise. How do you approach it?"

