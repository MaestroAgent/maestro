  ## L. DIVERSITY, EQUITY & INCLUSION

  ### Structured Interviewing to Reduce Bias

  1. **Standardized Questions** - Same questions for all candidates at each stage
  2. **Pre-Defined Criteria** - Evaluation rubric created before interviews begin
  3. **Independent Scoring** - Rate before group debrief to avoid groupthink
  4. **Diverse Panels** - Multiple perspectives in evaluation
  5. **Bias Training** - Required for all interviewers
  6. **Blind Resume Review** - Remove identifying information in initial screen
  7. **Structured Debrief** - Scorecards first, then discussion
  8. **Evidence-Based Decisions** - Require specific examples for ratings

  ### Diverse Sourcing Channels

  **Educational:**
  - Historically Black Colleges and Universities (HBCUs)
  - Hispanic-Serving Institutions (HSIs)
  - Tribal Colleges and Universities
  - Women's colleges

  **Professional Organizations:**
  - National Society of Black Engineers (NSBE)
  - Society of Hispanic Professional Engineers (SHPE)
  - Women Who Code
  - Lesbians Who Tech
  - Out in Tech (LGBTQ+)
  - Black Girls CODE
  - /dev/color
  - Code2040
  - Disability:IN
  - Hiring Our Heroes (veterans)

  **Specialized Platforms:**
  - Jopwell
  - PowerToFly
  - InHerSight
  - Fairygodboss
  - Diversifying Tech
  - Include

  ### Inclusive Job Descriptions

  **Language Audit:**
  - Run through gender decoder tools (Textio, Gender Decoder)
  - Remove gendered language (he/she -> they/you)
  - Avoid militaristic terms (dominate, crush, conquer)
  - Remove superlatives (rockstar, ninja, guru, wizard)
  - Focus on outcomes over credentials
  - List must-haves separate from nice-to-haves (research shows women apply when meeting 100% of requirements, men at 60%)

  **Structural Changes:**
  - Include salary range (30%+ more diverse applicants)
  - State commitment to DEI explicitly
  - Highlight flexible work options
  - Remove "culture fit" language
  - Avoid "fast-paced" without context
  - Include accommodations statement

  ### Diverse Slate Approaches

  | Approach | Definition | Implementation |
  |----------|------------|----------------|
  | Rooney Rule | At least one underrepresented candidate in finals | Extend search if needed |
  | Mansfield Rule | 30% diverse candidates in pipeline | Track at each stage |
  | Extended Sourcing | Don't close req until diverse slate achieved | Build in timeline buffer |
  | Diverse Interviewers | At least one diverse panelist for every candidate | Maintain trained pool |

  ### DEI Metrics to Track

  | Metric | How to Measure | Target |
  |--------|----------------|--------|
  | Pipeline Diversity | % URG at each funnel stage | Match or exceed available talent pool |
  | Interview to Offer Ratio by Demographic | Conversion rates by group | Parity across groups |
  | Offer Acceptance by Demographic | Acceptance rates by group | Parity across groups |
  | Interview Panel Diversity | % diverse interviewers | 100% have at least one |
  | Hiring Manager Diverse Slate | % searches with diverse finalists | 100% |
  | Source Channel Diversity | URG % by source | Identify best channels |
  | Time to Fill by Demographic | Days by group | No significant variance |

