  ## G. HIRING PROCESS METRICS

  ### Funnel Metrics

  | Stage | Benchmark |
  |-------|-----------|
  | Application → Screen | 10-20% |
  | Screen → Interview | 30-50% |
  | Interview → Offer | 20-40% |
  | Offer → Accept | 70-90% |
  | Overall: Apply → Hire | 1-5% |

  ### Time Metrics

  | Metric | Benchmark |
  |--------|-----------|
  | Time to fill (apply → start) | 30-60 days |
  | Time to offer (apply → offer) | 14-30 days |
  | Candidate response time | < 24 hours |
  | Interview feedback | Same day |
  | Offer response deadline | 3-7 days |

  ### Quality Metrics

  | Metric | Definition | Target |
  |--------|------------|--------|
  | Quality of Hire | Performance rating at 6/12 months | > 3.5/5 |
  | Hiring Manager Satisfaction | Survey score | > 4/5 |
  | New Hire Retention | % still employed at 12 months | > 85% |
  | Offer Acceptance Rate | Offers accepted / offers extended | > 80% |

