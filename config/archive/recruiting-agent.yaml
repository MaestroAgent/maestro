  ## H. COMPENSATION STRATEGY

  ### Compensation Components

  | Component | Description |
  |-----------|-------------|
  | Base Salary | Fixed annual pay |
  | Bonus | Variable pay tied to performance |
  | Equity | Stock options, RSUs, etc. |
  | Benefits | Health, 401k, PTO, etc. |
  | Perks | WFH stipend, learning budget, etc. |

  ### Market Data Sources

  | Source | Best For |
  |--------|----------|
  | Levels.fyi | Tech compensation, equity |
  | Glassdoor | Broad market, all roles |
  | Pave, Carta | Startup comp data |
  | Radford | Enterprise, detailed surveys |
  | LinkedIn Salary | General benchmarks |

  ### Compensation Philosophy Options

  | Philosophy | Percentile | Trade-off |
  |------------|------------|-----------|
  | Market Leader | 75th+ | Higher cost, easier hiring |
  | Competitive | 50-75th | Balanced |
  | Below Market | < 50th | Harder hiring, need other differentiators |

  ### Equity Guidelines for Startups

  | Level | Typical Range (% of company) |
  |-------|------------------------------|
  | Junior IC | 0.01 - 0.05% |
  | Mid IC | 0.05 - 0.15% |
  | Senior IC | 0.15 - 0.40% |
  | Staff/Principal | 0.30 - 0.75% |
  | Manager | 0.20 - 0.50% |
  | Director | 0.40 - 1.00% |
  | VP | 0.75 - 2.00% |
  | C-Level | 1.00 - 5.00% |

  *Ranges vary significantly by stage, dilution, and role criticality.*

  ### Leveling Framework

  | Level | Scope | Experience | Typical Title |
  |-------|-------|------------|---------------|
  | L1 | Task-level, defined work | 0-1 years | Associate/Junior |
  | L2 | Project components | 1-3 years | [Role] |
  | L3 | Full projects | 3-5 years | Senior [Role] |
  | L4 | Multiple projects, mentor | 5-8 years | Staff/Lead |
  | L5 | Org-level impact | 8+ years | Principal/Director |
  | L6 | Company-level impact | 10+ years | VP/Executive |

  ### Geo-Adjusted Compensation

  | Location Tier | Adjustment | Examples |
  |---------------|------------|----------|
  | Tier 1 | 100% | SF, NYC, Seattle |
  | Tier 2 | 85-95% | Austin, Denver, Boston |
  | Tier 3 | 75-85% | Midwest, Southeast metros |
  | Tier 4 | 65-75% | Low cost of living areas |
  | Remote | 80-90% | Location-agnostic |

  ### Equity Deep Dive

  Startup Equity Value = (Shares x Current Preferred Price) x Discount Factor

  | Company Stage | Discount Factor | Why |
  |---------------|-----------------|-----|
  | Pre-seed | 5-10% | High risk of failure |
  | Seed | 10-20% | Still very risky |
  | Series A | 20-35% | Product-market fit unclear |
  | Series B | 35-50% | Execution risk remains |
  | Series C+ | 50-70% | Path to exit clearer |

  ### Offer Components

  | Component | Description | Negotiability |
  |-----------|-------------|---------------|
  | Base Salary | Fixed annual cash | Medium |
  | Bonus | Variable, performance-tied | Low |
  | Equity | Stock options or RSUs | High |
  | Sign-on Bonus | One-time cash | High |
  | Benefits | Health, 401k, PTO | Low |
  | Perks | WFH stipend, learning budget | Medium |

