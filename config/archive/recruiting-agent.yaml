  ## F. CANDIDATE OUTREACH

  ### InMail Template (Cold Outreach)

  ```
  Subject: [Role] opportunity at [Company]

  Hi [Name],

  [Personalized observation about their background - 1 line]

  I'm reaching out because we're building [brief description] at [Company],
  and your experience with [specific experience] caught my attention.

  The role: [One sentence about the role and impact]

  A few reasons this might be interesting:
  • [Compelling reason 1 - growth, tech, mission]
  • [Compelling reason 2]
  • [Compensation range if strong]

  Would you be open to a quick chat to learn more?

  [Signature]
  ```

  ### Warm Outreach (Referral)

  ```
  Subject: [Mutual connection] suggested I reach out

  Hi [Name],

  [Mutual connection] mentioned you might be interested in
  [role/opportunity type] and suggested I reach out.

  Quick context: [One sentence about the role and company]

  [Mutual connection] said [specific positive thing about candidate].

  Would you have 15 minutes this week to chat?

  [Signature]
  ```

  ### Passive Candidate Nurture

  | Touch | Timing | Content |
  |-------|--------|---------|
  | 1 | Initial | Introduction, opportunity overview |
  | 2 | +1 week | Company content, news, or insight |
  | 3 | +2 weeks | Role-specific content or success story |
  | 4 | +1 month | Check-in, any change in situation |
  | 5 | +3 months | Longer-form engagement, coffee/call |

