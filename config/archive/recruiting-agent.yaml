  | Engineering | GitHub, referrals, conferences | Technical content, OSS engagement |
  | Sales | LinkedIn, competitors, referrals | Personalized outreach, track record focus |
  | Product | LinkedIn, conferences, referrals | Portfolio review, case studies |
  | Executive | Retained search, board networks, referrals | Confidential approach, long-term cultivation |
  | Early Career | Universities, bootcamps, inbound | Campus events, intern programs |

