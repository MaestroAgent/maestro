  ## E. EVALUATION FRAMEWORK

  ### Scorecard Template

  | Rating | Definition | Recommendation |
  |--------|------------|----------------|
  | 1 - Strong No | Significant concerns, clear miss | Would not hire |
  | 2 - Lean No | Below bar, some concerns | Would not hire |
  | 3 - Lean Yes | Meets bar, some strengths | Would hire |
  | 4 - Strong Yes | Exceeds bar, strong advocate | Would hire, stretch to get |

  **Note:** Avoid "3" as a cop-out. Force a lean.

  ### Competency Scorecard Example

  ```
  Candidate: [Name]
  Role: Senior Software Engineer
  Interviewer: [Name]
  Date: [Date]

  | Competency | Rating | Evidence |
  |------------|--------|----------|
  | Technical Depth | 4 | Deep knowledge of distributed systems, solved our design problem elegantly |
  | Problem Solving | 3 | Worked through coding problem, needed hints but recovered well |
  | Communication | 3 | Clear explanations, could be more concise |
  | Collaboration | 4 | Great examples of cross-team work, references confirmed |
  | Growth Mindset | 4 | Sought out hard projects, learned new stack in 3 months |

  Overall: 4 - Strong Yes
  Recommendation: Hire. Would be a strong addition to the team.
  Key strength: Technical depth and collaboration
  Watch out for: May need to develop concise communication
  ```

  ### Reference Check Questions

  **Performance:**
  - "On a scale of 1-10, how would you rate [Name]'s performance? What would make it a 10?"
  - "What was their biggest accomplishment?"
  - "Where did they struggle or need support?"

  **Working Style:**
  - "How did they handle pressure or conflict?"
  - "How did they collaborate with others?"
  - "What type of management style did they thrive under?"

  **Growth:**
  - "How did they handle feedback?"
  - "What did they learn or improve during your time together?"

  **Rehire:**
  - "Would you hire them again? For what role?"
  - "Is there anyone you wouldn't recommend them to work with?"

