  ## J. RECRUITING TACTICS REPOSITORY (60+ Tactics)

  ### Sourcing Tactics (15)

  1. **Boolean Search** - LinkedIn: "software engineer" AND (Python OR Java) AND ("Series B" OR "Series C") NOT recruiter
  2. **GitHub Mining** - Target contributors by language, stars, and activity
  3. **StackOverflow Targeting** - Identify experts by reputation and tags
  4. **Conference Speaker Sourcing** - Target presenters and attendees
  5. **Competitor Org Chart Mapping** - Map target company structures
  6. **Alumni Network Targeting** - Focus on specific company alumni
  7. **University Partnerships** - Build pipelines with target schools
  8. **Talent Community Building** - Newsletter, events, content
  9. **Passive Nurture Campaigns** - Long-term relationship building
  10. **Silver Medalist Re-engagement** - Strong candidates not hired previously
  11. **Boomerang Outreach** - Former employees who left on good terms
  12. **Referral Gamification** - Incentivize referrals with rewards and recognition
  13. **Warm Intro Requests** - Leverage 2nd-degree connections
  14. **Diversity Channel Sourcing** - Focused outreach through diverse networks
  15. **Niche Community Engagement** - Slack, Discord, Reddit communities

  ### Candidate Engagement Tactics (12)

  1. **Personalized Video Messages** - Loom, VideoAsk for standout outreach
  2. **Technical Content Sharing** - Share your engineering blog, papers
  3. **Event Invitations** - Company webinars, tech talks, meetups
  4. **1:1 Coffee Chats** - Virtual or in-person relationship building
  5. **Project-Based Engagement** - Paid consulting to test fit
  6. **Team Introduction Calls** - Informal chats before formal process
  7. **Office/Team Visits** - Immersive experience days
  8. **Thoughtful Swag** - Quality branded items at key moments
  9. **Handwritten Notes** - Personal touch that stands out
  10. **LinkedIn Engagement** - Comment, share, support over time
  11. **Milestone Recognition** - Birthday, work anniversary acknowledgment
  12. **Industry Insight Sharing** - Be helpful before asking for anything

  ### Interview Process Tactics (10)

  1. **Structured Interview Guides** - Consistent questions for all candidates
  2. **Interviewer Calibration** - Regular alignment sessions
  3. **Pre-Debrief Scorecards** - Complete ratings before group discussion
  4. **Time-Boxed Take-Homes** - Respect candidate time (2-4 hours max)
  5. **Pair Programming** - Collaborative coding over whiteboard
  6. **Work Sample Tests** - Actual job tasks vs abstract problems
  7. **Reverse Interview** - Structured time for candidate questions
  8. **Continuous Selling** - Sell throughout, not just at end
  9. **Same-Day Feedback** - Quick internal loops
  10. **Experience Surveys** - Post-interview candidate feedback

  ### Closing Tactics (10)

  1. **Early Motivation Discovery** - Understand drivers from first call
  2. **Pre-Handle Counter-Offers** - Address before they happen
  3. **Ethical Urgency** - Clear timelines with genuine reasoning
  4. **Leadership Involvement** - Senior executive in final close
  5. **Pre-Offer Call** - Verbal alignment before written offer
  6. **Personalized Offer Letters** - Tailored messaging, not templates
  7. **Team Welcome Messages** - Future colleagues reach out
  8. **Proactive Concern Resolution** - Address objections before asked
  9. **Flexible Start Dates** - Accommodate candidate needs
  10. **Quick Negotiation Turnaround** - Fast response to questions

  ### Employer Branding Tactics (8)

  1. **Glassdoor Management** - Active response and monitoring
  2. **LinkedIn Optimization** - Company page content strategy
  3. **Engineering Blog** - Technical content showcasing work
  4. **Employee Advocacy** - Enable employees to share authentically
  5. **Career Page Storytelling** - Compelling narrative, not just listings
  6. **Behind-the-Scenes Content** - Day-in-the-life, team spotlights
  7. **Process Transparency** - Published interview expectations
  8. **DEI Visibility** - Authentic commitment demonstration

  ### Candidate Experience Tactics (8)

  1. **Same-Day Acknowledgment** - Immediate application response
  2. **Clear Timeline Communication** - Set expectations upfront
  3. **Rejection with Feedback** - Helpful closure when possible
  4. **Interview Prep Materials** - Help candidates succeed
  5. **Expense Reimbursement** - Seamless, quick process
  6. **Candidate Portal** - Real-time status visibility
  7. **Post-Interview Thank You** - Appreciation at every stage
  8. **Rejected Candidate Network** - Alumni community for future roles

