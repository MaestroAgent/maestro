  ## A. SALES METHODOLOGIES

  ### MEDDPICC (Enterprise/Complex Sales)

  | Element | Question to Answer | Why It Matters |
  |---------|-------------------|----------------|
  | **M**etrics | What quantifiable value will they get? | Justifies investment |
  | **E**conomic Buyer | Who can write the check? | Avoid false authority |
  | **D**ecision Criteria | What factors drive their choice? | Position to win |
  | **D**ecision Process | What are the steps to yes? | Forecast accurately |
  | **P**aper Process | Legal, procurement, security requirements? | Avoid end-of-quarter surprises |
  | **I**dentify Pain | What's the business problem? | Create urgency |
  | **C**hampion | Who's selling internally for you? | Win from inside |
  | **C**ompetition | Who else are they evaluating? | Position to win |

  **MEDDPICC Qualification Score:**
  - 1 point per element confirmed
  - < 4: Unqualified, needs more discovery
  - 4-6: Partially qualified, gaps to fill
  - 7-8: Fully qualified, high-probability deal

  **Paper Process Deep Dive:**
  - Legal: MSA review timeline, redline process, who signs
  - Procurement: Vendor approval process, required documentation
  - Security: Security questionnaire, SOC2 requirements, data handling
  - Finance: PO process, payment terms, budget approval workflow
  - Timeline: How long does each step typically take?

  **Competition Assessment:**
  - Who else is in the evaluation?
  - What's their perception of each competitor?
  - Where do competitors have an edge?
  - What's the cost of "do nothing" (internal competition)?
  - Is there an incumbent? What would it take to displace?

  **Champion Testing (Verify you have a real champion):**

  | Test | How to Apply | Pass/Fail |
  |------|--------------|-----------|
  | Access Test | "Can you get me a meeting with [Economic Buyer]?" | Do they make it happen? |
  | Coaching Test | "What should I know going into the exec meeting?" | Do they share insider info? |
  | Selling Test | "How are you positioning this internally?" | Are they actively advocating? |
  | Risk Test | "What could kill this deal?" | Do they share real obstacles? |
  | Urgency Test | "Why does this need to happen this quarter?" | Can they articulate business urgency? |

  ### SPIN Selling (Consultative Sales)

  | Question Type | Purpose | Example |
  |---------------|---------|---------|
  | **S**ituation | Understand current state | "How do you currently handle X?" |
  | **P**roblem | Uncover explicit problems | "What challenges do you face with X?" |
  | **I**mplication | Amplify pain | "What happens when that problem occurs?" |
  | **N**eed-Payoff | Build value | "How would it help if you could X?" |

  **SPIN Flow:** S → P → I → N (multiple cycles)

  ### Challenger Sale (Commoditized Markets)

  **Three T's:**
  1. **Teach**: Share insights they don't know (Commercial Teaching)
  2. **Tailor**: Customize to their specific situation (persona, industry, company)
  3. **Take Control**: Lead the sales process (don't be passive)

  **Commercial Teaching Framework (Detailed):**

  | Stage | Purpose | Example Script |
  |-------|---------|----------------|
  | 1. The Warmer | Connect to their known issues, build credibility | "I've been talking to a lot of [their role] and hearing the same challenge..." |
  | 2. The Reframe | Challenge their current thinking, create discomfort | "Most companies think X is the problem. But what we've found is that Y is actually the root cause." |
  | 3. Rational Drowning | Data that proves the problem is bigger than they thought | "Companies in your space lose an average of $X annually to this. Here's the research." |
  | 4. Emotional Impact | Stories that make it personal and real | "One company's CEO told me he was embarrassed to show their board the numbers..." |
  | 5. A New Way | Your differentiated approach (not your product yet) | "The companies winning at this have fundamentally changed their approach to..." |
  | 6. Your Solution | How you specifically deliver the new way | "Our platform is built around this approach. Here's how it works..." |

  **Constructive Tension Techniques:**

  | Technique | When to Use | Example |
  |-----------|-------------|---------|
  | Challenge assumptions | When they're stuck in old thinking | "What if the way you've been measuring this is actually hiding the real problem?" |
  | Reframe the problem | When they're focused on symptoms | "You mentioned [symptom]. In our experience, that's usually a sign of [bigger issue]." |
  | Introduce urgency | When there's no compelling event | "Companies that wait typically see this get 2-3x worse before they address it." |
  | Push back on "good enough" | When they're comfortable with status quo | "If 'good enough' was working, why did you take this meeting?" |

  **Handling "I Disagree" Responses:**

  When a prospect pushes back on your insight:
  1. **Acknowledge without retreating**: "That's fair - let me explain why we've seen it differently"
  2. **Use data or stories**: "When we worked with [company], they thought the same thing initially. What they found was..."
  3. **Ask a calibrated question**: "What would you need to see to consider a different approach?"
  4. **Agree and pivot**: "You might be right for your situation. Can I ask what's different about your context?"

  **Tailoring by Persona:**

  | Persona | What They Care About | How to Tailor |
  |---------|---------------------|---------------|
  | C-Suite | Strategic impact, competitive advantage | Big picture, business outcomes, peer comparisons |
  | VP/Director | Team performance, looking good to execs | Metrics, efficiency gains, success stories from peers |
  | Manager | Day-to-day pain, ease of adoption | Practical benefits, implementation simplicity |
  | End User | Making their job easier | Features that save time, reduce frustration |

  **Taking Control Without Being Aggressive:**
  - "Based on what you've told me, here's what I'd recommend as next steps..."
  - "In deals like this, what typically works best is..."
  - "I want to make sure we're using your time wisely. Let me suggest..."
  - Push back on vague timelines: "You mentioned 'sometime next quarter.' Can we get specific on a date?"

  ### Sandler Selling (Shorter Cycles, SMB)

  **The Sandler Submarine (7 Compartments):**

  | Compartment | Purpose | Key Actions |
  |-------------|---------|-------------|
  | 1. Bonding & Rapport | Establish trust, be human | Find common ground, active listening, mirror their style |
  | 2. Upfront Contract | Set expectations, get permission | Agenda, time, outcomes, "no" is okay |
  | 3. Pain | Uncover real problems | Pain funnel (see below), emotional + business impact |
  | 4. Budget | Qualify financial ability | "What have you budgeted for this?" |
  | 5. Decision | Understand process + people | Who, what, when, how decisions get made |
  | 6. Fulfillment | Present solution to qualified pain | Only present to pain you've uncovered |
  | 7. Post-Sell | Prevent buyer's remorse | Reinforce decision, set expectations |

  **Complete Pain Funnel Script:**
  1. "Tell me more about that..."
  2. "Can you be more specific? Give me an example."
  3. "How long has this been going on?"
  4. "What have you tried to do about it?"
  5. "Did that work?" → "Why do you think that didn't work?"
  6. "How much do you think this has cost you?"
  7. "How do you feel about that?"
  8. "Have you given up trying to fix it?"

  **Upfront Contract (Full Template):**
  ```
  "[Name], I appreciate you taking the time today.

  Here's what I'm thinking: I have some questions for you about [topic].
  You probably have some questions for me.

  At the end, one of three things will happen:
  1. You'll say 'this isn't for us' - and that's totally fine
  2. I might say 'I don't think we're a fit' - and I'll tell you why
  3. We might both see potential - and we'll discuss what happens next

  Either way, no pressure. Sound fair?"
  ```

  **Dummy Curve Technique:**
  Play "dumb" to get them to explain/elaborate:
  - "I'm not sure I understand. Can you walk me through that?"
  - "Help me out here - I'm not seeing how..."
  - "I might be missing something - why would you...?"

  **Strip-Lining Technique:**
  Pulling back to create urgency (like a fishing line):
  - "I'm not sure this is really that big of a priority for you..."
  - "Maybe we should hold off until this becomes more urgent..."
  - "It sounds like you're pretty comfortable with the status quo..."

  **Negative Reverse Selling Examples:**
  Suggest they shouldn't buy to trigger their defense of the purchase:
  - "I'm starting to think maybe this isn't the right fit for you"
  - "You know, this might be more than you need right now"
  - "Based on what you're telling me, I'm not sure you're ready for this kind of change"

  (Counterintuitive: This often triggers them to sell themselves on why they ARE ready)

  ### BANT (Quick Qualification)

  | Element | Key Questions |
  |---------|---------------|
  | **B**udget | Is there money allocated? Approval process? |
  | **A**uthority | Can they sign? Who else is involved? |
  | **N**eed | Is there a real problem to solve? |
  | **T**imeline | When do they need a solution? |

  ### Gap Selling (Solution Sales)

  **Framework:**
  1. Current State: Where are they now?
  2. Future State: Where do they want to be?
  3. The Gap: What's preventing them from getting there?
  4. Your Solution: How you bridge the gap

  **Gap Formula:**
  Value = Size of Gap × Urgency × Ability to Pay

