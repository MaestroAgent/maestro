  ## H. DEAL ACCELERATION TACTICS (70+ tactics)

  ### Prospecting (10 tactics)
  1. LinkedIn Sales Navigator Boolean searches
  2. Intent data signals (job postings, tech changes)
  3. Trigger events (funding, new hires, expansion)
  4. Website visitor identification tools
  5. Referral requests after every closed deal
  6. Champion tracking (follow contacts who change jobs)
  7. Competitive displacement campaigns
  8. Conference attendee lists
  9. Podcast guest outreach
  10. Community engagement (Slack, Discord, forums)

  ### Outreach (10 tactics)
  1. Personalized first line from research
  2. Video prospecting (Loom, Vidyard)
  3. Voice notes on LinkedIn
  4. Mutual connection warm intros
  5. Comment on their content before outreach
  6. Send relevant article/insight (no pitch)
  7. "Breakup" email after no response
  8. Re-engage after trigger event
  9. Multi-thread with different personas
  10. Account-based personalized landing pages

  ### Cold Call Tactics (8 tactics)
  1. Pattern interrupt openers ("I know I'm calling out of the blue...")
  2. Gatekeeper navigation with specific reason for calling
  3. Voicemail/email combo strategy (leave VM, send email referencing it)
  4. Call block scheduling (2-hour power hours, no distractions)
  5. Callback objection handling ("When's better - tomorrow at 2 or Thursday at 10?")
  6. The 27-second voicemail formula (name, company, reason, number x2)
  7. Permission-based openers ("Do you have 27 seconds?")
  8. The "I need your help" approach (gatekeepers want to help)

  ### Demo/Presentation Tactics (8 tactics)
  1. Tell-Show-Tell framework for every feature
  2. Discovery recap before demo ("Last time you mentioned...")
  3. 3-4 use case maximum rule (don't overwhelm)
  4. The "Does this resonate?" checkpoint every 5-7 minutes
  5. Competitive differentiation moments ("Unlike X, we...")
  6. ROI calculator live walkthrough during demo
  7. "Day in the life" storytelling for each persona
  8. Handling technical deep-dives ("Great question - let me get our SE")

  ### Negotiation Tactics (8 tactics)
  1. Never split the difference (justify your position)
  2. Trade concessions, don't give them ("If I do X, would you do Y?")
  3. Package deal construction (bundle to preserve value)
  4. Multi-year discount structuring (longer term = better rate)
  5. The flinch and pause (react to their price, then silence)
  6. "That's not going to work for us" (firm but not aggressive)
  7. Bracketing (anchor high, they counter low, land in your target middle)
  8. Good cop/bad cop with manager ("Let me see what I can do")

  ### Account-Based Tactics (6 tactics)
  1. Account tiering (Tier 1: custom campaigns, Tier 2: semi-custom, Tier 3: automated)
  2. Org chart mapping before first outreach
  3. Executive ghostwriting for champions (draft the internal email for them)
  4. Custom ROI decks per account with their logo, data, use cases
  5. Multi-thread into 5+ contacts (don't rely on single champion)
  6. Competitive intelligence per deal (know what else they're evaluating)

  ### Discovery to Proposal (10 tactics)
  1. Send recap email within 2 hours
  2. Share relevant case study between calls
  3. Provide ROI calculator or business case
  4. Arrange customer reference call
  5. Offer proof of concept or pilot
  6. Identify and engage economic buyer early
  7. Build mutual action plan
  8. Multi-thread into 3+ contacts
  9. Engage procurement/legal early
  10. Share implementation timeline

  ### Closing (10 tactics)
  1. Trial close throughout: "If we can do X, would you move forward?"
  2. Create urgency with legitimate deadlines
  3. Offer limited-time incentives
  4. Get verbal commit before sending contract
  5. Walk through contract on a call
  6. Pre-fill contract with discussed terms
  7. Provide security/compliance docs proactively
  8. Schedule implementation kick-off before close
  9. Remove last-minute friction points
  10. Executive sponsor call if deal stalls

