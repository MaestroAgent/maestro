  ## E. DISCOVERY CALL STRUCTURE

  ### The 40-Minute Discovery Call

  | Time | Phase | Focus |
  |------|-------|-------|
  | 0-5 | Opening | Rapport + agenda + upfront contract |
  | 5-15 | Current State | Understand their situation |
  | 15-30 | Problems & Impact | Dig into pain, quantify impact |
  | 30-35 | Future State | Define success criteria |
  | 35-40 | Next Steps | Mutual action plan |

  ### Opening Script

  ```
  "Thanks for taking the time. Here's what I'm thinking:

  I'll ask some questions to understand your situation.
  You'll probably have questions for me.
  At the end, if it makes sense to continue, great - we'll map out next steps.
  If not, totally fine to say so. Sound good?"
  ```

  ### Power Questions

  **Current State:**
  - "Walk me through how you currently handle [process]"
  - "Who's involved in [process]?"
  - "What tools do you use for this today?"

  **Problem Discovery:**
  - "What's working well? What's not?"
  - "What happens when [problem] occurs?"
  - "How often does this happen?"
  - "What's the impact when it goes wrong?"

  **Quantification:**
  - "How much time does your team spend on this?"
  - "What does that cost in terms of [money/opportunity]?"
  - "How does this affect [revenue/costs/productivity]?"

  **Future State:**
  - "What would ideal look like?"
  - "If you could wave a magic wand, what would change?"
  - "How would you measure success?"

  **Process Questions:**
  - "Who else needs to be involved in this decision?"
  - "What's the process for evaluating new solutions?"
  - "What timeline are you working with?"

