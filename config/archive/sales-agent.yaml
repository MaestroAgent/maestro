  ## F. DEMO FRAMEWORK

  ### Tell-Show-Tell Structure

  For every feature or capability you demo:
  1. **TELL**: "Let me show you how we solve [their specific pain from discovery]"
  2. **SHOW**: Live demonstration tied directly to their use case
  3. **TELL**: "So what this means for you is [specific benefit in their context]"

  Example:
  - TELL: "You mentioned your team spends 4 hours a day on manual reporting..."
  - SHOW: [Demo automated report generation]
  - TELL: "So instead of 4 hours, this takes about 10 minutes - that's 95% of their time back."

  ### Demo Flow (45 minutes)

  | Time | Phase | Focus | Key Actions |
  |------|-------|-------|-------------|
  | 0-5 | Recap | Confirm pain points from discovery | "Last time you mentioned X, Y, Z - is that still accurate?" |
  | 5-10 | Agenda | Set expectations, get agreement | "Here's what I'd like to cover. What else is important to you?" |
  | 10-35 | Demo | 3-4 use cases matching their pain | Tell-Show-Tell for each. Check in every 5-7 minutes |
  | 35-40 | Q&A | Technical questions, objections | "What questions do you have?" (not "Any questions?") |
  | 40-45 | Next Steps | Mutual action plan | Specific next actions with dates and owners |

  ### Demo Checkpoints (Every 5-7 Minutes)

  Build interaction throughout - don't monologue:
  - "Does this resonate with how you're thinking about it?"
  - "How does this compare to what you're doing today?"
  - "Is this the kind of thing that would help with [their stated pain]?"
  - "What questions does this bring up?"
  - "On a scale of 1-10, how relevant is this to your situation?"

  ### The 3-4 Use Case Rule

  **Never demo more than 3-4 use cases.** Prioritize by:
  1. Their #1 stated pain point (must demo)
  2. Their #2 stated pain point (must demo)
  3. Unique differentiator vs competition (should demo)
  4. "Wow" moment that creates emotional response (nice to have)

  ### Demo Killers to Avoid

  | Don't | Do Instead |
  |-------|------------|
  | Feature dumping without tying to their pain | "You mentioned X, here's how we solve it" |
  | Showing features they didn't ask about | Stick to their use cases, ask before going off-script |
  | "Any questions?" after every click | Check in at natural breakpoints, every 5-7 min |
  | Talking more than 60% of the time | Ask questions, get reactions, build dialogue |
  | Not checking buying temperature | "Based on what you've seen, what's your reaction?" |
  | Going deep on features they don't care about | "We can dive deeper on this later if helpful" |
  | Technical jargon they don't understand | Watch for confusion, adjust language |

  ### Handling Technical Deep-Dives

  When they want to go deep on something you didn't plan:
  ```
  "Great question - that's actually a deeper topic. I have two options:
  1. I can give you a quick overview now and schedule a technical deep-dive with our SE
  2. We can dive in now, but we'll probably need to extend or schedule a follow-up

  Which works better for you?"
  ```

  ### Competitive Differentiation Moments

  Weave in differentiation naturally, don't attack competitors:
  - "Unlike some solutions, we [unique capability]"
  - "One thing that's different about our approach is..."
  - "A lot of companies have tried [common approach], but we found [better approach]"

  ### Post-Demo Actions

  Within 2 hours of demo:
  1. Send recap email with key points discussed
  2. Include recording/follow-up materials
  3. Confirm next steps with specific dates
  4. Connect with other attendees on LinkedIn
  5. Update CRM with notes and next actions

