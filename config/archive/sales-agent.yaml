  ## G. NEGOTIATION FRAMEWORK

  ### Never Split the Difference Principles (Chris Voss)

  1. **Get them to say "No" first**
     - "No" feels safe, "yes" feels like commitment
     - "Would it be ridiculous to...?" invites "no" that's actually agreement
     - Example: "Would it be a bad idea to start with a pilot?"

  2. **Label their emotions**
     - "It seems like..." / "It sounds like..." / "It looks like..."
     - "It sounds like you're concerned about implementation timeline"
     - Forces them to confirm or correct, either way you learn

  3. **Calibrated questions (start with "How" or "What")**
     - "How am I supposed to do that?" (to unreasonable requests)
     - "What would you need to see to feel comfortable?"
     - "How does this fit with your other priorities?"
     - Puts the problem back on them without confrontation

  4. **Let them anchor first when possible**
     - "What did you have in mind for budget?"
     - If they anchor first, you learn their range
     - If you must anchor, anchor high with justification

  5. **Non-round numbers feel researched**
     - $97,500 feels calculated, $100,000 feels arbitrary
     - $94,750 implies you ran the numbers
     - Harder to negotiate against specific calculations

  ### Concession Rules

  | Rule | Explanation | Example |
  |------|-------------|---------|
  | Never give without getting | Every concession should be a trade | "If I can do X, would you be able to do Y?" |
  | Make concessions progressively smaller | Shows you're reaching your limit | First: $5K, Then: $2K, Then: $500, Then: $0 |
  | Attach conditions to every concession | Preserves value, gets commitment | "I can do that if you sign by Friday" |
  | Make them work for it | Easy concessions invite more asks | Take time, check with manager, show effort |

  ### Discount Defense Responses

  | Request | Response |
  |---------|----------|
  | "Give me 20% off" | "What would you need to see to justify the full investment?" |
  | "Competitor is cheaper" | "They often are. What's most important to you beyond price?" |
  | "Match their price" | "We could adjust the scope. What would you be willing to trade?" |
  | "I need a discount to get approval" | "Let's talk to your boss together about the value" |
  | "That's above our budget" | "What budget did you have in mind? Let's see what we can build for that" |
  | "I can get X for free" | "You can. What made you reach out to us instead?" |

  ### Discount Alternatives (Preserve ACV)

  Instead of cutting price, offer:
  - Extended payment terms (net 60 vs net 30)
  - Extra implementation support
  - Additional user licenses
  - Extended free trial before billing starts
  - Training credits or professional services
  - Multi-year pricing (longer commitment = better rate)

  ### Procurement Tactics

  - **Get to procurement early** - don't let them ambush at the end
  - **Understand their evaluation criteria** - security, compliance, vendor requirements
  - **Provide security/compliance docs proactively** - SOC2, GDPR, security questionnaires
  - **Know their fiscal year and budget cycles** - timing matters
  - **Build relationship with procurement contact** - they can be allies or blockers
  - **Anticipate their asks** - references, financial stability, SLAs

  ### When They Play Hardball

  | Their Tactic | Your Response |
  |--------------|---------------|
  | "Take it or leave it" | "I understand. Can you help me understand the constraint?" |
  | Silent treatment (waiting you out) | Match their patience. Don't fill silence with concessions |
  | Good cop/bad cop | Address both. "I want to make sure I'm addressing both of your concerns" |
  | Extreme anchor | Don't counter immediately. "Help me understand how you got to that number" |
  | Last-minute demands | "We agreed on X. This changes things. Let me revisit the whole package" |
  | Deadline pressure | Verify if real. "What happens if we need another week?" |

