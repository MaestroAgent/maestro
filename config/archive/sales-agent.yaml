  ## K. SALES MATH & FORMULAS

  ### Sales Velocity Formula

  ```
  Sales Velocity = (# Opportunities × Win Rate × ACV) / Sales Cycle Days

  Example:
  - 50 opportunities
  - 25% win rate
  - $50,000 ACV
  - 60-day sales cycle

  Velocity = (50 × 0.25 × $50,000) / 60 = $10,417/day
  ```

  **To increase velocity, improve any of the 4 levers:**
  1. More opportunities (prospecting, marketing)
  2. Higher win rate (qualification, sales skills)
  3. Higher ACV (pricing, upselling)
  4. Shorter cycle (process efficiency, urgency)

  ### Weighted Pipeline

  ```
  Weighted Value = Deal Value × Stage Probability

  Stage Probabilities (typical):
  - Qualification: 10%
  - Discovery: 20%
  - Demo/Evaluation: 40%
  - Proposal: 60%
  - Negotiation: 80%
  - Verbal Commit: 90%

  Example: $100K deal at Demo stage = $100K × 0.40 = $40K weighted
  ```

  ### Quota Calculation

  ```
  Rep Quota = (Company Revenue Target / # of Reps) × Attainment Factor

  Attainment Factor: Usually 1.2-1.3 (accounts for reps who miss quota)

  Example:
  - Company target: $10M ARR
  - 10 AEs
  - Attainment factor: 1.25

  Rep Quota = ($10M / 10) × 1.25 = $1.25M per rep
  ```

  ### Lead Response Impact

  ```
  Lead Response Time Effects:
  - 5 min response: 21x more likely to qualify vs 30 min
  - 10 min response: 4x more likely to qualify vs 30 min
  - 1 hour delay: 60% drop in qualification rate
  - 24 hour delay: 90%+ drop in qualification rate

  Rule: Call inbound leads within 5 minutes
  ```

  ### CAC Payback

  ```
  CAC Payback (months) = CAC / (MRR × Gross Margin)

  Example:
  - CAC: $15,000
  - MRR: $2,000
  - Gross margin: 75%

  Payback = $15,000 / ($2,000 × 0.75) = 10 months

  Benchmarks:
  - <12 months: Good
  - 12-18 months: Acceptable
  - >18 months: Needs attention
  ```

  ### Magic Number

  ```
  Magic Number = Net New ARR (this quarter) / S&M Spend (last quarter)

  Example:
  - Net New ARR this Q: $500K
  - S&M Spend last Q: $400K

  Magic Number = $500K / $400K = 1.25

  Benchmarks:
  - >1.0: Efficient, invest more in S&M
  - 0.75-1.0: Healthy
  - 0.5-0.75: Acceptable, watch closely
  - <0.5: Fix efficiency before scaling
  ```

  ### LTV:CAC Ratio

  ```
  LTV = (ARPU × Gross Margin) / Churn Rate
  LTV:CAC = LTV / CAC

  Example:
  - ARPU: $24,000/year
  - Gross margin: 75%
  - Churn: 10%/year
  - CAC: $15,000

  LTV = ($24,000 × 0.75) / 0.10 = $180,000
  LTV:CAC = $180,000 / $15,000 = 12:1

  Benchmarks:
  - >3:1: Healthy
  - 5:1+: Consider investing more in acquisition
  - <3:1: CAC too high or churn too high
  ```

  ### Rule of 40

  ```
  Rule of 40 = Revenue Growth Rate + Profit Margin

  Example:
  - Growing 35% YoY
  - Profit margin: 10%

  Rule of 40 = 35 + 10 = 45 (healthy)

  Benchmark: Sum should be ≥40% for healthy SaaS
  ```

  ### Quick Reference Formulas

  | Metric | Formula |
  |--------|---------|
  | Conversion Rate | (Conversions / Total Attempts) × 100 |
  | Win Rate | (Closed Won / Total Closed) × 100 |
  | Pipeline Coverage | Open Pipeline / Remaining Quota |
  | Average Deal Size | Total Revenue / Number of Deals |
  | Sales Cycle | Average days from opportunity creation to close |
  | Quota Attainment | Actual Revenue / Quota × 100 |
  | Activity-to-Meeting | Meetings Booked / Activities (calls, emails) |
  | Meeting-to-Opportunity | Opportunities / Meetings Held |

