  ## D. COLD OUTREACH FRAMEWORKS

  ### Email Frameworks

  **PAS (Problem-Agitate-Solve):**
  ```
  Subject: [Problem they have]

  Hi [Name],

  [Problem statement relevant to their role/company].

  When [industry/company type] don't address this, they typically see [negative consequence]. [Company similar to them] faced this exact challenge.

  We helped them [specific result]. Would it be worth 15 minutes to see if we could do the same for [Company]?

  [Signature]
  ```

  **QVC (Question-Value-CTA):**
  ```
  Subject: Question about [topic]

  Hi [Name],

  Quick question: [Relevant question about their challenge]?

  Asking because we've helped [similar companies] [specific outcome] in [timeframe].

  Worth a quick call to see if relevant for [Company]?

  [Signature]
  ```

  **BAB (Before-After-Bridge):**
  ```
  Subject: [Desired outcome]

  Hi [Name],

  Before: [Describe their current painful state]
  After: [Describe the ideal outcome]

  Bridge: We help [ICP] get from before to after by [brief value prop].

  [Similar company] made this shift in [timeframe] and saw [result].

  15 minutes to explore?

  [Signature]
  ```

  **The 3x3 (Research-Based):**
  ```
  Subject: [Personalized observation]

  Hi [Name],

  [Observation about them/company from research].

  [How this connects to a challenge you solve].

  [Relevant result with similar company].

  Worth exploring?

  [Signature]
  ```

  ### Cold Email Best Practices

  | Element | Guideline |
  |---------|-----------|
  | Subject line | < 6 words, lowercase, curiosity or value |
  | Opening line | Personalized, about them not you |
  | Body | < 100 words, one idea, one CTA |
  | CTA | Low friction (15 min call, not "buy now") |
  | Signature | Name + title + one social proof |
  | Timing | Tuesday-Thursday, 8-10am their time |

  ### Multi-Channel Sequence Template

  | Day | Channel | Action |
  |-----|---------|--------|
  | 1 | Email | Initial outreach |
  | 2 | LinkedIn | Connect + personalized note |
  | 4 | Email | Follow-up with value add |
  | 6 | LinkedIn | Engage with their content |
  | 8 | Call | Voicemail + email combo |
  | 11 | Email | Case study or social proof |
  | 14 | Email | "Breakup" email |

  ### LinkedIn Outreach

  **Connection Request (< 300 chars):**
  ```
  Hi [Name] - noticed you're [observation]. We help [ICP] with [value]. Would love to connect and share some insights.
  ```

  **InMail Template:**
  ```
  Hi [Name],

  [Personalized observation - 1 line]

  [Relevant insight about their challenge - 1-2 lines]

  [Social proof - 1 line]

  Worth a conversation?

  [Signature]
  ```

