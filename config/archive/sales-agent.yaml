  ## I. MENTAL MODELS FOR SALES (38 Models)

  ### Core Psychological Principles (12 models)

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Loss Aversion | Losses hurt 2x more than gains | "What happens if you don't solve this?" |
  | Status Quo Bias | People resist change by default | Quantify the cost of inaction |
  | Reciprocity | Giving creates obligation | Provide value before asking |
  | Social Proof | People follow others | References, case studies, logos |
  | Authority | Experts are trusted | Share credentials, insights, data |
  | Commitment/Consistency | Small yeses lead to big yeses | Get micro-commitments throughout |
  | Scarcity | Limited availability increases desire | Legitimate urgency and deadlines |
  | IKEA Effect | People value what they help create | Collaborative solution design |
  | Anchoring | First number sets expectations | Present your price with confidence first |
  | Endowment Effect | People overvalue what they own | Free trials create ownership feeling |
  | Contrast Principle | Comparisons shape perception | Competitor limitations before your strengths |
  | Sunk Cost | Past investment drives future decisions | "You've already invested time in this..." |

  ### Negotiation Psychology (8 models)

  | Model | Definition | Application |
  |-------|------------|-------------|
  | BATNA | Best Alternative to Negotiated Agreement - your walkaway option | Know yours and estimate theirs. Weak BATNA = weak position |
  | ZOPA | Zone of Possible Agreement - overlap between walk-away points | If no ZOPA exists, no deal is possible. Find it early |
  | Anchoring in Negotiation | First offer shapes the entire negotiation range | Anchor high but defensible. Let them negotiate down to your target |
  | Nibbling | Small asks after main agreement is reached | Protect against it: "Is this everything?" before finalizing |
  | Good Cop/Bad Cop | One person is friendly, other is tough to create concessions | Recognize it, address both personas, don't cave to "save" the good cop |
  | Deadline Pressure | Real or artificial deadlines create urgency to decide | Use legitimate deadlines (pricing, capacity). Call out fake ones |
  | Splitting the Difference | Feels fair but often benefits whoever anchored | Avoid it - justify your position with value, not math |
  | The Flinch | Visible reaction to price creates doubt and concessions | Practice your poker face. When they flinch, stay silent |

  ### Sales-Specific Cognitive Biases (10 models)

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Curse of Knowledge | Forgetting what beginners don't know | Explain without jargon. Check understanding. Don't assume they know acronyms |
  | Confirmation Bias in Qualification | Seeing what you want to see in deals | Challenge your own optimism. Have peers review deal assessments |
  | Optimism Bias in Forecasting | Overweighting positive signals, ignoring red flags | Forecast based on verifiable actions, not feelings. Track accuracy |
  | Attribution Error | Blaming losses on external factors, crediting wins to skill | Be honest about why deals close/lose. Learn from both |
  | Halo Effect in Deal Assessment | One positive trait colors entire perception | Evaluate each MEDDIC element independently. Big logo doesn't mean good deal |
  | Authority Bias in Enterprise | Over-deference to senior titles | Respect hierarchy but verify. VPs can be wrong too |
  | In-group Bias | Preferring prospects who seem like you | Recognize your blind spots. Systematize qualification |
  | Bandwagon Effect | Social proof influencing buying committees | Use strategically: "80% of companies in your space use..." |
  | Availability Heuristic | Overweighting recent events in judgments | One bad deal doesn't mean the market shifted. Look at patterns |
  | Framing Effects in Pricing | Same info, different reaction based on presentation | "$100/month" vs "$1,200/year" vs "$3.33/day" |

  ### Closing Psychology (8 models)

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Assumptive Close | Acting as if decision is already made | "When would you like implementation to start?" vs "Would you like to proceed?" |
  | Fear of Loss > Desire for Gain | Avoiding loss is stronger motivator than gaining benefit | "What happens if you don't fix this?" > "Imagine the upside" |
  | Decision Fatigue | Too many decisions degrade quality | Simplify choices. Present recommended option. Decide small things for them |
  | Option Paralysis | Too many options prevent any decision | Max 3 options. Have a clear recommendation. Remove complexity |
  | Default Bias in Renewals | People stick with default unless pushed to change | Make renewal the easy path. Auto-renewal with opt-out |
  | Commitment Escalation | Small commitments lead to larger ones | "Can you send me the org chart?" → demo → pilot → deal |
  | Negative Reverse Selling (Sandler) | Suggest they shouldn't buy to trigger defense of purchase | "Maybe this isn't the right fit for you..." makes them sell themselves |
  | Feel-Felt-Found | Empathy pattern for overcoming objections | "I understand how you feel. Others felt the same. What they found was..." |

