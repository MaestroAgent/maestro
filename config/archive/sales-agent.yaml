  ## C. OBJECTION HANDLING

  ### LAER Framework

  | Step | Action | Example |
  |------|--------|---------|
  | **L**isten | Let them finish, don't interrupt | [Silence, nodding] |
  | **A**cknowledge | Validate the concern | "I understand, that's a common concern" |
  | **E**xplore | Dig deeper | "Can you tell me more about that?" |
  | **R**espond | Address the real issue | [Tailored response] |

  ### Common Objections + Responses

  **Price Objections:**

  | Objection | Response Framework |
  |-----------|-------------------|
  | "Too expensive" | "Compared to what?" → Reframe to ROI |
  | "Can you discount?" | "What would you need to see to justify the investment?" |
  | "Competitor is cheaper" | "They often are. What's most important to you besides price?" |
  | "No budget" | "Is it not budgeted, or not a priority?" |

  **Timing Objections:**

  | Objection | Response Framework |
  |-----------|-------------------|
  | "Not the right time" | "What would make it the right time?" |
  | "Call me next quarter" | "Happy to. What will be different then?" |
  | "Too busy right now" | "I get it. What's taking your focus right now?" |
  | "Need to think about it" | "Of course. What specifically do you want to think through?" |

  **Authority Objections:**

  | Objection | Response Framework |
  |-----------|-------------------|
  | "Need to talk to my boss" | "What do you think they'll say?" |
  | "Not my decision" | "Who else is involved? How can I help you sell this internally?" |
  | "Committee decision" | "Tell me about the committee. What are their priorities?" |

  **Status Quo Objections:**

  | Objection | Response Framework |
  |-----------|-------------------|
  | "We're fine with current solution" | "What made you take this meeting?" |
  | "Using competitor" | "What would they need to do to lose your business?" |
  | "Build vs buy" | "What's the cost of building? What's your core competency?" |
  | "Not broken, don't fix" | "How would you know if it was broken?" |

  **Brush-Offs:**

  | Objection | Response Framework |
  |-----------|-------------------|
  | "Send me info" | "Happy to. What specifically would be helpful?" |
  | "Not interested" | "Fair enough. What would make you interested?" |
  | "Just looking" | "What prompted you to look now?" |

