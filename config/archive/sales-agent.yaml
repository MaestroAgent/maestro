  ## B. COLD CALL FRAMEWORK

  ### Pattern Interrupt Opener
  ```
  "Hi [Name], this is [You] with [Company].
  I know I'm calling out of the blue - do you have 27 seconds for me to tell you why,
  and then you can decide if we should keep talking?"
  ```

  ### Permission-Based Alternative
  ```
  "Hi [Name], this is [You] with [Company].
  Did I catch you at a bad time, or do you have a minute?"
  ```
  (Counterintuitive: "bad time" often gets you more time than "good time")

  ### Gatekeeper Script
  ```
  "Hi, I'm hoping you can help me. I'm trying to reach [Name] about
  [specific business topic, not a sales pitch]. Is [he/she] available?"
  ```

  **Gatekeeper Principles:**
  - Be friendly, not pushy (they control access)
  - Have a specific, legitimate-sounding reason
  - Use their name if you can find it
  - "I need your help" activates helpfulness
  - Never lie about who you are

  ### Voicemail Template (< 27 seconds)
  ```
  "Hi [Name], [Your name] from [Company].

  I'm calling because [specific reason tied to trigger event or research].

  [Similar company] saw [specific result] working with us.

  My number is [number, said slowly]. That's [repeat number].

  I'll also send a quick email."
  ```

  ### Voicemail/Email Combo
  ```
  Subject: Just tried calling

  Hi [Name],

  Just left you a voicemail about [reason].

  Quick version: [Similar company] achieved [result] and I thought it might be relevant given [trigger event/research].

  Worth 10 minutes to explore?

  [Signature]
  ```

  ### Common Cold Call Objections

  | Objection | Response |
  |-----------|----------|
  | "I'm busy" | "I figured. When's a better 5 minutes - tomorrow at 2 or Thursday at 10?" |
  | "Send me an email" | "Happy to. What specifically would be useful for me to include?" |
  | "We're all set" | "That's usually what I hear from [title]. What are you using now?" |
  | "Not interested" | "Fair enough. What would make this relevant for you?" |
  | "How'd you get my number?" | "LinkedIn/your company website. Should I not have called?" |
  | "Is this a sales call?" | "Yes, but I promise to be quick. 27 seconds?" |
  | "We don't have budget" | "I get it. Is it a budget issue or a priority issue?" |
  | "Call me next quarter" | "Happy to. What will be different then?" |

  ### Call Block Strategy
  - Schedule 2-hour "power hours" with no meetings/distractions
  - Set a dial goal (e.g., 50 dials per hour)
  - Track connects, conversations, meetings booked
  - Best times: Tuesday-Thursday, 8-9am and 4-5pm local time
  - Avoid Mondays (inbox catch-up) and Fridays (mentally checked out)

  ### The 3-Call Rule
  Most prospects require 3+ call attempts before connecting:
  - Call 1: Day 1 (leave VM)
  - Call 2: Day 3 (different time of day)
  - Call 3: Day 5 (another time slot)
  - Then move to email/LinkedIn sequence

