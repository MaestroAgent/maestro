  ### Email 4 (Day 14) - Breakup
  Subject: Should I close your file?

  Hi [Name],

  Haven't heard back, so I'll assume timing isn't right.

  If infrastructure bottlenecks become a priority, happy to reconnect.

  Either way, good luck with the DevOps hiring.

  [Signature]
  ```

  ### Example 2: Objection Handling Playbook

  ```
  ## Objection Response: "We're using [Competitor]"

  **When it comes up**: Usually early in discovery or outreach

  **What it really means** (diagnose first):
  - They're happy and this is a brush-off
  - They're curious what else is out there
  - They have issues but inertia is strong
  - They're locked in contractually

  **Response Framework (LAER):**

  **Listen**: "Got it, [Competitor] is solid."

  **Acknowledge**: "A lot of companies in your space use them."

  **Explore**:
  - "What made you choose them originally?"
  - "How's it going so far?"
  - "What would they need to do to lose your business?"
  - "If you could change one thing about how it works, what would it be?"

  **Respond** (based on what you learn):

  If happy → "Sounds like you're in good shape. Mind if I check back in [6 months] in case things change?"

  If issues surfaced → "Interesting. We've actually helped 3 companies switch from [Competitor] specifically because of [their issue]. Want to see how we solved that?"

  If contract-locked → "Totally understand. When's your renewal? Happy to reconnect 60 days before to give you options."

  **Key Principle**: Never trash competitors. Ask questions that let them articulate the problems themselves.
  ```

  ### Example 3: Discovery Call Debrief

  ```
  ## Discovery Call Debrief: [Company Name]

  **Date**: [Date]
  **Attendees**: [Names and titles]
  **Duration**: 45 minutes

  ### MEDDIC Assessment

  | Element | Status | Notes |
  |---------|--------|-------|
  | Metrics | Confirmed | $2M/year in manual processes, want 50% reduction |
  | Economic Buyer | Identified | CFO, not on call but will be in next meeting |
  | Decision Criteria | Partially known | Integration with Salesforce is must-have |
  | Decision Process | Unknown | Need to map in next call |
  | Identify Pain | Confirmed | Manual reporting taking 20 hrs/week |
  | Champion | Potential | VP Ops seems engaged, testing commitment |

  **MEDDIC Score**: 3.5/6 (Partially Qualified)

  ### Key Findings

  **Current State**:
  - 5-person ops team spending 20 hrs/week on manual reporting
  - Using spreadsheets + Salesforce + 3 other tools
  - Data inconsistencies causing forecasting errors

  **Pain (Quantified)**:
  - 20 hrs/week × $50/hr × 52 weeks = $52K/year direct cost
  - Forecasting errors leading to inventory issues (~$200K/year)
  - Total quantified pain: ~$250K/year

  **Desired Outcome**:
  - Single source of truth for ops data
  - Automated reporting
  - Real-time dashboards

  **Timeline**: Want to implement before Q3 planning (8 weeks)

  **Competition**: Evaluated [Competitor A], concerns about complexity

  ### Next Steps

  | Action | Owner | Due |
  |--------|-------|-----|
  | Send ROI calculator | Me | Tomorrow |
  | Schedule demo with CFO | Champion | Next week |
  | Provide Salesforce integration docs | Me | Before demo |
  | Reference call with similar company | Me | Set up option |

  ### Risk Factors
  - CFO not yet engaged
  - Decision process unclear
  - 8-week timeline is aggressive

  ### Deal Probability: 40%
  Needs CFO buy-in and clear decision process to move to 60%+
  ```

