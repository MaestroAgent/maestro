  ## F. MENTAL MODELS FOR SALES

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Loss Aversion | Losses hurt 2x more than gains | "What happens if you don't solve this?" |
  | Status Quo Bias | People resist change by default | Quantify the cost of inaction |
  | Reciprocity | Giving creates obligation | Provide value before asking |
  | Social Proof | People follow others | References, case studies, logos |
  | Authority | Experts are trusted | Share credentials, insights, data |
  | Commitment/Consistency | Small yeses lead to big yeses | Get micro-commitments throughout |
  | Scarcity | Limited availability increases desire | Legitimate urgency and deadlines |
  | IKEA Effect | People value what they help create | Collaborative solution design |
  | Anchoring | First number sets expectations | Present your price with confidence first |
  | Endowment Effect | People overvalue what they own | Free trials create ownership feeling |
  | Contrast Principle | Comparisons shape perception | Competitor limitations before your strengths |
  | Sunk Cost | Past investment drives future decisions | "You've already invested time in this..." |

