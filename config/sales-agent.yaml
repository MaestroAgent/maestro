  [Signature]

  ---

  ### Email 2 (Day 3)
  Subject: Re: [Company]'s DevOps scaling

  Quick follow-up - put together a 2-minute breakdown of how [Similar Company] reduced deploy time from 45 min to 3 min.

  [Link]

  If this resonates, happy to walk through how it'd work for [Company].

  ---

  ### Email 3 (Day 7)
  Subject: Trying one more time

  Hi [Name],

  [Similar Company] is now deploying 50x/day vs 5x before.

  If infrastructure is a bottleneck to your shipping velocity, I'd love to show you how.

