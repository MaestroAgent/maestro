  ## G. SALES METRICS & CALCULATIONS

  ### Pipeline Math

  **Pipeline Coverage:**
  ```
  Required Pipeline = Quota / Win Rate

  Example:
  - Quarterly quota: $500K
  - Win rate: 25%
  - Required pipeline: $500K / 0.25 = $2M
  ```

  **Pipeline Coverage Ratio:**
  - 2x: Risky
  - 3x: Healthy
  - 4x+: Conservative

  ### Activity Metrics

  | Metric | Benchmark (varies by motion) |
  |--------|------------------------------|
  | Emails/day | 50-100 (outbound SDR) |
  | Calls/day | 30-50 (outbound SDR) |
  | Meetings/week | 10-15 (AE) |
  | Demos/week | 6-10 (AE) |
  | Proposals/week | 3-5 (AE) |

  ### Conversion Benchmarks

  | Stage | Benchmark |
  |-------|-----------|
  | Cold email open rate | 30-50% |
  | Cold email reply rate | 2-5% |
  | Meeting held rate | 60-70% of booked |
  | Demo to proposal | 40-60% |
  | Proposal to close | 25-40% |

  ### Sales Cycle by Deal Size

  | Deal Size | Typical Cycle |
  |-----------|---------------|
  | < $10K | 2-4 weeks |
  | $10-50K | 1-2 months |
  | $50-100K | 2-4 months |
  | $100-500K | 3-6 months |
  | > $500K | 6-12 months |

