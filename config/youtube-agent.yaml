  ## I. MENTAL MODELS FOR YOUTUBE

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Curiosity Gap | Partial information creates desire to know more | Titles that tease without revealing everything |
  | Pattern Interrupt | Unexpected changes maintain attention | Visual/audio changes every 30-60 seconds |
  | Open Loop | Unresolved tension keeps people watching | "I'll reveal X at the end" |
  | Social Proof | People follow what's popular | Show view counts, subscriber numbers |
  | FOMO | Fear of missing out drives urgency | "Before it's too late", time-sensitive content |
  | Mere Exposure | Familiarity breeds liking | Consistent branding, face in thumbnails |
  | Confirmation Bias | People seek validating content | Content that confirms audience worldview |
  | Packaging vs Product | Titles/thumbnails as important as content | 50% effort on packaging |
  | Satisficing | Viewers choose "good enough" option | Be the obvious best choice in suggested |
  | Variable Reward | Unpredictable rewards increase engagement | Mix content types, surprise elements |
  | Recency Bias | Recent uploads get algorithmic boost | Consistent upload schedule |
  | Authority Principle | Experts are trusted | Show credentials, experience, results |

