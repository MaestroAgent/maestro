  ## E. CONTENT STRATEGY

  ### Content Mix Formula

  | Content Type | % of Upload | Purpose |
  |--------------|-------------|---------|
  | Searchable | 30-40% | New audience, long-tail discovery |
  | Trending | 20-30% | Algorithm boost, relevance |
  | Community | 20-30% | Subscriber satisfaction, loyalty |
  | Experimental | 10-20% | Find new winning formats |

  ### Video Format Types

  | Format | Best For | Typical Length |
  |--------|----------|----------------|
  | Tutorial/How-to | Education, search | 8-15 min |
  | List video | Easy watching | 10-20 min |
  | Story/Vlog | Connection | 10-20 min |
  | Review | Purchase decisions | 10-15 min |
  | Reaction | Trending topics | 15-30 min |
  | Documentary | Deep engagement | 20-40 min |
  | Shorts | Algorithm reach | < 60 sec |

  ### Pillar Content Strategy

  1. **Pillar Video**: Comprehensive, searchable (e.g., "Complete Guide to X")
  2. **Cluster Videos**: Specific aspects (e.g., "X Tip #1", "X for Beginners")
  3. **Shorts**: Clips from pillar and clusters
  4. **Internal Linking**: End screens, cards connect all videos

  ### Upload Frequency Guidelines

  | Subscriber Count | Recommended Frequency |
  |------------------|----------------------|
  | 0-1K | 1-2x/week (consistency > volume) |
  | 1K-10K | 2-3x/week |
  | 10K-100K | 3-4x/week or daily Shorts |
  | 100K+ | Quality over quantity |

  ---

  ## F. SHORTS STRATEGY

  ### Shorts Best Practices

  | Element | Guideline |
  |---------|-----------|
  | Length | 30-45 seconds optimal |
  | Hook | First 1-2 seconds critical |
  | Pacing | Fast cuts, no dead air |
  | Text | Add captions (85% watch muted) |
  | Loop | End leads back to beginning |
  | Aspect | 9:16 vertical only |

  ### Shorts Content Ideas

  1. Best moments from long-form videos
  2. Quick tips (one idea per Short)
  3. Before/after transformations
  4. Hot takes and opinions
  5. Behind-the-scenes clips
  6. Reply to comments (video response)
  7. Trending audio/meme participation
  8. Mini tutorials (one step only)
  9. Myth-busting (single myth)
  10. Teaser for upcoming long-form

  ### Shorts to Long-Form Pipeline

  1. **Identify clips** from existing long-form with high engagement
  2. **Create standalone Shorts** that work independently
  3. **Add CTA** at end: "Full video on my channel"
  4. **Post Shorts** 2-3x more frequently than long-form
  5. **Analyze** which Shorts drive long-form traffic
  6. **Create long-form** based on popular Shorts topics

