  ## I. MENTAL MODELS FOR YOUTUBE (27 Models)

  ### Core Psychology Models

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Curiosity Gap | Partial information creates desire to know more | Titles that tease without revealing everything |
  | Pattern Interrupt | Unexpected changes maintain attention | Visual/audio changes every 30-60 seconds |
  | Open Loop | Unresolved tension keeps people watching | "I'll reveal X at the end" |
  | Social Proof | People follow what's popular | Show view counts, subscriber numbers |
  | FOMO | Fear of missing out drives urgency | "Before it's too late", time-sensitive content |
  | Mere Exposure | Familiarity breeds liking | Consistent branding, face in thumbnails |
  | Confirmation Bias | People seek validating content | Content that confirms audience worldview |
  | Satisficing | Viewers choose "good enough" option | Be the obvious best choice in suggested |
  | Variable Reward | Unpredictable rewards increase engagement | Mix content types, surprise elements |
  | Authority Principle | Experts are trusted | Show credentials, experience, results |

  ### Algorithm & Platform Models

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Velocity Window | First 48-72 hours determine a video's trajectory. YouTube tests with initial audience, then expands or kills based on performance. | Front-load promotion, coordinate premiere, post at optimal time, engage comments heavily in first hours |
  | Impression Cascade | YouTube tests videos in waves: 100 impressions → 1K → 10K → 100K → 1M. Each wave must perform to unlock the next. | Monitor early performance closely. If CTR/AVD drop at any wave, video may cap out. Can't force through poor performance. |
  | Session Value | Videos that START viewing sessions (first video watched) are prioritized over videos that END sessions. | Create "entry point" content. Videos that make viewers want to watch MORE are rewarded. |
  | Recency Bias | Recent uploads get algorithmic boost | Consistent upload schedule |
  | Packaging vs Product | Titles/thumbnails are as important as content. 50% of success is packaging. | Spend equal time on packaging as content. Test thumbnails, iterate on titles. |
  | Platform Dependency | YouTube can change rules, algorithm, or monetization anytime. You're building on rented land. | Diversify: email list, other platforms, owned products. Never rely 100% on YouTube income. |
  | Algorithmic Debt | Bad videos hurt future performance. YouTube learns what your audience rejects and shows you to fewer people. | Better to skip a week than post a bad video. Maintain quality floor. Consider deleting underperformers. |

  ### Content & Growth Models

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Watchlist Psychology | Videos saved to "Watch Later" are rarely watched. The save action satisfies the intent. | Optimize for immediate watching, not saving. Create urgency. "Watch Later" is often "Watch Never." |
  | Subscriber Decay | Most subscribers never watch again after subscribing. Only 10-20% see your videos regularly. | Don't obsess over sub count. Focus on views and engagement. New viewers are more valuable than old subs. |
  | Niche Ceiling | Every niche has a maximum addressable audience. You can only grow so big in narrow niches. | Know your ceiling. Either accept it or expand topic scope. "Underwater basket weaving" caps out fast. |
  | Trend Surfing | Riding algorithmic waves - speed matters more than perfection. First mover advantage is real. | When trends emerge, post FAST. 80% quality in 48 hours beats 100% quality in 2 weeks. |
  | Evergreen Compound | Old videos accumulate value over time through search traffic. They compound while you sleep. | Build evergreen content library. These videos pay dividends for years. Balance with trending content. |
  | Creator Fatigue | Burnout is the #1 channel killer. Consistency matters, but not at the cost of your health. | Build sustainable pace. Batch content. Take breaks. A dead creator makes zero videos. |
  | The 3H Framework | Hero (tent-pole events), Hub (series/episodic), Help (searchable utility). Balanced content mix. | Hero: 1-2x/quarter (viral attempts). Hub: Weekly series. Help: Ongoing searchable content. |
  | Content Velocity vs Quality | Tradeoff between posting frequency and production value. Sweet spot depends on niche. | Gaming/news: high velocity, lower production. Documentary/education: lower velocity, higher production. |
  | Audience Retention Compound | Each video trains your audience. Good retention teaches viewers to watch longer. Bad retention teaches them to leave. | Early videos set expectations. If you train viewers on 5-min videos, 20-min will struggle. Build up gradually. |
  | The Packaging Paradox | Better packaging can HURT if content doesn't deliver. High CTR + low AVD = algorithm death. | Packaging must match content quality. Overpromising destroys trust and signals. Underpromise, overdeliver. |

