  ## I2. CALCULATION FORMULAS & BENCHMARKS

  ### Core Performance Formulas

  **Subscriber-to-View Ratio (SVR)**
  ```
  SVR = (Average Views per Video / Subscriber Count) × 100

  Benchmarks:
  - > 100%: Viral potential, reaching beyond subscribers
  - 50-100%: Excellent, highly engaged audience
  - 20-50%: Healthy, normal performance
  - 10-20%: Below average, subscribers not engaging
  - < 10%: Concerning, "dead" subscribers or misaligned content

  Example: 50K subs, 15K avg views = 30% SVR (healthy)
  ```

  **Viral Coefficient (K-Factor)**
  ```
  K = (Invitations per user) × (Conversion rate)
  Or for YouTube: K = (Shares per 1K views) × (View-to-sub rate from shares)

  Benchmarks:
  - K > 1: Viral growth (each viewer brings more than 1 new viewer)
  - K = 1: Sustainable (maintaining audience)
  - K < 1: Decay (need paid/organic promotion to grow)

  Example: 50 shares per 1K views, 10% convert to viewers who sub
  K = 0.05 × 0.10 = 0.005 (needs promotion support)
  ```

  **Revenue Projection**
  ```
  Monthly Revenue = (Monthly Views / 1,000) × RPM

  Example: 500K views/month, $8 RPM
  Revenue = 500 × $8 = $4,000/month

  Annual projection: $4,000 × 12 = $48,000/year
  (Note: Q4 RPMs are typically 30-50% higher)
  ```

  **Watch Time Target**
  ```
  Watch Time Target = Video Length × Target AVD% × Expected Views

  Example: 12-minute video, targeting 45% AVD, expect 20K views
  Watch Time = 12 × 0.45 × 20,000 = 108,000 minutes = 1,800 hours

  Use this to project 4,000-hour monetization threshold:
  Videos needed = 4,000 / (expected watch time per video)
  ```

  ### Impression Funnel Analysis

  ```
  FULL FUNNEL:
  Impressions (YouTube shows you)
      ↓ × CTR (Click-through rate)
  Views (People click)
      ↓ × AVD% (Retention)
  Watch Time (Engagement depth)
      ↓ × Sub Rate (Typically 0.5-2%)
  Subscribers (Growth)

  Example Funnel:
  100,000 impressions
  × 5% CTR = 5,000 views
  × 40% AVD on 10-min video = 20,000 minutes watch time
  × 1% sub rate = 50 new subscribers

  Funnel Diagnosis:
  - Low impressions: Upload more, improve metadata
  - Low CTR: Fix thumbnail/title
  - Low AVD: Improve content/hooks
  - Low sub rate: Add clearer CTAs
  ```

  ### CPM by Ad Type

  | Ad Type | Typical CPM | Notes |
  |---------|-------------|-------|
  | Skippable in-stream | $2-8 | Most common, lower CPM |
  | Non-skippable (15-20s) | $10-20 | Higher CPM, limited inventory |
  | Bumper ads (6s) | $5-15 | Premium inventory |
  | Display/overlay | $0.50-2 | Desktop only, lowest value |
  | Shorts ads | $0.01-0.10 | Very low CPM |

  **RPM vs CPM:**
  - CPM = what advertisers pay per 1K ad impressions
  - RPM = what YOU earn per 1K video views (after YouTube's 45% cut, accounting for non-monetized views)
  - Typical ratio: RPM ≈ 40-60% of CPM

  ### Sponsorship Rate Formulas

  **Method 1: Per-Subscriber Pricing**
  ```
  Base Rate = Subscribers × Rate per Sub

  Rate per sub by niche:
  - Finance/B2B: $0.03-0.05 per sub
  - Tech/SaaS: $0.02-0.04 per sub
  - Lifestyle/Beauty: $0.01-0.03 per sub
  - Gaming/Entertainment: $0.005-0.02 per sub

  Example: 100K tech subs = $2,000-4,000 base rate
  ```

  **Method 2: CPM-Based Pricing**
  ```
  Sponsorship Rate = (Expected Views / 1,000) × Sponsor CPM

  Sponsor CPM ranges:
  - Integrated mention (30-60s): $20-35 CPM
  - Dedicated segment (2-3 min): $35-50 CPM
  - Full video sponsorship: $50-100 CPM

  Example: Expect 50K views, dedicated segment
  Rate = 50 × $40 = $2,000
  ```

  **Method 3: Value-Based Pricing**
  ```
  Consider: audience quality, engagement rate, exclusivity, usage rights

  Premium multipliers:
  - Exclusive (no competitor ads): 1.5-2x
  - Usage rights (brand can repurpose): 1.3-1.5x
  - Rush delivery (< 1 week): 1.25x
  - Proven conversion data: 1.5-3x
  ```

  ### Growth Calculations

  **Time to Monetization (4K hours)**
  ```
  Months to 4K hours = 4,000 / (Monthly Watch Time Hours)

  Monthly Watch Time = (Videos/month) × (Avg length) × (Avg views) × (AVD%)

  Example: 4 videos/month, 10 min avg, 5K views, 40% AVD
  Monthly = 4 × 10 × 5,000 × 0.40 = 80,000 min = 1,333 hours
  Time to 4K = 4,000 / 1,333 = 3 months
  ```

  **Subscriber Milestone Projection**
  ```
  Time to X subs = (X - Current subs) / Monthly sub gain

  Monthly sub gain = (Monthly views) × (Sub rate)

  Example: At 5K subs, want 10K. Getting 50K views/month, 1% sub rate.
  Monthly gain = 50,000 × 0.01 = 500 subs
  Time = 5,000 / 500 = 10 months
  ```

