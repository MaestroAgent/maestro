  ## J2. YOUTUBE STUDIO ANALYTICS DEEP-DIVE

  ### Overview Tab Analysis

  **Real-Time Velocity Indicators:**
  | Metric | What to Look For | Action |
  |--------|------------------|--------|
  | Views (last 48h) | Compare to previous video same time period | If lower, boost promotion; if higher, double down |
  | Real-time views | Spike pattern vs steady climb | Spikes = external traffic; steady = algorithm |
  | Top videos (48h) | Which content is currently performing | Create more similar content |

  **Key Comparisons:**
  - Compare to "typical performance" baseline YouTube provides
  - Compare same day-of-week uploads
  - Compare seasonal patterns (Q4 typically higher)

  ### Reach Tab Analysis

  **Impression Sources Breakdown:**

  | Source | What It Means | Optimization |
  |--------|---------------|--------------|
  | Browse features | YouTube recommending on home | High CTR + AVD = more browse |
  | Suggested videos | Shown after other videos | Related content strategy |
  | YouTube search | Searchable content working | SEO optimization |
  | Channel pages | Direct channel visits | Subscriber loyalty |
  | External | Traffic from outside YouTube | Cross-promotion working |
  | Playlists | Playlist views | Create more playlists |
  | Notifications | Subscriber bells | Engaged subscriber base |

  **CTR by Source (Benchmarks):**
  - Browse: 2-8% (lowest, broadest audience)
  - Suggested: 4-10% (warmer, related interest)
  - Search: 5-15% (highest intent)
  - Notifications: 10-20%+ (warmest audience)

  **Diagnostic Questions:**
  - Is browse traffic low? → Improve packaging for cold audiences
  - Is suggested traffic low? → Create more related/series content
  - Is search traffic low? → Improve SEO, target specific keywords

  ### Engagement Tab Analysis

  **Watch Time Patterns:**

  | Pattern | Diagnosis | Action |
  |---------|-----------|--------|
  | Sharp early drop (0-30s) | Weak hook or misleading packaging | Improve opening, align packaging |
  | Gradual decline | Normal, but check where it accelerates | Add pattern interrupts at drop points |
  | Cliff at specific point | Content problem at that timestamp | Review and fix that section |
  | Uptick near end | End screen or payoff working | Maintain strategy |
  | Flat line | Highly engaged audience (rare) | You're doing something right |

  **End Screen Effectiveness:**
  - Video element CTR: Target >5%
  - Subscribe element CTR: Target >1%
  - Playlist element CTR: Target >3%

  **If end screen underperforms:**
  - Show end screen earlier (before viewer leaves)
  - Use verbal CTA + visual element together
  - Point at the element

  **Card Effectiveness:**
  - Teaser CTR: Target >2%
  - Card CTR: Target >1%

  **Card Optimization:**
  - Place at retention dip points
  - Link to relevant content (not random videos)
  - Use custom teaser text

  ### Audience Tab Analysis

  **When Viewers Are Online:**
  - Peak days: Identify your audience's most active days
  - Peak hours: Usually evenings in primary timezone
  - Upload timing: Publish 30-60 min before peak

  **Audience Retention Comparison:**
  - Compare AVD% across videos
  - Identify your "best" retention patterns
  - Replicate structure of high-retention videos

  **Audience Overlap (Channels They Watch):**
  - Identify collaboration targets
  - Understand adjacent content interests
  - Find inspiration for topics

  **Subscriber vs Non-Subscriber Views:**
  - Healthy ratio: 70-80% non-subscriber views
  - Too many subscribers (>50%): Not reaching new audience
  - Very few subscribers (<10%): Subscribers not engaged

  ### Revenue Tab Analysis (Monetized Channels)

  **RPM Trends:**
  | Season | Typical RPM Change | Reason |
  |--------|-------------------|--------|
  | Q1 (Jan-Mar) | -20-40% vs Q4 | Post-holiday ad budget cuts |
  | Q2 (Apr-Jun) | Gradual recovery | |
  | Q3 (Jul-Sep) | Moderate | Back-to-school in Sep |
  | Q4 (Oct-Dec) | +30-50% | Holiday ad spend surge |

  **Ad Type Performance:**
  - Track which ad types generate most revenue
  - More mid-rolls = more opportunities (8+ min videos)
  - Non-skippable = higher CPM but viewer friction

  **Playback-Based CPM:**
  - Higher watch time = higher CPM (ads viewed longer)
  - Videos watched on TV typically have higher CPM
  - Mobile varies by region

  **Revenue Anomalies to Investigate:**
  - Sudden RPM drop: Check for YPP issues, advertiser restrictions
  - Single video revenue spike: May have hit premium advertiser targeting
  - Consistent low RPM: Content may be "limited ads" or demonetized

