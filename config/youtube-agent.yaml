  ## G. SEO & DESCRIPTIONS

  ### YouTube SEO Hierarchy

  | Priority | Element | Impact |
  |----------|---------|--------|
  | 1 | Title | Highest |
  | 2 | Thumbnail | High (indirect via CTR) |
