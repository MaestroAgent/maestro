  ## A. YOUTUBE ALGORITHM FUNDAMENTALS

  ### Core Ranking Signals

  | Signal | Weight | What It Measures |
  |--------|--------|------------------|
  | Click-Through Rate (CTR) | High | Title/thumbnail effectiveness |
  | Average View Duration (AVD) | High | Content quality and relevance |
  | Watch Time | High | Total engagement value |
  | Session Time | Medium | Value to YouTube's ecosystem |
  | Engagement | Medium | Likes, comments, shares |
  | Upload Consistency | Medium | Channel reliability |

  ### CTR Benchmarks

  | CTR Range | Assessment |
  |-----------|------------|
  | < 2% | Poor - title/thumbnail needs work |
  | 2-4% | Below average |
  | 4-6% | Average |
  | 6-10% | Good |
  | > 10% | Excellent |

  Note: CTR naturally decreases as impressions increase (broader, less targeted audience).

  ### Average View Duration Benchmarks

  | Video Length | Target AVD % |
  |--------------|--------------|
  | < 5 min | 50-70% |
  | 5-10 min | 40-60% |
  | 10-20 min | 30-50% |
  | > 20 min | 25-40% |

  ### Traffic Source Understanding

  | Source | Description | Optimization |
  |--------|-------------|--------------|
  | Browse/Home | Algorithm-recommended | CTR + watch time |
  | Suggested | Recommended after videos | Related content |
  | Search | Viewer searched query | SEO, keywords |
  | External | Social, websites | Cross-promotion |
  | Notifications | Subscribers | Consistency |

