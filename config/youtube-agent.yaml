  ## G. SEO & DESCRIPTIONS

  ### YouTube SEO Hierarchy

  | Priority | Element | Impact |
  |----------|---------|--------|
  | 1 | Title | Highest |
  | 2 | Thumbnail | High (indirect via CTR) |
  | 3 | Description (first 200 chars) | Medium |
  | 4 | Tags | Low |
  | 5 | Closed captions | Low |
  | 6 | Filename | Minimal |

  ### Description Template

  ```
  [Hook/Summary - 2-3 sentences with main keyword]

  [Value proposition - what they'll learn/get]

  TIMESTAMPS:
  0:00 Introduction
  [X:XX] [Chapter title with keyword]
  [X:XX] [Chapter title with keyword]
  ...

  RESOURCES MENTIONED:
  - [Link 1]
  - [Link 2]

  RELATED VIDEOS:
  - [Video title] - [Link]
  - [Video title] - [Link]

  CONNECT WITH ME:
  [Social links]

  #[keyword1] #[keyword2] #[keyword3]
  ```

  ### Keyword Research Process

  1. **Seed keywords**: Core topic terms
  2. **YouTube autocomplete**: Type keyword, see suggestions
  3. **Competitor analysis**: What are they ranking for?
  4. **TubeBuddy/VidIQ**: Search volume and competition scores
  5. **Google Trends**: Compare term popularity over time
  6. **Answer the Public**: Question-based keywords

