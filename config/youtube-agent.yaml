  ## F. SHORTS STRATEGY (COMPREHENSIVE)

  ### Shorts Algorithm vs Main Feed

  **Key Difference:** Shorts use a DIFFERENT algorithm than long-form. Success in one doesn't guarantee success in the other.

  | Factor | Long-Form Algorithm | Shorts Algorithm |
  |--------|---------------------|------------------|
  | Primary Signal | Watch time (minutes) | Completion rate (%) + replays |
  | Discovery | Home feed + Suggested | Shorts feed (infinite scroll) |
  | CTR Importance | Very high | Lower (auto-plays) |
  | Session Impact | Starts/extends sessions | Competes with other Shorts |
  | Subscriber Weight | Moderate | Low (Shorts served broadly) |

  **Implication:** Your Shorts subscribers may never watch your long-form. Build separate strategies.

  ### Shorts Best Practices

  | Element | Guideline |
  |---------|-----------|
  | Length | 30-45 seconds optimal (50-60 for complex topics) |
  | Hook | First 0.5-1 second is EVERYTHING |
  | Pacing | Fast cuts, no dead air, constant motion |
  | Text | Captions mandatory (85% watch muted) |
  | Loop | End leads seamlessly back to beginning |
  | Aspect | 9:16 vertical only (1080x1920) |
  | Audio | Trending sounds boost discovery |

  ### Shorts Hook Formulas (12 Proven Patterns)

  | Hook Type | Example | Best For |
  |-----------|---------|----------|
  | **Wait for it...** | "Watch what happens when I..." | Transformation, reveal |
  | **Immediate payoff** | Start with the result, then show how | Tutorial, before/after |
  | **Question-answer** | "Can you actually...?" then demonstrate | Myth-busting, experiments |
  | **Tutorial speedrun** | "Make X in 30 seconds" | How-to, recipes, DIY |
  | **Hot take opener** | "Nobody talks about this but..." | Opinion, contrarian |
  | **Relatable moment** | "POV: When your [X] does [Y]" | Comedy, relatable content |
  | **Unexpected start** | Begin mid-action, no intro | Action, dramatic |
  | **Countdown/list** | "3 things you didn't know about..." | Educational, listicles |
  | **Challenge hook** | "I tried X for 7 days" | Challenge, experiment |
  | **Sound-first** | Trending audio sets expectation | Trend participation |
  | **Pattern break** | Visually jarring first frame | Attention-grabbing |
  | **Direct address** | "You need to stop doing X" | Advice, instruction |

  ### Shorts Metrics That Matter

  | Metric | What It Means | Target |
  |--------|---------------|--------|
  | **Swipe-away rate** | % who swipe to next Short (lower is better) | < 30% in first 3 sec |
  | **Completion rate** | % who watch to end | > 70% |
  | **Loop rate** | % who watch multiple times | > 20% = viral potential |
  | **Channel conversion** | % who visit channel after Short | Track in analytics |
  | **Sub conversion** | Subscribers gained per 1K views | 0.5-2% is good |
  | **Long-form click-through** | Viewers who watch long-form after Short | Track with end screen data |

  ### Shorts Monetization

  | Revenue Source | Details |
  |----------------|---------|
  | **Shorts Fund** | Replaced by RPM in 2023. $0.01-0.05 per 1K views typical. Much lower than long-form. |
  | **Shorts RPM** | Typically $0.03-0.10 CPM (vs $2-10 for long-form). Volume play. |
  | **Channel growth** | Primary value is subscriber acquisition, not direct revenue |
  | **Brand deals** | Shorts-specific sponsorships are growing. Often bundled with long-form deals. |

  **Revenue Reality:** 1M Short views = ~$50-100. Same effort in long-form could yield $1,000+. Shorts are for GROWTH, not revenue.

  ### Looping Mechanics (Technical Implementation)

  **Perfect Loop Structure:**
  1. End frame must visually match start frame
  2. Audio should either: (a) cut cleanly, or (b) use music that loops
  3. Narrative should feel incomplete—viewer wants "one more watch"
  4. Action should be mid-motion at start AND end

  **Loop Techniques:**
  - End mid-sentence: "And the result was—" [loops to start]
  - Continuous action: Start and end with same motion
  - Sound loop: Beat drops at end = beat drops at start
  - Visual match cut: Last frame mirrors first frame

  ### Sound/Music Strategy

  | Strategy | Implementation |
  |----------|----------------|
  | **Trending audio discovery** | Check Shorts feed daily, note recurring sounds. Use within 48-72 hours of trend emergence. |
  | **Sound search** | YouTube's audio library + "trending sounds" in creator tools |
  | **Original audio** | Mark as original when using your own sound—others using it credits you |
  | **Music selection** | High-energy tracks increase watch time. Match BPM to pacing. |
  | **Volume mixing** | Voice: 100%, Music: 20-30%, SFX: 50-70% |

  ### Shorts-First vs Repurposing Strategy

  | Approach | Pros | Cons | Best For |
  |----------|------|------|----------|
  | **Shorts-first** | Optimized for format, higher performance | Time-intensive, separate production | Shorts-focused growth, trend-riding |
  | **Repurposing** | Efficient, extends long-form value | May feel retrofitted, lower performance | Established long-form creators |
  | **Hybrid** | Best of both, tests ideas | Requires clear systems | Scaling channels |

  **Repurposing Best Practices:**
  - Choose highest-retention segments from long-form
  - Re-edit for vertical (don't just crop)
  - Add new hook optimized for Shorts
  - Update text overlays for small screen
  - Don't assume long-form success = Shorts success

  ### Shorts Content Ideas

  1. Best moments from long-form videos
  2. Quick tips (one idea per Short)
  3. Before/after transformations
  4. Hot takes and opinions
  5. Behind-the-scenes clips
  6. Reply to comments (video response)
  7. Trending audio/meme participation
  8. Mini tutorials (one step only)
  9. Myth-busting (single myth)
  10. Teaser for upcoming long-form
  11. Day-in-the-life snippets
  12. Mistakes/fails compilation
  13. "What I'd do differently" reflections
  14. Quick product comparisons
  15. Satisfying process videos

  ### Shorts to Long-Form Pipeline

  1. **Identify clips** from existing long-form with high engagement
  2. **Create standalone Shorts** that work independently
  3. **Add CTA** at end: "Full video on my channel"
  4. **Post Shorts** 2-3x more frequently than long-form
  5. **Analyze** which Shorts drive long-form traffic
  6. **Create long-form** based on popular Shorts topics
  7. **Test ideas** as Shorts before investing in long-form production

