  ## E2. NAMED FRAMEWORKS FOR YOUTUBE SUCCESS

  ### The 3H Framework (Hero-Hub-Help)

  Developed by Google, this framework balances content types for sustainable growth:

  | Type | Description | Frequency | Purpose | Example |
  |------|-------------|-----------|---------|---------|
  | **Hero** | Big, ambitious content designed to reach new audiences. Tent-pole videos with viral potential. | 1-2x per quarter | Massive reach, new subscribers | Collaboration, documentary, challenge |
  | **Hub** | Episodic, series-based content your subscribers expect. Builds anticipation and habit. | Weekly/bi-weekly | Subscriber retention, consistency | "Tech News Weekly", "Budget Eats Ep. 5" |
  | **Help** | Searchable, utility-driven content. Answers specific questions people are Googling. | Ongoing | Long-tail discovery, trust-building | "How to Reset iPhone", "Best Camera Settings for X" |

  **Optimal Mix:** Hero 10%, Hub 40%, Help 50% (for growth). Shift toward more Hub as channel matures.

  ### AVR Framework (Attract-Value-Retain)

  Structure every video in three phases:

  | Phase | Timing | Goal | Techniques |
  |-------|--------|------|------------|
  | **Attract** | 0-5 seconds | Stop the scroll, hook attention | Visual hook, bold statement, unexpected start |
  | **Value** | Main content | Deliver on promise, provide worth | Clear structure, practical takeaways, entertainment |
  | **Retain** | Throughout + end | Keep watching, return for more | Pattern interrupts, open loops, strong CTA, preview next video |

  **Key Insight:** If Attract fails, Value is never seen. If Value fails, Retain is pointless.

  ### Content Quadrant Framework

  Categorize all video ideas by effort vs. potential:

  ```
                        HIGH VIEWS POTENTIAL
                              |
        SWEET SPOT            |           BETS
     (Low effort, high ROI)   |    (High effort, high potential)
     - Talking head opinions  |    - Documentaries
     - Quick tutorials        |    - Challenges
     - Hot takes              |    - Collaborations
                              |
  ----------------------EFFORT LINE----------------------
                              |
        FILLERS               |          TRAPS
     (Low effort, low reward) |    (High effort, low reward)
     - Random vlogs           |    - Overproduced niche content
     - Unplanned content      |    - Passion projects with no audience
     - "Just chatting"        |    - Perfectionist spirals
                              |
                        LOW VIEWS POTENTIAL
  ```

  **Strategy:** Maximize SWEET SPOT, selectively invest in BETS, minimize FILLERS, avoid TRAPS.

  ### MrBeast's 1-2-3 Rule

  The simplest framework for viral packaging:

  | Element | Rule | Why It Works |
  |---------|------|--------------|
  | **1 Emotion** | Thumbnail should trigger ONE clear emotion (curiosity, shock, excitement, fear) | Multiple emotions confuse; single emotion compels |
  | **2-3 Word Title Core** | The essential hook should be 2-3 words max | "Ages 1-100" / "Squid Game" / "$456,000" - brain processes instantly |
  | **3 Thumbnail Elements** | Face + Text + Object (or context). Never more than 3 major elements. | Cluttered thumbnails fail the glance test |

  **MrBeast Corollary:** "If you can't explain the video in 3 words, the idea isn't clear enough."

  ### The Packaging Formula

  **Click Decision = Title (Text Hook) + Thumbnail (Visual Hook)**

  Both must work together but NOT duplicate each other:

  | Component | Job | Do | Don't |
  |-----------|-----|-----|-------|
  | **Title** | Explain WHAT + create curiosity | Promise specific outcome, use numbers, create gap | Repeat thumbnail text, be vague, clickbait without delivery |
  | **Thumbnail** | Show EMOTION + create intrigue | Express clear feeling, show transformation, tease result | Be cluttered, use too much text, look like every other video |

  **The Test:** Cover the title and ask "Would I click?" Cover the thumbnail and ask "Would I click?" Both should be compelling independently AND complementary together.

  ### The AIDA Framework for YouTube

  Classic marketing framework adapted for video:

  | Stage | Video Application | Tactics |
  |-------|-------------------|---------|
  | **Attention** | First 3 seconds | Pattern break, visual hook, unexpected statement |
  | **Interest** | Seconds 3-30 | Problem identification, promise, credibility |
  | **Desire** | Middle content | Benefits, social proof, transformation shown |
  | **Action** | End of video | Clear CTA, end screen, next video tease |

  ### The 10-10-10 Retention Formula

  For any video, evaluate:
  - First 10 seconds: Does it hook? (measure: 10-second retention %)
  - Every 10% mark: Is there a pattern interrupt or payoff?
  - Last 10 seconds: Is there a clear next action?

  If any of these fail, the video has structural issues.

  ### Upload Frequency Guidelines

  | Subscriber Count | Recommended Frequency |
  |------------------|----------------------|
  | 0-1K | 1-2x/week (consistency > volume) |
  | 1K-10K | 2-3x/week |
  | 10K-100K | 3-4x/week or daily Shorts |
  | 100K+ | Quality over quantity |

