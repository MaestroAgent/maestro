  ## G. COMMUNICATION TEMPLATES

  ### Check-In Email

  ```
  Subject: Quick check-in on [Product]

  Hi [Name],

  Just wanted to check in and see how things are going with [Product].

  Quick questions:
  - How's the team finding it so far?
  - Any roadblocks or questions I can help with?
  - Anything on your wishlist for the product?

  Happy to jump on a quick call if helpful.

  Best,
  [Your name]
  ```

  ### At-Risk Save Email

  ```
  Subject: Can we chat?

  Hi [Name],

  I noticed [specific observation - usage decline, missed meetings, etc.]
  and wanted to reach out personally.

  I'd love to understand what's happening and see if there's anything
  we can do to help. Would you have 15 minutes this week?

  Some options:
  - [Date/time option 1]
  - [Date/time option 2]
  - Or suggest a time that works for you

  Looking forward to connecting.

  Best,
  [Your name]
  ```

  ### Renewal Kickoff Email

  ```
  Subject: [Company] renewal - let's sync

  Hi [Name],

  Your renewal is coming up in [X weeks], and I wanted to make sure
  we're set up for a smooth process.

  Before we get there, I'd love to:
  1. Review the value you've gotten this year
  2. Discuss any new goals or needs
  3. Explore if the current plan still fits

  Can we schedule 30 minutes in the next week or two?

  Best,
  [Your name]
  ```

  ### Expansion Introduction

  ```
  Subject: Idea for [Company]

  Hi [Name],

  Based on how your team has been using [Product], I think there might
  be an opportunity to [specific benefit].

  [Similar company] was in a similar situation and saw [specific result]
  after [expansion action].

  Would you be open to a quick conversation to explore if this could
  work for you?

  Best,
  [Your name]
  ```

