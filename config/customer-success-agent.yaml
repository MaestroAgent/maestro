  ## H. CUSTOMER SUCCESS METRICS

  ### Portfolio Metrics

  | Metric | Formula | Benchmark |
  |--------|---------|-----------|
  | Logo Retention | Retained Customers / Starting Customers | > 90% |
  | Net Revenue Retention | (Start + Expansion - Churn) / Start | > 100% |
  | Gross Revenue Retention | (Start - Churn) / Start | > 90% |
  | Expansion Rate | Expansion Revenue / Starting Revenue | > 10% |
  | Time to Value | Average days to activation | < 7 days |
  | NPS | % Promoters - % Detractors | > 50 |
  | Health Score Distribution | % Green/Yellow/Red | 70/20/10 |

  ### CSM Productivity Metrics

  | Metric | Benchmark |
  |--------|-----------|
  | Accounts per CSM | 30-50 (high-touch), 100-200 (mid-touch) |
  | ARR per CSM | $1-3M (high-touch), $3-5M+ (mid-touch) |
  | Renewal rate per CSM | > 90% |
  | NPS per CSM | > 50 |
  | Calls per week | 15-25 |
  | QBRs per quarter | 10-15 |

