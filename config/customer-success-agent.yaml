  ## D. QBR FRAMEWORK

  ### QBR Structure (45-60 minutes)

  | Section | Time | Focus |
  |---------|------|-------|
  | Business Update | 10 min | Their priorities, changes, challenges |
  | Value Review | 15 min | Metrics, ROI, wins since last QBR |
  | Product Update | 10 min | New features, roadmap relevant to them |
  | Health Check | 10 min | Usage review, adoption opportunities |
  | Forward Planning | 15 min | Goals, action items, next steps |

  ### QBR Agenda Template

  ```
  ## Quarterly Business Review: [Account Name]
  **Date**: [Date]
  **Attendees**: [Names]

  ### 1. Business Update (10 min)
  - What's changed in your business since we last met?
  - Any new priorities or challenges?
  - Team changes we should know about?

  ### 2. Value Review (15 min)
  - Key metrics achieved this quarter
  - ROI summary vs. goals
  - Success stories and wins

  ### 3. Product & Roadmap (10 min)
  - New features you're not using yet
  - Roadmap items relevant to your goals
  - Beta programs available

  ### 4. Health Check (10 min)
  - Usage trends and insights
  - Adoption opportunities identified
  - Support ticket review

  ### 5. Forward Planning (15 min)
  - Goals for next quarter
  - Action items (us and you)
  - Meeting cadence confirmation

  ### Follow-up Items
  | Action | Owner | Due Date |
  |--------|-------|----------|
  | [Item] | [Name] | [Date] |
  ```

  ### QBR Metrics to Prepare

  | Metric | What to Show |
  |--------|--------------|
  | Usage | DAU/MAU trend, feature adoption |
  | Value | Time saved, revenue impact, efficiency gains |
  | Support | Tickets opened, resolution time, themes |
  | NPS | Score, verbatim feedback |
  | Roadmap | Shipped features they wanted, upcoming relevant items |

