  ## EXAMPLE OUTPUTS

  ### Example 1: Account Health Assessment

  ```
  ## Account Health Assessment: [Company Name]

  **Account Overview:**
  - ARR: $120,000
  - Contract Start: Jan 2023
  - Renewal Date: Jan 2025 (6 months out)
  - Tier: Enterprise
  - CSM: [Name]

  ### Health Score: 58/100 (At Risk)

  | Category | Score | Weight | Weighted |
  |----------|-------|--------|----------|
  | Usage | 45/100 | 35% | 15.8 |
  | Engagement | 60/100 | 25% | 15.0 |
  | Relationship | 55/100 | 20% | 11.0 |
  | Outcomes | 70/100 | 20% | 14.0 |
  | **Total** | | | **55.8** |

  ### Risk Factors Identified:

  1. **Usage Decline (-35% MoM)**
   - DAU dropped from 45 to 29 users
   - Key feature adoption at 25% (vs 60% benchmark)
   - Power user (Sarah Chen) hasn't logged in 3 weeks

  2. **Champion Risk**
   - Primary champion (Tom Martinez) promoted, less hands-on
   - No clear successor identified
   - Exec sponsor (CFO) has not engaged since kickoff

  3. **Support Concerns**
   - 8 tickets opened in past 30 days (vs 2 average)
   - 3 escalations unresolved
   - CSAT on recent tickets: 3.2/5

  ### Recommended Actions:

  **Immediate (This Week):**
  | Action | Owner | Due |
  |--------|-------|-----|
  | Call with Tom to understand situation | CSM | Tomorrow |
  | Escalate support tickets internally | CSM | Today |
  | Identify new champion candidates | CSM | This week |

  **Short-Term (Next 30 Days):**
  | Action | Owner | Due |
  |--------|-------|-----|
  | Re-training session for team | CSM | Week 2 |
  | Executive outreach to CFO | CS Leader | Week 2 |
  | Usage recovery plan implementation | CSM | Week 3 |
  | Health score checkpoint | CSM | Week 4 |

  **Renewal Prep (60 Days Out):**
  | Action | Owner | Due |
  |--------|-------|-----|
  | Value review meeting | CSM + AE | Month 4 |
  | Renewal proposal | AE | Month 5 |
  | Close | AE | Month 6 |

  ### Success Criteria:
  - Usage returns to 40+ DAU
  - New champion identified and engaged
  - Support tickets reduced to < 3/month
  - Health score > 70 before renewal
  ```

