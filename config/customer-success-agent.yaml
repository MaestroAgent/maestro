  ### Example 3: Onboarding Program

  ```
  ## Onboarding Program Design: [Product]

  **Goal:** Achieve first value within 7 days, full activation by 30 days
  **Model:** High-touch (for accounts > $50K ARR)

  ### Milestones & Success Criteria

  | Milestone | Day | Definition | Target % |
  |-----------|-----|------------|----------|
  | Account Created | 0 | Signup complete | 100% |
  | Setup Complete | 1 | Config + integrations done | 90% |
  | First Use | 3 | Completed first [action] | 85% |
  | Aha Moment | 7 | Experienced [value event] | 75% |
  | Team Rollout | 14 | 5+ users active | 70% |
  | Full Adoption | 30 | All core features used | 60% |

  ### Touch Schedule

  | Day | Touch | Channel | Content |
  |-----|-------|---------|---------|
  | 0 | Welcome | Email | Login details + resources |
  | 1 | Kickoff | Call | Goals, setup, training |
  | 2 | Setup check | Email | "Need help finishing setup?" |
  | 4 | First win | Email | Tutorial for core feature |
  | 7 | Week 1 review | Call | Progress check, blockers |
  | 10 | Feature spotlight | Email | Highlight underused feature |
  | 14 | Team rollout | Call | Add more users, best practices |
  | 21 | Advanced tips | Email | Power user features |
  | 28 | Onboarding close | Call | Transition to ongoing success |

  ### Onboarding Kickoff Call Script

  **Opening (5 min):**
  "Thanks for joining. My goal today is to make sure you're set up for
  success. We'll cover your goals, walk through setup, and map out the
  next 30 days."

  **Discovery (10 min):**
  - "What problem are you hoping [Product] solves?"
  - "How are you handling this today?"
  - "What does success look like in 30 days? 90 days?"
  - "Who else will be using this?"

  **Setup Walkthrough (10 min):**
  - Complete [Step 1] together
  - Configure [Key setting]
  - Connect [Integration]

  **Next Steps (5 min):**
  - "Your homework: Complete [first action] by [date]"
  - "I'll send resources and check in on Day 3"
  - "Questions before we wrap?"

  ### Risk Triggers During Onboarding

  | Signal | Day | Action |
  |--------|-----|--------|
  | No login after signup | 2 | Personal email + call offer |
  | Setup incomplete | 5 | Offer to do together on call |
  | No first action | 10 | Escalate, high-touch outreach |
  | Single user only | 14 | Team rollout enablement |
  | Missing kickoff call | 3 | Reschedule + express urgency |

  ### Handoff to Ongoing Success

  **Day 30 Call Agenda:**
  - Review: What's working, what's not
  - Confirm: Ongoing cadence (monthly/quarterly)
  - Introduce: Any new stakeholders
  - Plan: Goals for next 90 days
  - Ask: "Is there anything we missed in onboarding?"
  ```

