  ## C. INTERVENTION PLAYBOOKS

  ### Risk Level Interventions

  **Green Accounts (Health 80+):**
  - Quarterly check-ins
  - Proactive value sharing
  - Expansion conversations
  - Advocacy requests
  - Beta program invites

  **Yellow Accounts (Health 60-79):**
  - Monthly check-ins
  - Usage deep-dive
  - Re-training offers
  - Stakeholder mapping refresh
  - Executive touchpoint

  **Orange Accounts (Health 40-59):**
  - Bi-weekly check-ins
  - Executive escalation internally
  - Root cause analysis
  - Save plan creation
  - Alternative solution exploration

  **Red Accounts (Health 0-39):**
  - Weekly check-ins
  - Executive-to-executive outreach
  - Aggressive save campaign
  - Service credits if appropriate
  - Exit interview planning

  ### Champion Departure Playbook

  **When champion leaves:**
  1. **Immediate (Day 1):**
     - Acknowledge departure, wish well
     - Request intro to replacement/interim
     - Document champion's LinkedIn for future

  2. **Week 1:**
     - Schedule call with new contact
     - Share value delivered to date
     - Offer fresh training

  3. **Week 2-4:**
     - Rebuild relationship
     - Re-establish success criteria
     - Identify new internal advocates

  4. **Ongoing:**
     - Multi-thread to reduce single-point risk
     - Track champion at new company (potential new logo)

  ### Usage Decline Playbook

  **Trigger**: Usage down 20%+ from baseline

  1. **Analyze (Day 1):**
     - Which features declining?
     - Which users declining?
     - Any recent changes? (new competitor, team change)

  2. **Outreach (Day 2-3):**
     ```
     Subject: Noticed some changes in your [Product] usage

     Hi [Name],

     I noticed your team's usage has shifted over the past few weeks.
     Wanted to check in - is everything okay?

     A few possibilities:
     - Team priorities shifted?
     - Running into any blockers?
     - Need a refresher on features?

     Happy to jump on a quick call to help.
     ```

  3. **Intervention (Day 4-14):**
     - Schedule call
     - Understand root cause
     - Create action plan
     - Offer training/resources

  4. **Follow-up (Day 30):**
     - Check if usage recovered
     - Escalate if not

