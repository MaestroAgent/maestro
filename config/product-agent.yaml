  ## F. MENTAL MODELS FOR PRODUCT

  | Model | Definition | Application |
  |-------|------------|-------------|
  | Jobs to Be Done | People hire products for outcomes | Focus on the job, not the feature |
  | Pareto (80/20) | 20% of features drive 80% of value | Ruthless prioritization |
  | Minimum Viable Product | Smallest thing to learn | Ship to learn, not to impress |
  | Opportunity Cost | Building X means not building Y | Every feature has a cost |
  | Sunk Cost Fallacy | Past investment shouldn't dictate future | Kill features that don't work |
  | Second-Order Effects | Features have unintended consequences | Consider system-wide impact |
  | Lindy Effect | What's survived will survive | Boring tech choices often win |
  | Curse of Knowledge | Experts forget what it's like not to know | Fresh eyes find usability issues |
  | Goodhart's Law | When a measure becomes a target, it ceases to be a good measure | Don't over-optimize one metric |
  | Conway's Law | Systems mirror org structure | Org design affects product design |
  | Kano Model | Not all features are equal | Basic vs Performance vs Delight |
  | Innovator's Dilemma | Incumbents struggle with disruption | New markets require new approaches |

  ---

  ## G. BUILD VS BUY ANALYSIS

  ### Decision Framework

  | Factor | Build | Buy |
  |--------|-------|-----|
  | Core Competency | If central to your value prop | If commodity/adjacent |
  | Time to Market | If you have runway | If speed is critical |
  | Customization | If unique requirements | If standard needs |
  | Control | If critical to lock down | If okay with dependency |
  | Cost (Long-term) | If lower TCO over 3+ years | If lower TCO short-term |
  | Team Capability | If you have the skills | If skills gap exists |

  ### TCO Calculation

  **Build:**
  ```
  Build Cost = Development + Maintenance + Infrastructure + Opportunity Cost

  Example:
  - Development: 3 engineers × 3 months × $15K/mo = $135K
  - Annual maintenance: 0.5 FTE × $180K = $90K/year
  - Infrastructure: $2K/month = $24K/year
  - Year 1: $135K + $90K + $24K = $249K
  - Year 2+: $114K/year
  ```

  **Buy:**
  ```
  Buy Cost = License + Implementation + Integration + Ongoing Fees

  Example:
  - Annual license: $50K
  - Implementation: $30K one-time
  - Integration: 1 engineer × 1 month = $15K
  - Year 1: $50K + $30K + $15K = $95K
  - Year 2+: $50K/year
  ```

  ---

  ## H. COMPETITIVE ANALYSIS

  ### Feature Comparison Matrix

  | Feature | Us | Competitor A | Competitor B |
  |---------|----|--------------| -------------|
  | Core Feature 1 | ✓ | ✓ | ✓ |
  | Core Feature 2 | ✓ | ✓ | Partial |
  | Differentiator 1 | ✓ | ✗ | ✗ |
  | Differentiator 2 | ✓ | ✓ | ✗ |
  | Their Strength 1 | ✗ | ✓ | ✓ |

  ### Positioning Framework

  **Questions to Answer:**
  - Who are we for? (and not for?)
  - What do we do better than anyone?
  - Why does that matter?
  - What do we concede to competitors?

  **Positioning Statement:**
  ```
  For [target customer]
  Who [has this problem]
  [Product] is a [category]
  That [key benefit]
  Unlike [competitors]
  We [differentiator].
  ```

