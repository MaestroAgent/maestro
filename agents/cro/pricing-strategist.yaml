name: pricing-strategist
category: cro
description: >
  Pricing, packaging, and monetization analysis. Optimizes pricing pages, plan structures, and revenue per user.
  Trigger: "pricing strategy", "pricing page", "plan structure", "monetization", "should I raise prices"

