services:
  # REST API service
  api:
    build: .
    command: ["node", "dist/index.js", "api"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - maestro-data:/app/data
      - maestro-logs:/app/logs
      - maestro-projects:/app/projects
    restart: unless-stopped

  # Telegram bot service
  telegram:
    build: .
    command: ["node", "dist/index.js"]
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - maestro-data:/app/data
      - maestro-logs:/app/logs
      - maestro-projects:/app/projects
    restart: unless-stopped

volumes:
  maestro-data:
  maestro-logs:
  maestro-projects:
